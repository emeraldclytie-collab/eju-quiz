<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>総合科目 選択クイズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#f5f3ee;color:#2a2a2a;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 48px}
header{text-align:center;margin-bottom:22px}
.eyebrow{font-size:10px;letter-spacing:4px;color:#8b6914;margin-bottom:8px}
h1{font-size:22px;font-weight:400;letter-spacing:2px;color:#1a1a1a}
.subtitle{font-size:11px;color:#888;margin-top:5px}
.cat-scroll{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:680px;margin-bottom:18px}
.cat-btn{padding:5px 12px;border:1px solid #ddd;background:transparent;color:#888;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.cat-btn.active,.cat-btn:hover{border-color:#8b6914;color:#8b6914}
.card{width:100%;max-width:680px;background:#ffffff;border:1px solid #ddd;padding:26px 22px 20px;position:relative;margin-bottom:12px}
.prog-line{position:absolute;top:0;left:0;height:2px;background:#c8a96e;transition:width .3s}
.q-meta{display:flex;justify-content:space-between;margin-bottom:14px}
.q-tag{font-size:10px;letter-spacing:2px;color:#888}
.q-num{font-size:11px;color:#555}
.q-text{font-size:14px;line-height:1.75;color:#2a2a2a;margin-bottom:18px}
.options{display:flex;flex-direction:column;gap:8px}
.opt{padding:10px 14px;border:1px solid #ddd;background:transparent;color:#555;font-size:13px;text-align:left;cursor:pointer;font-family:inherit;line-height:1.5;display:flex;gap:10px;transition:all .15s}
.opt:hover{border-color:#555;color:#333}
.opt-label{min-width:18px;color:#888;font-size:12px;flex-shrink:0;margin-top:1px}
.opt.correct{border-color:#2d8a4e!important;color:#2d8a4e!important;background:rgba(45,138,78,.08)!important}
.opt.wrong{border-color:#c44!important;color:#c44!important;background:rgba(204,68,68,.08)!important}
.opt.dim{opacity:.3}
.feedback{margin-top:16px;padding:13px 15px;border:1px solid #ddd;font-size:13px;line-height:1.75;display:none}
.feedback.ok{display:block;border-color:#2d8a4e;color:#333;background:rgba(45,138,78,.06)}
.feedback.ng{display:block;border-color:#c44;color:#333;background:rgba(204,68,68,.06)}
.fb-head{font-size:11px;letter-spacing:2px;margin-bottom:6px;font-weight:bold}
#nextBtn{width:100%;max-width:680px;padding:13px;border:1px solid #c8a96e;background:transparent;color:#8b6914;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:10px;display:none;transition:background .15s}
#nextBtn:hover{background:rgba(139,105,20,.08)}
.stats{display:flex;gap:24px;margin-top:4px}
.stat{font-size:11px;color:#888;text-align:center}
.stat span{color:#8b6914;font-size:17px;display:block}
#summary{width:100%;max-width:680px;text-align:center;display:none}
.big-pct{font-size:72px;font-weight:300;color:#8b6914;line-height:1}
.pct-label{font-size:11px;letter-spacing:3px;color:#888;margin-top:4px;margin-bottom:24px}
.sum-btns{display:flex;gap:10px;margin-bottom:16px}
.sum-btn{flex:1;padding:12px;border:1px solid #ccc;background:transparent;color:#777;font-size:13px;cursor:pointer;font-family:inherit}
.sum-btn.p{border-color:#8b6914;color:#8b6914}
.missed-box{text-align:left;background:#ffffff;border:1px solid #ddd;padding:18px}
.missed-box h3{font-size:10px;letter-spacing:3px;color:#9e5a5a;margin-bottom:12px}
.missed-item{padding:9px 0;border-bottom:1px solid #eee;font-size:12px;color:#777;line-height:1.6}
.missed-item:last-child{border-bottom:none}
.missed-q{color:#222;margin-bottom:3px;font-size:13px}
.missed-a{color:#2d8a4e}
</style>
</head>
<body>
<header>
  <div class="eyebrow">EJU 総合科目</div>
  <h1>弱点克服クイズ</h1>
  <div class="subtitle" id="totalCount"></div>
</header>
<div class="cat-scroll" id="catNav"></div>
<div class="card" id="quizCard">
  <div class="prog-line" id="progLine"></div>
  <div class="q-meta">
    <span class="q-tag" id="qTag"></span>
    <span class="q-num" id="qNum"></span>
  </div>
  <div class="q-text" id="qText"></div>
  <div class="options" id="opts"></div>
  <div class="feedback" id="feedback">
    <div class="fb-head" id="fbHead"></div>
    <div id="fbBody"></div>
  </div>
</div>
<button id="nextBtn" onclick="next()">次の問題 →</button>
<div class="stats" id="statsBar">
  <div class="stat"><span id="sC">0</span>正解</div>
  <div class="stat"><span id="sW">0</span>不正解</div>
  <div class="stat"><span id="sL">0</span>残り</div>
</div>
<div id="summary">
  <div class="big-pct" id="bigPct">0%</div>
  <div class="pct-label">SCORE</div>
  <div class="sum-btns">
    <button class="sum-btn p" onclick="restart(false)">全問やり直す</button>
    <button class="sum-btn" onclick="restart(true)">間違えた問題のみ</button>
  </div>
  <div class="missed-box" id="missedBox"></div>
</div>
<script>
const ALL = [
{cat:"冷戦",q:"コミンフォルムの役割として正しいものはどれか？",opts:["経済協力（マーシャルプランへの対抗）","政治・情報面での対抗（トルーマン・ドクトリンへの対抗）","軍事同盟（NATOへの対抗）","核兵器の共同開発"],ans:1,exp:"コミンフォルム＝政治・情報面での対抗機関（対トルーマン・ドクトリン）。経済面はコメコン、軍事面はワルシャワ条約機構。"},
{cat:"冷戦",q:"コメコンの役割として正しいものはどれか？",opts:["政治・情報面での対抗（対トルーマン・ドクトリン）","経済協力（マーシャルプランへの対抗）","軍事同盟（NATOへの対抗）","核兵器の管理"],ans:1,exp:"コメコン＝経済相互援助会議（対マーシャルプラン）。政治はコミンフォルム、軍事はワルシャワ条約機構。"},
{cat:"冷戦",q:"ベルリン封鎖が起きた年はいつか？",opts:["1945年","1948年","1952年","1961年"],ans:1,exp:"ベルリン封鎖は1948年。翌1949年に東西ドイツが分裂、1961年にベルリンの壁が建設された。"},
{cat:"冷戦",q:"ベルリンの壁が建設された年はいつか？",opts:["1948年","1953年","1961年","1968年"],ans:2,exp:"ベルリンの壁建設は1961年。48封鎖→49分裂→61壁の順で覚える。"},
{cat:"冷戦",q:"ハンガリー事件が起きた年はいつか？",opts:["1948年","1953年","1956年","1968年"],ans:2,exp:"ハンガリー事件は1956年。ソ連が軍事介入して鎮圧した東欧民主化運動。プラハの春（1968年）と混同しない。"},
{cat:"冷戦",q:"プラハの春（チェコ事件）が起きた年はいつか？",opts:["1956年","1961年","1968年","1975年"],ans:2,exp:"プラハの春は1968年。ハンガリー事件（1956年）と混同しない。どちらもソ連が軍事介入して鎮圧。"},
{cat:"冷戦",q:"朝鮮戦争が始まった年はいつか？",opts:["1948年","1950年","1953年","1955年"],ans:1,exp:"朝鮮戦争開戦は1950年。「50開打53停」で覚える。38度線での分断は現在も続く。"},
{cat:"冷戦",q:"朝鮮戦争の停戦が成立した年はいつか？",opts:["1950年","1951年","1953年","1955年"],ans:2,exp:"朝鮮戦争停戦は1953年。「50開打53停、打了三年」で覚える。"},
{cat:"冷戦",q:"トンキン湾事件が起きた年はいつか？",opts:["1960年","1962年","1964年","1966年"],ans:2,exp:"トンキン湾事件は1964年。アメリカのベトナム戦争本格参戦の口実となった。翌1965年から北爆開始。"},
{cat:"冷戦",q:"ベトナム戦争のパリ平和協定が締結された年はいつか？",opts:["1969年","1971年","1973年","1975年"],ans:2,exp:"パリ平和協定は1973年。これによりアメリカ軍がベトナムから撤退した。"},
{cat:"冷戦",q:"ベルリンの壁が崩壊した年はいつか？",opts:["1987年","1988年","1989年","1991年"],ans:2,exp:"ベルリンの壁崩壊は1989年11月9日。「89推墙→90統一→91散伙」の順で覚える。"},
{cat:"冷戦",q:"ドイツが再統一した年はいつか？",opts:["1989年","1990年","1991年","1993年"],ans:1,exp:"ドイツ再統一は1990年。ベルリンの壁崩壊（1989年）の翌年。"},
{cat:"冷戦",q:"ソ連が解体した年はいつか？",opts:["1989年","1990年","1991年","1993年"],ans:2,exp:"ソ連解体は1991年。「89推墙→90統一→91散伙」で覚える。"},
{cat:"冷戦",q:"マルタ会談（冷戦終結宣言）が行われた年はいつか？",opts:["1987年","1988年","1989年","1991年"],ans:2,exp:"マルタ会談は1989年12月。ブッシュ（米）とゴルバチョフ（ソ）が冷戦終結を宣言。"},
{cat:"冷戦",q:"ゴルバチョフの「ペレストロイカ」の意味として正しいものはどれか？",opts:["情報公開・言論自由化","経済再建・改革","軍事力強化","民主主義の導入"],ans:1,exp:"ペレストロイカ＝経済再建・改革。情報公開・言論自由化はグラスノスチ。二つをセットで覚える。"},
{cat:"冷戦",q:"ゴルバチョフの「グラスノスチ」の意味として正しいものはどれか？",opts:["経済再建・改革","軍事力強化","情報公開・言論自由化","民主主義の導入"],ans:2,exp:"グラスノスチ＝情報公開・開放性・言論自由化。経済再建はペレストロイカ。"},
{cat:"一次大战・戦間期",q:"第一次世界大戦でイタリアが最初に属していた同盟はどれか？",opts:["協約国（英仏露）","三国同盟（独墺伊）","中立国","連合国"],ans:1,exp:"イタリアは最初、三国同盟（独墺伊）の一員。しかし1915年に協約国側に寝返って参戦した。"},
{cat:"一次大战・戦間期",q:"ロカルノ条約が締結された年はいつか？",opts:["1919年","1922年","1925年","1928年"],ans:2,exp:"ロカルノ条約は1925年。独仏国境の不可侵確認→翌1926年ドイツが国際連盟加盟。"},
{cat:"一次大战・戦間期",q:"ロカルノ条約後にドイツが国際連盟に加盟した年はいつか？",opts:["1925年","1926年","1928年","1933年"],ans:1,exp:"ドイツの国際連盟加盟は1926年。ロカルノ条約（1925年）の翌年。"},
{cat:"一次大战・戦間期",q:"パリ不戦条約が締結された年はいつか？",opts:["1925年","1926年","1928年","1930年"],ans:2,exp:"パリ不戦条約（ケロッグ＝ブリアン条約）は1928年。多国間で戦争放棄を約束したが制裁規定なし。"},
{cat:"一次大战・戦間期",q:"五四運動の直接の原因として正しいものはどれか？",opts:["ロシア革命の影響","辛亥革命による清朝打倒","パリ講和会議でドイツの山東省権益が日本へ移転","日英同盟に基づく日本の軍事介入"],ans:2,exp:"五四運動（1919年）の直接原因＝パリ講和会議でドイツの山東省権益が日本へ→中国が調印拒否→学生が抗議。"},
{cat:"一次大战・戦間期",q:"三・一独立運動が起きた国はどこか？",opts:["中国","朝鮮","ベトナム","インド"],ans:1,exp:"三・一独立運動（1919年）は朝鮮（日本の植民地）で起きた。民族自決原則の影響を受けた独立運動。"},
{cat:"一次大战・戦間期",q:"全権委任法でヒトラーに与えられた権限として正しいものはどれか？",opts:["軍の最高指揮権","議会を通さず内閣が立法できる権限","大統領を兼任する権限","ユダヤ人を追放する権限"],ans:1,exp:"全権委任法＝議会を通さず内閣が立法できる権限。ナチスの独裁を「合法的に」確立した。之前连错四次の頻出考点。"},
{cat:"一次大战・戦間期",q:"ヒトラーが首相に就任した年はいつか？",opts:["1931年","1932年","1933年","1934年"],ans:2,exp:"ヒトラー首相就任は1933年。元首になったのは1934年（大統領と首相を兼任）。"},
{cat:"一次大战・戦間期",q:"ヒトラーが元首（大統領＋首相を兼任）になった年はいつか？",opts:["1932年","1933年","1934年","1935年"],ans:2,exp:"ヒトラーが元首になったのは1934年（ヒンデンブルク大統領死去後）。首相就任（1933年）と混同しない。"},
{cat:"一次大战・戦間期",q:"スペイン内戦でフランコ側（民族主義軍）を支援したのはどこか？",opts:["ソ連・国際義勇軍","ドイツ・イタリア","イギリス・フランス","アメリカ"],ans:1,exp:"フランコ側（民族主義軍）＝ドイツ・イタリアが支援。共和国側（人民戦線）＝ソ連・国際義勇軍が支援。"},
{cat:"一次大战・戦間期",q:"スペイン内戦で共和国側（人民戦線）を支援したのはどこか？",opts:["ドイツ・イタリア","ソ連・国際義勇軍","イギリス・フランス","アメリカ・日本"],ans:1,exp:"共和国側（人民戦線）＝ソ連・国際義勇軍が支援。フランコ側（民族主義軍）＝ドイツ・イタリアが支援。"},
{cat:"一次大战・戦間期",q:"ミュンヘン会談（1938年）に参加しなかった国はどこか？",opts:["イギリス","フランス","チェコスロバキア","ドイツ"],ans:2,exp:"ミュンヘン会談の参加国は英・仏・独・伊の四か国。当事国のチェコスロバキアは招かれなかった（宥和政策の象徴）。"},
{cat:"一次大战・戦間期",q:"ワシントン会議の四か国条約で廃棄されたものはどれか？",opts:["米中同盟","日英同盟","日露協約","英仏協商"],ans:1,exp:"四か国条約（日米英仏）により日英同盟が廃棄された。太平洋地域の現状維持を約束した条約。"},
{cat:"一次大战・戦間期",q:"ワシントン会議の九か国条約の内容として正しいものはどれか？",opts:["海軍主力艦の比率を制限した","中国の主権尊重・門戸開放・機会均等を約束した","太平洋地域の現状維持を確認した","日英同盟を廃棄した"],ans:1,exp:"九か国条約＝中国の主権尊重・門戸開放・機会均等。海軍軍縮は五か国条約、太平洋現状維持と日英同盟廃棄は四か国条約。"},
{cat:"一次大战・戦間期",q:"ロシアで二月革命（1917年）によって打倒された王朝はどれか？",opts:["ハプスブルク王朝","ロマノフ王朝","ホーエンツォレルン王朝","オスマン王朝"],ans:1,exp:"二月革命（1917年）でロマノフ王朝が打倒された。十月革命でボルシェビキが政権を掌握。"},
{cat:"一次大战・戦間期",q:"レーニンが1921年に導入した新経済政策（NEP）の特徴として正しいものはどれか？",opts:["重工業の国有化を強化した","市場経済の一部を復活させた","農業の集団化を推進した","外国資本を完全に排除した"],ans:1,exp:"NEP（新経済政策）1921年＝市場経済の一部を復活させる修正政策。その後スターリンが五ヵ年計画（1928年）で重工業化・農業集団化を推進。"},
{cat:"二次大战",q:"太平洋戦争の転換点となった海戦はどれか？",opts:["真珠湾攻撃","ガダルカナル島の戦い","ミッドウェー海戦","硫黄島の戦い"],ans:2,exp:"太平洋の転換点＝ミッドウェー海戦（1942年）。欧州の転換点はスターリングラードの戦い（1943年）。"},
{cat:"二次大战",q:"欧州戦線の転換点となった戦いはどれか？",opts:["ダンケルクの撤退","ノルマンディー上陸作戦","スターリングラードの戦い","バルバロッサ作戦"],ans:2,exp:"欧州の転換点＝スターリングラードの戦い（1943年）。太平洋の転換点はミッドウェー海戦（1942年）。"},
{cat:"二次大战",q:"ABCD包囲網の「D」は何を指すか？",opts:["Denmark（デンマーク）","Dominican（ドミニカ）","Dutch（オランダ）","Danzig（ダンツィヒ）"],ans:2,exp:"D＝Dutch（オランダ）。蘭領インドシナへの資源輸出を止めた。A＝America、B＝British、C＝China。"},
{cat:"二次大战",q:"バルバロッサ作戦（1941年6月）とは何か？",opts:["日本の真珠湾攻撃作戦","ノルマンディー上陸作戦","ドイツのソ連侵攻作戦","フランス侵攻作戦"],ans:2,exp:"バルバロッサ作戦＝1941年6月22日のドイツによるソ連侵攻。独ソ不可侵条約を破って開始。"},
{cat:"二次大战",q:"カイロ会談（1943年）の参加国はどこか？",opts:["米・英・ソ","米・英・中","米・英・仏","米・英・伊"],ans:1,exp:"カイロ会談＝米・英・中（対日戦争の方針）。テヘラン・ヤルタは米・英・ソ。「中国はカイロのみ」と覚える。"},
{cat:"二次大战",q:"テヘラン会談（1943年）の主な決定内容として正しいものはどれか？",opts:["対日戦争の方針決定","ノルマンディー上陸作戦の実施決定","ソ連の対日参戦約束","ドイツへの賠償金額決定"],ans:1,exp:"テヘラン会談（米・英・ソ）＝ノルマンディー上陸作戦の実施を決定。ソ連の対日参戦約束はヤルタ会談。"},
{cat:"二次大战",q:"広島に原爆が投下された日はいつか？",opts:["1945年8月6日","1945年8月9日","1945年8月12日","1945年8月15日"],ans:0,exp:"広島原爆投下は8月6日。長崎は8月9日、日本の玉音放送（投降）は8月15日。「6・9・15」で覚える。"},
{cat:"二次大战",q:"長崎に原爆が投下された日はいつか？",opts:["1945年8月6日","1945年8月9日","1945年8月12日","1945年8月15日"],ans:1,exp:"長崎原爆投下は8月9日。広島は8月6日、日本の玉音放送（投降）は8月15日。「6・9・15」で覚える。"},
{cat:"二次大战",q:"ブレトン・ウッズ協定で設立された機関として正しいものはどれか？",opts:["WTO（世界貿易機関）","IMF（国際通貨基金）と世界銀行（IBRD）","GATT（関税貿易一般協定）","国際連合"],ans:1,exp:"ブレトン・ウッズ協定（1944年）＝IMF（短期融資・為替安定）＋世界銀行IBRD（長期融資・復興開発）を設立。GATTやWTOは別。"},
{cat:"二次大战",q:"ブレトン・ウッズ体制での金と米ドルの交換レートとして正しいものはどれか？",opts:["金1グラム＝1ドル","金1オンス＝35ドル","金1オンス＝100ドル","金1トン＝1000ドル"],ans:1,exp:"ブレトン・ウッズ体制＝金1オンス＝35ドル（金ドル本位制）。1971年ニクソンショックでこの交換が停止された。"},
{cat:"日本近代化・外交史",q:"セオドア・ルーズベルトの業績として正しいものはどれか？",opts:["ニューディール政策の実施","日露戦争の調停（ポーツマス条約）","第一次世界大戦への参戦決定","原爆の投下命令"],ans:1,exp:"セオドア・ルーズベルト＝日露戦争調停・革新主義・独占禁止法強化。ニューディールはフランクリン・ルーズベルト（別人）。"},
{cat:"日本近代化・外交史",q:"フランクリン・ルーズベルトの業績として正しいものはどれか？",opts:["日露戦争の調停（ポーツマス条約）","革新主義・独占禁止法強化","ニューディール政策（3R）の実施","第一次世界大戦への参戦決定"],ans:2,exp:"フランクリン・ルーズベルト（FDR）＝ニューディール政策・3R（Relief・Recovery・Reform）。日露調停はセオドア・ルーズベルト（別人）。"},
{cat:"日本近代化・外交史",q:"領事裁判権（治外法権）が日本から撤廃されたのはいつ、どの国との条約か？",opts:["1858年・対アメリカ","1894年・対イギリス","1905年・対ロシア","1911年・対アメリカ"],ans:1,exp:"領事裁判権撤廃は1894年・対イギリス（日清戦争と同年）。関税自主権回復は1911年・対アメリカ。「領事は94、関税は11」。"},
{cat:"日本近代化・外交史",q:"関税自主権が回復されたのはいつ、どの国との交渉か？",opts:["1894年・対イギリス","1905年・対ロシア","1911年・対アメリカ","1919年・パリ講和会議"],ans:2,exp:"関税自主権回復は1911年・対アメリカ。領事裁判権撤廃は1894年・対イギリス。「領事は94、関税は11」。"},
{cat:"日本近代化・外交史",q:"三国干渉（1895年）に参加した三か国はどれか？",opts:["英・仏・米","ロシア・フランス・ドイツ","英・独・伊","米・独・露"],ans:1,exp:"三国干渉＝ロシア（主導・南下政策）・フランス（露仏同盟の義務）・ドイツ（ロシアを極東へ向けるため）が遼東半島返還を要求。"},
{cat:"日本近代化・外交史",q:"ポーツマス条約で日本が得られなかったものはどれか？",opts:["朝鮮半島の優先権","旅順・大連の租借権","南樺太（北緯50度以南）","賠償金"],ans:3,exp:"ポーツマス条約で賠償金は得られなかった（→日比谷焼打ち事件の原因）。朝鮮優先権・旅順大連租借権・南樺太は得た。"},
{cat:"日本近代化・外交史",q:"日米和親条約（1854年）で開港した二つの港はどれか？",opts:["横浜・長崎","神戸・大阪","下田・函館","横浜・函館"],ans:2,exp:"日米和親条約（1854年）で下田・函館を開港。通商権はなし。日米通商修好条約（1858年）で横浜・長崎・函館等で本格貿易開始。"},
{cat:"日本近代化・外交史",q:"日米通商修好条約（1858年）の不平等な点として正しいものはどれか？",opts:["軍隊の駐留を認めた","領事裁判権の承認と関税自主権の喪失","土地の永久租借を認めた","天皇の権限を制限した"],ans:1,exp:"日米通商修好条約（1858年）の不平等な点：①領事裁判権（治外法権）の承認②関税自主権の喪失。「通商条約が不平等」と覚える。"},
{cat:"政治基本原理",q:"ホッブズの主著の名称はどれか？",opts:["社会契約論","市民政府二論","リヴァイアサン","法の精神"],ans:2,exp:"ホッブズの主著＝リヴァイアサン。強力な国家権力の必要性を説いた。社会契約論はルソー、市民政府二論はロック。"},
{cat:"政治基本原理",q:"ロックの主著の名称はどれか？",opts:["リヴァイアサン","社会契約論","市民政府二論","法の精神"],ans:2,exp:"ロックの主著＝市民政府二論。抵抗権・立法権が最高権力を説いた。アメリカ独立宣言に影響。"},
{cat:"政治基本原理",q:"ルソーの主著の名称はどれか？",opts:["リヴァイアサン","市民政府二論","社会契約論","法の精神"],ans:2,exp:"ルソーの主著＝社会契約論（書名）。人民主権・直接民主制を主張。フランス革命に影響。"},
{cat:"政治基本原理",q:"「法の精神」の著者はだれか？",opts:["ホッブズ","ロック","ルソー","モンテスキュー"],ans:3,exp:"「法の精神」＝モンテスキュー。三権分立（立法・行政・司法）を主張した。ロックの三権（立法・執行・連合）とは異なる。"},
{cat:"政治基本原理",q:"ロックの三権（政府の権力の三分類）として正しいものはどれか？",opts:["立法権・行政権・司法権","立法権・執行権・連合権（外交権）","立法権・司法権・外交権","行政権・司法権・軍事権"],ans:1,exp:"ロックの三権＝立法権・執行権・連合権（外交権）。立法権が最高権力。モンテスキューの三権分立（立法・行政・司法）と混同しない。"},
{cat:"政治基本原理",q:"法の支配の原則を最初に唱えたイギリスの法学者は誰か？",opts:["ロック","コーク","ベンサム","ブラックストーン"],ans:1,exp:"法の支配＝イギリスのコーク（クック）卿が主張。「法律の内容も正義に沿うべきで、権力者も法に従わなければならない」という原則。"},
{cat:"政治基本原理",q:"「法治主義」の特徴として正しいものはどれか？",opts:["法の内容が正義に沿っているかを重視する","法さえあれば内容は問わない（形式的合法性を重視）","権力者も法に従わなければならない","自然法に基づいて法を判断する"],ans:1,exp:"法治主義（独）＝法さえあれば内容は問わない（形式的合法性重視）→ナチスの全権委任法も「合法」になる。法の支配（英）＝内容も正義に沿うべき。"},
{cat:"政治基本原理",q:"ベバリッジ報告（1942年）の内容として正しいものはどれか？",opts:["市場への政府介入と有効需要創出を主張した","「揺りかごから墓場まで」の福祉国家の青写真を描いた","自由放任主義と「見えざる手」を主張した","比較優位に基づく自由貿易を主張した"],ans:1,exp:"ベバリッジ報告（1942年、英国）＝「揺りかごから墓場まで」の福祉国家の青写真。ケインズ（修正資本主義）と混同しない。"},
{cat:"政治基本原理",q:"「アクセス権」とはどのような権利か？",opts:["SNSなどインターネットで情報発信する権利","テレビ・新聞などマスメディアに反論・意見掲載を求める権利","行政の情報公開を求める「知る権利」","通信の秘密を守る権利"],ans:1,exp:"アクセス権＝マスメディア（テレビ・新聞）に対して反論や意見の掲載・放送を求める権利。SNSの話ではない。"},
{cat:"政治基本原理",q:"解職請求（リコール）に必要な署名数として正しいものはどれか？",opts:["有権者の1/50以上","有権者の1/4以上","有権者の1/3以上","有権者の過半数"],ans:2,exp:"解職請求（首長・議員のリコール）＝有権者の1/3以上の署名＋住民投票で過半数。条例制定・事務監査は1/50。「クビは1/3、条例は1/50」。"},
{cat:"政治基本原理",q:"条例の制定・改廃の請求に必要な署名数として正しいものはどれか？",opts:["有権者の1/50以上","有権者の1/3以上","有権者の1/4以上","有権者の過半数"],ans:0,exp:"条例制定・改廃の請求＝有権者の1/50以上の署名。解職請求（リコール）は1/3以上。「条例は1/50、クビは1/3」。"},
{cat:"政治基本原理",q:"社会権を最初に憲法に明記した憲法はどれか？",opts:["アメリカ合衆国憲法（1787年）","フランス人権宣言（1789年）","ドイツのワイマール憲法（1919年）","日本国憲法（1947年）"],ans:2,exp:"社会権を最初に憲法に明記したのはワイマール憲法（1919年）。「社会権の始まり＝ワイマール憲法」は定番の出題。"},
{cat:"政治基本原理",q:"自由権・参政権・社会権の確立された順番として正しいものはどれか？",opts:["参政権→自由権→社会権","社会権→自由権→参政権","自由権（18C）→参政権（19C）→社会権（20C）","すべて同時に20世紀に確立"],ans:2,exp:"自由権18世紀（市民革命・思想・表現・信教の自由）→参政権19世紀（選挙権拡大）→社会権20世紀（生存権・労働権・教育権）。"},
{cat:"政治基本原理",q:"世界人権宣言（1948年）の法的効力として正しいものはどれか？",opts:["条約と同等の法的拘束力がある","法的拘束力はなく宣言に過ぎない","加盟国のみに拘束力がある","国連安保理の承認があれば拘束力が生じる"],ans:1,exp:"世界人権宣言（1948年）＝法的拘束力なし（宣言のみ）。法的拘束力があるのは国際人権規約（1966年）のA規約・B規約。"},
{cat:"政治基本原理",q:"集団的自衛権の具体例として正しいものはどれか？",opts:["国連安保理が平和維持軍を派遣する","NATO加盟国が攻撃されたとき他の加盟国が助ける","国連総会が経済制裁を決議する","国際司法裁判所が紛争を解決する"],ans:1,exp:"集団的自衛権＝同盟国（NATOや日米安保）が攻撃されたとき他の同盟国が助ける権利。国連安保理が主導するのは集団安全保障（別の概念）。"},
{cat:"英米・日本政治制度",q:"アメリカの大統領は何期まで務めることができるか？",opts:["1期4年・任期制限なし","1期4年・最大2期8年まで（三選禁止）","1期6年・最大2期12年まで","1期4年・最大3期12年まで"],ans:1,exp:"アメリカ大統領＝1期4年・最大2期8年（第22修正条項で三選禁止）。FDRが四選したため規定が作られた。"},
{cat:"英米・日本政治制度",q:"アメリカ議会の上院（元老院）の議員定数として正しいものはどれか？",opts:["50人（各州1名）","100人（各州2名）","435人","535人"],ans:1,exp:"上院（元老院・Senate）＝100人（各州2名）・6年任期（2年ごとに1/3改選）。下院（代議院）は435人・2年任期。"},
{cat:"英米・日本政治制度",q:"アメリカ議会の下院（代議院）の議員定数として正しいものはどれか？",opts:["100人","200人","435人","535人"],ans:2,exp:"下院（代議院・House of Representatives）＝435人・2年任期。上院（元老院）は100人・6年任期。"},
{cat:"英米・日本政治制度",q:"アメリカ大統領が「持っていない」権限はどれか？",opts:["法案への拒否権","軍の最高指揮権","議会への法案提出権","条約締結権"],ans:2,exp:"アメリカ大統領に「法案提出権」はない（議員が代わりに提出、大統領は教書で建議のみ）。拒否権・軍最高指揮権・条約締結権はある。"},
{cat:"英米・日本政治制度",q:"イギリスの「影子内閣（Shadow Cabinet）」とは何か？",opts:["首相不在時に機能する内閣","第二大党（野党）が政権交代に備えて組織する候補内閣","連立与党の少数派が形成する閣外協力内閣","貴族院が組織する内閣"],ans:1,exp:"影子内閣＝野党第一党が政権交代に備えて組織する候補内閣。イギリス特有の制度。各影の閣僚は与党の担当大臣を監視・批判する。"},
{cat:"英米・日本政治制度",q:"フランスの政治体制として正しいものはどれか？",opts:["大統領制（強い大統領・首相なし）","議院内閣制（大統領は象徴）","半大統領制（大統領＋首相が並存）","一党独裁制"],ans:2,exp:"フランス＝半大統領制（大統領＋首相が並存する二元行政）。ドイツは議院内閣制（大統領は象徴）。「フランスは強い大統領を持つ半大統領制」。"},
{cat:"英米・日本政治制度",q:"衆議院の議員定数として正しいものはどれか？",opts:["242人","300人","465人","500人"],ans:2,exp:"衆議院＝465人（小選挙区289＋比例代表176）・4年任期。参議院は242人・6年任期。"},
{cat:"英米・日本政治制度",q:"参議院の議員定数として正しいものはどれか？",opts:["165人","200人","242人","300人"],ans:2,exp:"参議院＝242人（選挙区148＋比例代表100）・6年任期（3年ごとに半数改選）。衆議院は465人・4年任期。"},
{cat:"英米・日本政治制度",q:"衆議院議員の被選挙権（立候補できる年齢）は何歳以上か？",opts:["18歳","20歳","25歳","30歳"],ans:2,exp:"衆議院の被選挙権＝25歳以上。参議院の被選挙権＝30歳以上。「衆は25、参は30」と覚える。"},
{cat:"英米・日本政治制度",q:"参議院議員の被選挙権（立候補できる年齢）は何歳以上か？",opts:["18歳","25歳","30歳","35歳"],ans:2,exp:"参議院の被選挙権＝30歳以上。衆議院の被選挙権＝25歳以上。「衆は25、参は30」と覚える。"},
{cat:"英米・日本政治制度",q:"内閣不信任案が可決された後、内閣が選択できる手段として正しいものはどれか？",opts:["参議院を解散する","衆議院を解散するか総辞職するかを10日以内に選択","国民投票を実施する","そのまま続投できる"],ans:1,exp:"憲法69条：不信任決議可決後10日以内に衆議院解散か総辞職を選択。参議院解散権はない。「10日以内に選択」が重要。"},
{cat:"英米・日本政治制度",q:"内閣総辞職が起きる三つの場合として正しいものはどれか？",opts:["①不信任可決②参議院選挙後③首相の病気","①不信任可決②衆議院選挙後の特別国会③内閣総理大臣の欠缺","①不信任可決のみ②予算否決③首相の海外出張","①内閣が決定した場合のみ"],ans:1,exp:"内閣総辞職の三種：①衆議院で不信任案可決②衆議院選挙後の特別国会での首班指名③内閣総理大臣の欠缺（死亡・辞任等）。"},
{cat:"英米・日本政治制度",q:"最高裁判所の長官はどのように任命されるか？",opts:["国会が選出する","内閣が指名し天皇が任命する","最高裁裁判官会議が互選する","国民審査で選ぶ"],ans:1,exp:"最高裁長官＝内閣が指名→天皇が任命（形式的）。一般の最高裁裁判官＝内閣が任命。下級裁判所裁判官＝最高裁が指名→内閣が任命。"},
{cat:"英米・日本政治制度",q:"最高裁判所裁判官の国民審査はいつ実施されるか？",opts:["参議院議員選挙と同時","衆議院議員選挙と同時","地方選挙と同時","3年ごとに独立して実施"],ans:1,exp:"最高裁判所裁判官の国民審査＝衆議院議員選挙と同時に実施。罷免するには有効投票の過半数が罷免票（×）であること。"},
{cat:"英米・日本政治制度",q:"閣議の意思決定方式として正しいものはどれか？",opts:["多数決制","全会一致制","3分の2以上の賛成","首相の単独決定"],ans:1,exp:"閣議＝全会一致制。一人でも反対すれば決定できない→首相が反対する大臣を罷免できる根拠になる。"},
{cat:"英米・日本政治制度",q:"日本で独立した行政専門裁判所は存在するか？",opts:["存在する（東京行政裁判所）","存在しない（行政事件も通常裁判所で審理）","行政委員会が行政裁判所の役割を担う","国会が行政裁判を行う"],ans:1,exp:"日本には独立した行政裁判所は存在しない（フランス等と異なる）。行政訴訟も通常裁判所（地方裁判所等）で審理する。"},
{cat:"英米・日本政治制度",q:"明治憲法（大日本帝国憲法）が参考にした国の憲法体制はどれか？",opts:["イギリスの議院内閣制","アメリカの大統領制","プロシア（プロイセン）の憲法（強い行政権・天皇主権）","フランスの半大統領制"],ans:2,exp:"大日本帝国憲法はプロシア（プロイセン＝ドイツの前身）の憲法を参考に制定。伊藤博文がドイツに留学して学んだ。強い行政権・天皇主権が特徴。"},
{cat:"選挙制度",q:"小選挙区制の最大の利点として正しいものはどれか？",opts:["死票が少なく民意が正確に反映される","少数意見も議席を得やすい","二大政党制につながり政治が安定しやすい","政党よりも個人の能力で選べる"],ans:2,exp:"小選挙区制の利点＝二大政党制→政治の安定（明確な過半数政権）。民意反映が弱い・死票が多いのが欠点。「民意反映は大選挙区・比例代表制の利点」。"},
{cat:"選挙制度",q:"小選挙区制の最大の欠点として正しいものはどれか？",opts:["二大政党制になりすぎて選択肢が狭まる","死票が多く民意が反映されにくい","政権が不安定になりやすい","小党が多くなりすぎる"],ans:1,exp:"小選挙区制の欠点＝死票が多く民意が反映されにくい。利点は二大政党制による政治の安定。"},
{cat:"選挙制度",q:"世界初の男性普通選挙を実現した国はどこか？",opts:["イギリス","アメリカ","フランス（1848年）","ドイツ"],ans:2,exp:"世界初の男性普通選挙＝フランス1848年。世界初の女性普通選挙権はニュージーランド1893年。"},
{cat:"選挙制度",q:"世界初の女性普通選挙権を認めた国はどこか？",opts:["イギリス","フランス","アメリカ","ニュージーランド（1893年）"],ans:3,exp:"世界初の女性普通選挙権＝ニュージーランド1893年。世界初の男性普通選挙はフランス1848年。「女性最初はNZ1893」。"},
{cat:"選挙制度",q:"衆議院の比例代表制で使われる名簿式はどれか？",opts:["非拘束名簿式（個人票の順に当選）","拘束名簿式（党があらかじめ順位を決める）","両方の混合","政党名でのみ投票可能な完全拘束式"],ans:1,exp:"衆議院比例代表＝拘束名簿式（党があらかじめ名簿の順位を決める→有権者は政党名で投票）。参議院比例代表＝非拘束名簿式（個人票の多い順に当選）。"},
{cat:"選挙制度",q:"参議院の比例代表制で使われる名簿式はどれか？",opts:["拘束名簿式（党があらかじめ順位を決める）","非拘束名簿式（個人票の多い順に当選）","ドント方式の比例配分のみ","政党名でのみ投票可能な完全拘束式"],ans:1,exp:"参議院比例代表＝非拘束名簿式（個人名でも政党名でも投票可→個人票の多い順に当選）。衆議院は拘束名簿式。「衆は党が決める、参は個人票」。"},
{cat:"経済体制・経済学者",q:"アダム・スミスの著書の名称はどれか？",opts:["資本論","国富論","一般理論","雇用・利子および貨幣の一般理論"],ans:1,exp:"アダム・スミスの著書＝国富論（1776年）。自由放任主義・「見えざる手」・「小さな政府」を主張した。"},
{cat:"経済体制・経済学者",q:"ケインズの経済思想として正しいものはどれか？",opts:["自由放任主義・「見えざる手」を主張した","政府が市場に介入し有効需要を創出すべき（修正資本主義・大きな政府）","比較優位に基づく自由貿易を主張した","後進国の産業保護のための保護貿易を主張した"],ans:1,exp:"ケインズ＝修正資本主義・「大きな政府」・有効需要創出。ニューディール政策の理論的根拠。自由放任主義はアダム・スミス。"},
{cat:"経済体制・経済学者",q:"フリードマンの経済思想として正しいものはどれか？",opts:["政府が市場に介入すべき（大きな政府）","新自由主義・マネタリズム・「小さな政府」回帰","比較優位に基づく自由貿易を主張した","後進国の産業保護のための保護貿易を主張した"],ans:1,exp:"フリードマン＝新自由主義（マネタリズム）・「小さな政府」回帰。サッチャー・レーガン・中曽根の三政権が実践した。"},
{cat:"経済体制・経済学者",q:"リカードの経済思想として正しいものはどれか？",opts:["後進国の産業保護のための保護貿易を主張した","比較生産費説（比較優位）に基づく自由貿易を主張した","政府が市場に介入すべき（大きな政府）","新自由主義・マネタリズムを主張した"],ans:1,exp:"リカード＝比較生産費説（比較優位）→自由貿易推進。リスト（保護貿易）と逆に覚えない。「リカード→自由、リスト→保護」。"},
{cat:"経済体制・経済学者",q:"リストの経済思想として正しいものはどれか？",opts:["比較生産費説（比較優位）に基づく自由貿易を主張した","後進国の産業保護のための保護貿易を主張した","新自由主義・マネタリズムを主張した","政府が市場に介入すべき（大きな政府）"],ans:1,exp:"リスト＝保護貿易論（リカードの自由貿易論への反論・後進国の産業保護を主張）。「リカード→自由、リスト→保護」。"},
{cat:"経済体制・経済学者",q:"新自由主義政策を実践したサッチャー・レーガン・中曽根三政権に共通することはどれか？",opts:["福祉拡大・政府介入強化・大きな政府","規制緩和・国有企業民営化・小さな政府","保護貿易・関税強化・国内産業保護","中央銀行への権限集中・金融統制強化"],ans:1,exp:"新自由主義三政権（サ・レ・中）の共通点：規制緩和・国有企業民営化・「小さな政府」。フリードマンのマネタリズム理論が理論的根拠。"},
{cat:"経済体制・経済学者",q:"カルテルの説明として正しいものはどれか？",opts:["同業他社が直接合併して一社になること","持株会社が異業種企業をピラミッド型に支配すること","同業他社が独立を保ちながら価格・生産量などを協定すること","異業種の企業が合併して多角化すること"],ans:2,exp:"カルテル（協定）＝同業他社が独立を保ちながら価格・生産量を協定（「一緒に値上げ」）。合併はトラスト、持株会社支配はコンツェルン。"},
{cat:"経済体制・経済学者",q:"トラストの説明として正しいものはどれか？",opts:["同業他社が独立を保ちながら価格・生産量を協定すること","同業他社が直接合併して一社になること","持株会社が異業種企業をピラミッド型に支配すること","異業種の企業が緩やかな提携関係を結ぶこと"],ans:1,exp:"トラスト（合併）＝同業他社が直接合併して一社になる（「合体」）。価格協定はカルテル、持株会社支配はコンツェルン。"},
{cat:"経済体制・経済学者",q:"コンツェルンの説明として正しいものはどれか？",opts:["同業他社が独立を保ちながら価格・生産量を協定すること","同業他社が直接合併して一社になること","持株会社が異業種企業をピラミッド型に支配すること（日本の旧財閥型）","銀行と産業企業が融合した企業グループ"],ans:2,exp:"コンツェルン（財閥）＝持株会社が異業種企業をピラミッド型に支配（「財閥のボスが全部支配」）。日本の旧財閥（三井・三菱等）がこの形態。"},
{cat:"財政政策",q:"日本の歳出で最も大きい費目はどれか？",opts:["国債費（約27%）","防衛費（約6%）","社会保障関係費（約33%）","公共事業費（約6%）"],ans:2,exp:"歳出第一位＝社会保障関係費（約33%）。第二位は国債費（約27%）。「社会が一番、国債が二番」。少子高齢化で社会保障費が増大し続けている。"},
{cat:"財政政策",q:"日本の歳出で第二位の費目はどれか？",opts:["防衛費","社会保障関係費","国債費（約27%）","地方交付税交付金"],ans:2,exp:"歳出第二位＝国債費（約27%）。第一位は社会保障関係費（約33%）。「社会が一番、国債が二番」。"},
{cat:"財政政策",q:"建設国債が初めて発行された年はいつか？",opts:["1955年","1961年","1966年","1975年"],ans:2,exp:"建設国債（4条公債）が初めて発行されたのは1966年。財政法で認められた合法的な国債で道路・ダムなど公共事業向け。"},
{cat:"財政政策",q:"赤字国債が初めて発行された年はいつか？",opts:["1966年","1970年","1975年","1980年"],ans:2,exp:"赤字国債（特例公債）が初めて発行されたのは1975年（第一次石油危機後の財政悪化が原因）。財政法では原則禁止→特例法を毎年制定して発行。"},
{cat:"財政政策",q:"消費税の「逆進性」とはどういう意味か？",opts:["高所得者ほど税負担の割合が重くなること","低所得者ほど収入に占める税負担の割合が重くなること","景気が悪いときほど税収が増えること","税率が物価に連動して上昇すること"],ans:1,exp:"逆進性＝消費税は一律の税率（比例税）なので、低所得者ほど収入に占める税負担の割合が重くなる性質。累進課税（所得税等）とは逆。"},
{cat:"財政政策",q:"クロヨン（964）が示す「9」は何の数字か？",opts:["農家の所得捕捉率（9割）","自営業の所得捕捉率（9割）","サラリーマンの所得捕捉率（9割）","公務員の所得捕捉率（9割）"],ans:2,exp:"クロヨン＝サラリーマン9割・自営業6割・農家4割の所得捕捉率の格差。サラリーマンは源泉徴収で正確に捕捉されるため9割が高い。"},
{cat:"財政政策",q:"「ビルト・イン・スタビライザー（自動安定化装置）」の二本柱はどれか？",opts:["金利調整と為替介入","累進課税と社会保障給付","公共事業と減税","輸出補助金と輸入関税"],ans:1,exp:"ビルト・イン・スタビライザー＝①累進課税（好況時→税収増→消費抑制）②社会保障給付（不況時→給付増→消費支持）の二本柱で景気を自動安定化。"},
{cat:"財政政策",q:"日本の「市中消化の原則」とは何か？",opts:["国債は市場（民間）で消化し、日銀が直接引き受けることは禁止","国債は地方自治体が消化しなければならない","国債の発行は市町村の承認が必要","国債の利子は市場金利に自動的に連動する"],ans:0,exp:"市中消化の原則＝国債は市場（民間金融機関等）で消化する。日銀が国債を直接引き受けることは財政法で禁止（インフレ防止のため）。"},
{cat:"金融・日銀政策",q:"コスト・プッシュ・インフレの具体例として正しいものはどれか？",opts:["消費拡大による需要過多で物価が上昇","石油危機で原材料費が上昇し物価が上がった「狂乱物価」","好景気による賃金上昇で消費が増え物価が上昇","輸出増大による外貨流入で国内通貨量が増加"],ans:1,exp:"コスト・プッシュ・インフレの典型例＝第一次石油危機（1973年）による原材料費上昇→「狂乱物価」。需要過多によるインフレはディマンド・プル。"},
{cat:"金融・日銀政策",q:"インフレ時に「得をする」のはどちらか？",opts:["預金をしている人（債権者）","お金を借りている人（債務者）","現金を多く持っている人","固定給の労働者"],ans:1,exp:"インフレ→お金の価値が下がる→借金（債務）の実質負担が軽くなる→債務者が得をする。預金（債権）の実質価値は下がるので債権者は損をする。"},
{cat:"金融・日銀政策",q:"日本銀行の「発券銀行」としての役割とは何か？",opts:["市中銀行に融資を行う","政府の預金を管理する","紙幣（日本銀行券）を独占的に発行する","外国為替の管理を行う"],ans:2,exp:"発券銀行＝紙幣（日本銀行券）を独占的に発行する権限を持つ。他の二大役割は「銀行の銀行」（民間銀行への融資）と「政府の銀行」（政府預金管理）。"},
{cat:"金融・日銀政策",q:"「信用創造」を行うのはどこか？",opts:["日本銀行（中央銀行）","市中銀行（民間銀行）","財務省","証券取引所"],ans:1,exp:"信用創造＝市中銀行（民間銀行）が行う。預金の一部を準備金として残し残りを貸し出す→連鎖的に通貨が増える仕組み。日銀ではない。"},
{cat:"金融・日銀政策",q:"マイナス金利政策の目的として正しいものはどれか？",opts:["個人の預金から利息を取ることで消費を促す","銀行が日銀に超過準備預金すると利息を取られるため、銀行に貸し出しを促す","外国資本を排除するために金利をマイナスにする","インフレを抑制するために資金量を減らす"],ans:1,exp:"マイナス金利＝銀行が日銀に超過預金すると-0.1%の利息を取られる→銀行に企業・個人への貸し出しを促すことが目的。個人の預金がマイナスになるわけではない。"},
{cat:"金融・日銀政策",q:"金本位制を世界で最初に確立した国はどこか？",opts:["アメリカ","フランス","イギリス（1816年）","ドイツ"],ans:2,exp:"金本位制を最初に確立したのはイギリス（1816年）。日本は1897年に採用。1929年の大恐慌後、各国が順次離脱→管理通貨制度へ。"},
{cat:"金融・日銀政策",q:"日本が金本位制を採用した年はいつか？",opts:["1868年（明治維新）","1889年（大日本帝国憲法制定）","1897年（日露戦争前）","1905年（ポーツマス条約）"],ans:2,exp:"日本の金本位制採用は1897年（日清戦争の賠償金を準備金として活用）。最初に確立したイギリス（1816年）とセットで覚える。"},
{cat:"金融・日銀政策",q:"金利が上昇すると為替はどう動くか？",opts:["自国通貨安（円安）になる","自国通貨高（円高）になる","為替には影響しない","一時的に通貨安になった後通貨高になる"],ans:1,exp:"金利上昇→海外から高金利を求めて資金が流入→自国通貨の需要増加→通貨高（円高）になる。「金利上昇→円高」と覚える。"},
{cat:"国際経済・貿易",q:"プラザ合意（1985年）の内容として正しいものはどれか？",opts:["ドル高を誘導して米国の輸出を減らす","ドル安・円高を誘導して米国の貿易赤字を減らす","固定相場制への回帰を決定した","日本の関税引き下げを求めた"],ans:1,exp:"プラザ合意（1985年・G5）＝ドル安・円高誘導（米国の貿易赤字削減が目的）→日本では円高不況→産業空洞化が加速した。"},
{cat:"国際経済・貿易",q:"ルーブル合意（1987年）の目的として正しいものはどれか？",opts:["ドル安をさらに進める","プラザ合意後の過度なドル安を阻止する","固定相場制に戻す","日本の対米輸出を制限する"],ans:1,exp:"ルーブル合意（1987年・G7）＝プラザ合意後の行き過ぎたドル安を阻止することが目的。「プラザ85→ルーブル87」の順で覚える。"},
{cat:"国際経済・貿易",q:"G5（プラザ合意1985年）の構成国として正しいものはどれか？",opts:["米・英・仏・独・伊（イタリアを含む）","米・英・仏・西ドイツ・日本","米・英・中・日本・仏","米・独・日・伊・加"],ans:1,exp:"G5＝米・英・仏・西ドイツ・日本。イタリアは含まれない。「G5にイタリアなし」と覚える。G7はここにイタリアとカナダが加わる。"},
{cat:"国際経済・貿易",q:"ニクソン・ショック（1971年）の内容として正しいものはどれか？",opts:["ドルを切り下げて固定相場を変更した","金とドルの交換を停止した（金ドル本位制の崩壊）","アメリカが変動相場制への移行を宣言した","アメリカが対日貿易制裁を発動した"],ans:1,exp:"ニクソン・ショック（1971年）＝金とドルの交換停止（金ドル本位制の崩壊）。ブレトン・ウッズ体制が崩壊。1973年に変動相場制へ移行。"},
{cat:"国際経済・貿易",q:"スミソニアン協定（1971年）後の為替レートはいくらになったか？",opts:["1ドル＝360円","1ドル＝308円","1ドル＝250円","1ドル＝200円"],ans:1,exp:"スミソニアン協定（1971年12月）＝1ドル＝360円から308円に切り上げ（円高）。その後1973年に変動相場制へ移行。"},
{cat:"国際経済・貿易",q:"キングストン合意（1976年）の内容として正しいものはどれか？",opts:["固定相場制への回帰を決定した","変動相場制を国際的に公式に認めた","新たな金ドル本位制を確立した","G7を設立した"],ans:1,exp:"キングストン合意（1976年）＝変動相場制を公式に認めた国際合意（IMF協定改正）。ニクソンショック（1971年）・スミソニアン協定（1971年）・変動相場制移行（1973年）の後に来る。"},
{cat:"国際経済・貿易",q:"日本の経常収支の黒字を支えている最大の要因はどれか？",opts:["貿易収支（モノの輸出入）の大幅黒字","第一次所得収支（海外投資からの利子・配当）の大幅黒字","サービス収支の黒字","政府の外貨介入"],ans:1,exp:"日本の経常収支黒字の最大要因＝第一次所得収支（海外に積み上げた投資からの利子・配当）。近年は貿易収支が赤字になることもある。「貿易ではなく海外投資収益」が頻出。"},
{cat:"国際経済・貿易",q:"第一次所得収支とはどのような収支か？",opts:["モノ（財）の輸出入の差","旅行・運輸・特許料などサービスの収支","海外投資からの利子・配当の収支","無償援助・国際機関分担金の収支"],ans:2,exp:"第一次所得収支＝海外投資（株式・債券・直接投資等）からの利子・配当の受け取りと支払いの差。日本の経常収支黒字の最大要因。"},
{cat:"国際経済・貿易",q:"GATTとWTOで異なる点として正しいものはどれか？",opts:["GATTは常設国際機関、WTOは国際協定（弱い）","GATTは国際協定（弱い）、WTOは常設国際機関（ジュネーヴ・紛争解決手続きあり）","GATTは農業を含む、WTOは農業を除外","どちらも全く同じ機能を持つ"],ans:1,exp:"GATT（1947年）＝国際協定（組織ではない・農業除外）。WTO（1995年）＝常設国際機関（ジュネーヴ）・農業・サービス・知財も対象・ネガティブ・コンセンサス方式。"},
{cat:"国際経済・貿易",q:"EU成立の歴史で正しい順番はどれか？",opts:["EEC→ECSC→EC→EU","ECSC（1952）→EEC（1957）→EC（1967）→EU（1993）","EU→EC→EEC→ECSC","EC→EU→EEC→ECSC"],ans:1,exp:"ECSC（欧州石炭鉄鋼共同体）1952年→EEC（欧州経済共同体）1957年→EC（欧州共同体）1967年→EU（欧州連合）1993年（マーストリヒト条約）。"},
{cat:"国際経済・貿易",q:"ユーロを導入していないEU加盟国として正しいものはどれか？",opts:["フランス・ドイツ・オランダ","スウェーデン・デンマーク（イギリスは2020年にEU離脱）","ポーランド・ハンガリー・チェコ（EU加盟・ユーロ未導入）","ノルウェー・スイス（EU非加盟）"],ans:1,exp:"EU加盟だがユーロ不参加の代表的三か国（出題頻度高）＝イギリス（2020年EU離脱）・スウェーデン・デンマーク。「英・スウェーデン・デンマーク」と覚える。"},
{cat:"日本経済史",q:"1920年代に日本で起きた三大恐慌の正しい順番はどれか？",opts:["震災恐慌→戦後恐慌→金融恐慌","戦後恐慌（1920）→震災恐慌（1923）→金融恐慌（1927）","金融恐慌→戦後恐慌→震災恐慌","金融恐慌（1927）→震災恐慌（1923）→戦後恐慌（1920）"],ans:1,exp:"「20・23・27」で覚える。戦後恐慌1920（欧州市場復帰）→震災恐慌1923（関東大震災）→金融恐慌1927（中小銀行倒産）。"},
{cat:"日本経済史",q:"ドッジ・ラインで設定された固定為替レートはいくらか？",opts:["1ドル＝270円","1ドル＝308円","1ドル＝360円","1ドル＝400円"],ans:2,exp:"ドッジ・ライン（1949年）で設定された固定為替レートは1ドル＝360円。超均衡予算によるインフレ収束と合わせてドッジ・ライン二本柱。"},
{cat:"日本経済史",q:"傾斜生産方式（1946-47年）で重点的に資源を集中した産業はどれか？",opts:["繊維・農業","自動車・航空機","石炭・鉄鋼","電機・化学"],ans:2,exp:"傾斜生産方式＝石炭と鉄鋼（基幹産業）に資源・資金を集中投下→生産回復の連鎖効果を狙った。「石炭と鉄鋼の二本柱」を覚える。"},
{cat:"日本経済史",q:"朝鮮戦争（1950年）が日本経済に与えた影響として正しいものはどれか？",opts:["輸出が減少し不況になった","米軍の物資調達（特需）によりドッジ・デフレから脱出した","インフレが加速し生活水準が低下した","日本が直接参戦したため財政が悪化した"],ans:1,exp:"朝鮮戦争特需＝米軍が日本に大量の物資を発注→特需景気→ドッジ・デフレから脱出。「特需景気1950年＝朝鮮戦争のおかげ」と覚える。"},
{cat:"日本経済史",q:"「神武景気」（1954-57年）の象徴とされた「三種の神器」はどれか？",opts:["自動車・カラーテレビ・エアコン（3C）","冷蔵庫・洗濯機・白黒テレビ","パソコン・携帯電話・デジタルカメラ","新幹線・高速道路・東京タワー"],ans:1,exp:"神武景気の「三種の神器」＝冷蔵庫・洗濯機・白黒テレビ。その後のいざなぎ景気（1965-70年）の象徴は3C（カラーTV・クーラー・カー）。"},
{cat:"日本経済史",q:"第一次石油危機（1973年）を引き起こした直接の原因はどれか？",opts:["イラン革命によるイランの石油生産停止","第4次中東戦争に際してアラブ諸国が石油輸出を制限した","ソ連のアフガニスタン侵攻への経済制裁","イラクのクウェート侵攻（湾岸危機）"],ans:1,exp:"第一次石油危機（1973年）＝第4次中東戦争（イスラエルvsアラブ）に際してOAPECが石油輸出禁止・削減→原油価格4倍。第二次石油危機（1979年）はイラン革命。"},
{cat:"日本経済史",q:"第二次石油危機（1979年）を引き起こした直接の原因はどれか？",opts:["第4次中東戦争によるアラブの石油禁輸","イラン革命によるイランの石油生産停止","ソ連のアフガニスタン侵攻への経済制裁","イラクのクウェート侵攻（湾岸危機）"],ans:1,exp:"第二次石油危機（1979年）＝イラン革命によるイランの石油生産停止が原因。第一次石油危機（1973年）は第4次中東戦争。二つを混同しない。"},
{cat:"日本経済史",q:"バブル景気（1986-91年）の引き金となった日本銀行の政策はどれか？",opts:["金利を急激に引き上げた","公定歩合を2.5%という超低金利に設定した","外国為替への大規模介入を行った","国債を大量に発行した"],ans:1,exp:"バブル景気の引き金＝公定歩合を2.5%という超低金利に設定（プラザ合意後の円高不況対策）→余ったお金が不動産・株式投機に流れた。"},
{cat:"日本経済史",q:"アジア通貨危機（1997年）はどの国の通貨暴落から始まったか？",opts:["韓国ウォン","インドネシア・ルピア","タイ・バーツ","フィリピン・ペソ"],ans:2,exp:"アジア通貨危機（1997年）＝タイ・バーツの暴落から始まり韓国等に波及。日本では銀行倒産が相次いだ。同年消費税が3%から5%に引き上げられ景気がさらに悪化。"},
{cat:"労働・社会保障",q:"日本式経営の「三本柱」のうち「年功序列型賃金制」の特徴はどれか？",opts:["仕事の成果に基づいて賃金が決まる","勤続年数・年齢に応じて賃金・役職が上がる","業界全体で統一された賃金が設定される","入社時の能力試験によって賃金が決まる"],ans:1,exp:"年功序列型賃金制＝勤続年数・年齢に応じて賃金・役職が上がる仕組み。成果主義（能力給）とは対照的。近年は成果主義へ移行する企業が増えている。"},
{cat:"労働・社会保障",q:"日本式経営の「企業別組合」の特徴として正しいものはどれか？",opts:["同じ産業の全企業の労働者が一つの組合に加入する","同じ会社・企業の労働者が一つの組合を作る","職種・技能ごとに組合が組織される","政党と一体化した組合"],ans:1,exp:"企業別組合＝同じ会社・企業の労働者が一つの組合を作る（会社単位の組合）。欧米では産業別組合（同じ産業の全企業の労働者が加入）が一般的。"},
{cat:"労働・社会保障",q:"労働基準法で定める1日の法定労働時間はどれか？",opts:["6時間","7時間","8時間","10時間"],ans:2,exp:"法定労働時間＝1日8時間・週40時間（労働基準法）。超える場合は割増賃金が必要（25%以上）。「8時間・40時間」を正確に覚える。"},
{cat:"労働・社会保障",q:"男女雇用機会均等法が制定された年はいつか？",opts:["1975年","1980年","1985年","1997年"],ans:2,exp:"男女雇用機会均等法制定は1985年（採用・昇進での差別を努力義務規定）。1997年改正で努力義務→禁止規定に強化＋セクハラ防止義務追加。「1985年制定・1997年改正」。"},
{cat:"労働・社会保障",q:"PL法（製造物責任法）の特徴として正しいものはどれか？",opts:["消費者が製造者の過失を証明しなければ賠償請求できない（過失責任）","消費者は製造者の過失を証明しなくても賠償請求できる（無過失責任）","製造者は一切の責任を負わない","国が製造者の代わりに賠償する"],ans:1,exp:"PL法（1994年）＝無過失責任（消費者が製造者の過失を証明しなくても、製品の欠陥を証明すれば賠償請求できる）。消費者保護の観点から過失責任から無過失責任へ。"},
{cat:"国際政治・国連",q:"国連安全保障理事会の常任理事国はどこか？",opts:["米・英・仏・中・独","米・英・仏・中・露","米・英・独・仏・日","米・英・仏・中・印"],ans:1,exp:"常任理事国（P5）＝米・英・仏・中（中華人民共和国）・露の5か国。それぞれ拒否権（veto）を持つ。日本・ドイツ・インドは非常任理事国。"},
{cat:"国際政治・国連",q:"国連安全保障理事会の非常任理事国の任期はどれか？",opts:["1年","2年","3年","5年"],ans:1,exp:"非常任理事国の任期＝2年（毎年5か国改選）。常任理事国は任期なし（永続）。「安保理15か国＝常任5＋非常任10」と覚える。"},
{cat:"国際政治・国連",q:"国際司法裁判所（ICJ）の所在地はどこか？",opts:["ニューヨーク","ジュネーヴ","ハーグ（オランダ）","ウィーン"],ans:2,exp:"国際司法裁判所（ICJ）の所在地はハーグ（オランダ）。WTOはジュネーヴ、IMFはワシントンD.C.と混同しない。裁判官15人・任期9年。"},
{cat:"国際政治・国連",q:"国連総会での「重要事項」の決議に必要な賛成割合はどれか？",opts:["過半数（1/2以上）","3分の2以上","4分の3以上","全会一致"],ans:1,exp:"国連総会の重要事項（平和・安全保障・予算等）＝3分の2以上の賛成が必要。一般事項＝過半数。決議は法的拘束力なし（勧告のみ）。"},
{cat:"世界・日本史",q:"アメリカ南北戦争で「脱退して南部連合国を結成した」のはどちらか？",opts:["北部（工業中心）","南部（農業・綿花輸出中心）","両方が分離を宣言した","どちらも脱退していない"],ans:1,exp:"南北戦争：脱退したのは南部（農業・綿花輸出・奴隷制維持）。北部（工業・保護関税希望）が連邦維持側。「脱退したのは南部」と覚える。"},
{cat:"世界・日本史",q:"リンカーンが奴隷解放宣言を出した年はいつか？",opts:["1861年（南北戦争開始時）","1863年","1865年（南北戦争終結時）","1870年"],ans:1,exp:"奴隷解放宣言は1863年（南北戦争の途中）。南北戦争開始は1861年。戦後1865年に修正第13条で奴隷制が正式に廃止された。"},
{cat:"世界・日本史",q:"ドイツ帝国（1871年）の宰相ビスマルクの最大の外交目標はどれか？",opts:["ドイツの海外植民地を拡大すること","フランスを孤立させること","イギリスと同盟を結ぶこと","ロシアを征服すること"],ans:1,exp:"ビスマルク外交の核心＝フランスを孤立させること。手段：三国同盟（独・墺・伊）＋露との再保障条約。植民地拡張には消極的だった。"},
{cat:"世界・日本史",q:"日本国憲法の制定過程について正しいものはどれか？",opts:["天皇が起草を主導した","GHQが草案を作成し大日本帝国憲法の改正手続きを形式上踏んで制定された","講和条約（1952年）発効後に施行された","松本委員会の草案がそのまま採用された"],ans:1,exp:"日本国憲法：GHQが草案を主導→大日本帝国憲法73条の改正手続きを形式上踏んで制定（1947年5月3日施行）。松本委員会草案はGHQに拒否された。"},
{cat:"地理・欧州",q:"イギリスの主要エネルギー源として正しいものはどれか？",opts:["ライン川の水力発電","アルプスの地熱発電","北海油田の石油・天然ガス（近年は洋上風力も急発展）","国内炭田の石炭（現在も主力）"],ans:2,exp:"イギリスの主要エネルギー＝北海油田の石油・天然ガス。近年は洋上風力発電（offshore wind）が急速に発展し世界有数の規模になっている。"},
{cat:"地理・欧州",q:"フランスの発電量の大部分を占めるエネルギーはどれか？",opts:["水力発電","風力・太陽光発電","原子力発電（発電量の70%以上）","石炭火力発電"],ans:2,exp:"フランスは発電量の70%以上を原子力発電に依存（世界最高水準）。エネルギーグラフ問題では「原子力が圧倒的に高い＝フランス」と判断する。"},
{cat:"地理・欧州",q:"ドイツが推進している主要エネルギーはどれか？",opts:["原子力発電（2023年まで全廃炉）","北海油田の石油・天然ガス","風力・太陽光発電（脱原発により新エネルギー比率が欧州最高水準）","ライン川の水力発電"],ans:2,exp:"ドイツ＝脱原発政策（2023年に全廃炉完了）により風力・太陽光発電の比率が欧州最高水準。「新エネルギーが最も高い＝ドイツ」と判断する。"},
{cat:"地理・欧州",q:"イタリアの農業でオリーブ・ブドウ・柑橘類が栽培されているのはどの地域か？",opts:["北部（ポー川平野）","中部（ローマ周辺）","南部（地中海式農業の代表）","全国均等に栽培"],ans:2,exp:"イタリア南部＝地中海式農業の代表（オリーブ・ブドウ・柑橘類）。北部はポー川平野で小麦・玉米・稲作・酪農が中心。南北の経済格差が大きい。"},
{cat:"地理・欧州",q:"イタリアの北部で盛んな農業として正しいものはどれか？",opts:["オリーブ・ブドウ・柑橘類（地中海式農業）","小麦・玉米・稲作と酪農","サトウキビ・コーヒー","バナナ・カカオ"],ans:1,exp:"イタリア北部（ポー川平野・温帯気候）＝小麦・玉米・稲作と酪農が中心。南部は地中海式農業（オリーブ・ブドウ・柑橘類）。南北で農業の種類が異なる。"},
{cat:"地理・欧州",q:"スペインの国土の大部分を占める地形はどれか？",opts:["ライン川流域の低平な平野","ピレネー山脈の山岳地帯","メセタ高原（平均標高600-700m）","イベリア半島北部の湿潤な平野"],ans:2,exp:"スペインの最大の地形的特徴＝メセタ高原（国土の大部分を占める・平均標高600-700m・乾燥した大陸性気候）。「スペイン＝メセタ高原」と覚える。"},
{cat:"地理・欧州",q:"オレンジ・オリーブの生産量が世界第一位の国はどこか？",opts:["イタリア","フランス","スペイン","ギリシャ"],ans:2,exp:"オレンジ・オリーブの産量世界第一位＝スペイン。スペインの南部（アンダルシア地方等）で地中海式農業として栽培されている。"},
{cat:"地理・欧州",q:"スペインが世界トップ水準を誇るエネルギーはどれか？",opts:["原子力発電","北海油田の石油","風力発電（世界トップクラス）","水力発電"],ans:2,exp:"スペイン＝風力発電が世界トップクラス（欧州でも有数）。太陽光発電も急速に発展（日照条件が良いイベリア半島の特性）。"},
{cat:"地理・欧州",q:"オランダの国土の約何分の一が海面下に位置するか？",opts:["約10分の1","約4分の1","約3分の1","約半分"],ans:1,exp:"オランダ国土の約四分の一が海面下（ポルダー＝干拓地）。「世界一低い国」。チーズ等の酪農大国。エネルギーは北部フローニンゲンガス田の天然ガス。"},
{cat:"地理・欧州",q:"スイスが主力エネルギーとしているものはどれか？",opts:["北海油田の石油","石炭火力","水力発電（アルプスの豊富な水資源を活用）","風力・太陽光発電"],ans:2,exp:"スイス＝水力発電の比率が非常に高い（アルプスの豊富な水資源を活用）。化石燃料はほぼ輸入。原子力も一部あるが段階的廃止方針。"},
{cat:"地理・欧州",q:"スイスで主に発達している産業はどれか？",opts:["重化学工業・鉄鋼業","農業（小麦・大豆の大量生産）","精密機械・時計・医薬品（山岳地帯のため農業は発達しにくい）","石油精製・化学工業"],ans:2,exp:"スイス＝高原山地型気候で農業は発達しにくい→精密機械・時計・医薬品産業が世界的に有名。農業では酪農が中心（チーズ等）。"},
{cat:"地理・欧州",q:"ノルウェーの主要エネルギー源はどれか？",opts:["アルプスの水力発電","国内炭田の石炭","北海油田の石油・天然ガス","フィヨルドを活用した潮力発電"],ans:2,exp:"ノルウェー＝北海油田（ノルウェー領）の石油・天然ガスが主要エネルギー。フィヨルド地形が特徴。漁業も主要産業。高緯度・亜寒帯気候。"},
{cat:"地理・欧州",q:"ロシアの農業の特徴として正しいものはどれか？",opts:["コーヒー・カカオなどの熱帯作物が主力","南部のチェルノーゼム（黒土）地帯で小麦が中心・世界最大級の小麦輸出国","全国的に農業は不可能（永久凍土）","地中海式農業（オリーブ・ブドウ）が中心"],ans:1,exp:"ロシアの農業＝南部のチェルノーゼム（黒土）地帯で小麦が中心。世界最大級の小麦輸出国。チェルノーゼムは肥沃な黒色土壌でウクライナ（旧ソ連）も有名。"},
{cat:"地理・アメリカ大陸",q:"カナダの国土面積は世界で何位か？",opts:["世界第一位","世界第二位","世界第三位","世界第五位"],ans:1,exp:"カナダの面積＝世界第二位（ロシアに次ぐ）。首都はオタワ。大部分は亜寒帯・寒帯気候。プレーリーが世界有数の小麦（春小麦）産地。"},
{cat:"地理・アメリカ大陸",q:"カナダ楯状地の特徴として正しいものはどれか？",opts:["世界最新の造山帯で火山・地震が多い","世界最古の安定陸塊で鉄鉱石・ニッケル等の鉱物資源が豊富","肥沃な平野で世界有数の農業地帯","石炭・石油が豊富な堆積盆地"],ans:1,exp:"カナダ楯状地＝世界最古の安定陸塊（先カンブリア時代の岩石）。鉄鉱石・ニッケル等の鉱物資源が豊富。農業に適した土地ではなく鉱業地帯。"},
{cat:"地理・アメリカ大陸",q:"アメリカの航空産業（ボーイング等）が集中する州はどこか？",opts:["カリフォルニア州","テキサス州","フロリダ州","ワシントン州"],ans:3,exp:"アメリカの航空産業＝ワシントン州（ボーイング等）。航空産業は世界第一位。五大湖周辺の自動車産業（デトロイト）とは異なる地域。"},
{cat:"地理・アメリカ大陸",q:"アメリカのフロリダ州の気候と主要農産物として正しいものはどれか？",opts:["冷帯気候・小麦・大豆","地中海性気候・ブドウ・オリーブ","亜熱帯気候・亜熱帯作物（オレンジ等）","温暖湿潤気候・綿花"],ans:2,exp:"フロリダ州＝亜熱帯気候（東部最南端の突き出た半島）・亜熱帯作物（オレンジ等）が主要農産物。「フロリダ＝亜熱帯」と覚える。"},
{cat:"地理・アメリカ大陸",q:"アメリカの自動車産業（デトロイト）が集中する地域はどこか？",opts:["西海岸（カリフォルニア）","南部（テキサス）","五大湖周辺（東部中央）","北東部（ニューイングランド）"],ans:2,exp:"自動車産業デトロイト＝五大湖周辺（東部中央寄り）。アメリカの自動車産業は中国に次ぐ世界第二位の規模。「デトロイト＝五大湖」と覚える。"},
{cat:"地理・アメリカ大陸",q:"ブラジルの大豆産量の世界ランキングはどれか？",opts:["世界第三位","世界第二位","世界第一位","世界第四位"],ans:2,exp:"ブラジルの大豆産量＝世界第一位。その他コーヒー豆・砂糖・サトウキビ・オレンジも主要農産物。玉米産量は世界第三位。"},
{cat:"地理・アメリカ大陸",q:"ブラジルが主力としているエネルギーはどれか？",opts:["石炭火力","原子力発電","水力発電（比率が非常に高い）","天然ガス"],ans:2,exp:"ブラジル＝水力発電の比率が非常に高い（アマゾン川水系を活用・イタイプーダム等）。近年は海底油田開発で石油産量も増加。"},
{cat:"地理・アメリカ大陸",q:"南米でワインの輸出が盛んな「細長い国」はどこか？",opts:["アルゼンチン","ペルー","ボリビア","チリ"],ans:3,exp:"チリ＝南米西岸に位置する細長い国（南北4300km）。中部に地中海性気候→ブドウ栽培とワイン生産・輸出が盛ん（南米有数のワイン輸出国）。"},
{cat:"地理・大洋州",q:"オーストラリアの首都はどこか？",opts:["シドニー","メルボルン","ブリスベン","キャンベラ"],ans:3,exp:"オーストラリアの首都＝キャンベラ（Canberra）。主要都市のシドニー・メルボルンは首都ではない。首都は東南沿海に位置するが、東部最大都市はシドニー。"},
{cat:"地理・大洋州",q:"オーストラリアが世界最大の輸出国である鉱物資源はどれか？",opts:["石油・天然ガス","金・ダイヤモンド","石炭・鉄鉱石","銅・アルミニウム"],ans:2,exp:"オーストラリア＝石炭・鉄鉱石の世界最大の輸出国（主な輸出先は日本・中国）。羊毛・綿羊数も世界最多。「オーストラリア＝石炭・鉄鉱石・羊毛」。"},
{cat:"地理・大洋州",q:"ニュージーランドで非常に発達している発電方式はどれか？",opts:["石炭火力発電","原子力発電","水力発電","地熱発電"],ans:3,exp:"ニュージーランド＝地熱発電が非常に発達（新期造山帯・火山活動が活発→地熱資源が豊富）。世界有数の地熱発電比率を誇る。"},
{cat:"地理・アフリカ・アジア",q:"タイの国教はどれか？",opts:["イスラム教","キリスト教","仏教","ヒンドゥー教"],ans:2,exp:"タイ＝仏教。東南アジアで植民地にならなかった独立国（仏・英の緩衝地帯として独立維持）。世界最大の米輸出国・世界最大の天然ゴム生産国でもある。"},
{cat:"地理・アフリカ・アジア",q:"タイの旧宗主国はどこか？",opts:["フランス","イギリス","オランダ","なし（独立を維持した）"],ans:3,exp:"タイ＝植民地にならなかった独立国（フランスとイギリスの緩衝地帯として独立維持）。東南アジアで植民地にならなかった唯一の国。"},
{cat:"地理・アフリカ・アジア",q:"マレーシアの宗教として正しいものはどれか？",opts:["仏教（主体）","イスラム教（主体）","キリスト教（主体）","ヒンドゥー教（主体）"],ans:1,exp:"マレーシア＝イスラム教が主体（多民族国家で中国系・インド系も多い）。旧宗主国はイギリス。天然ゴム・パーム油の産量が多い。"},
{cat:"地理・アフリカ・アジア",q:"マレーシアの旧宗主国はどこか？",opts:["フランス","オランダ","イギリス","スペイン"],ans:2,exp:"マレーシア＝旧宗主国はイギリス。宗教はイスラム教が主体。多民族国家（マレー系・中国系・インド系）。天然ゴム・パーム油の産量が多い。"},
{cat:"地理・アフリカ・アジア",q:"フィリピンの旧宗主国として正しいものはどれか？",opts:["フランス→イギリス","オランダ→アメリカ","スペイン→アメリカ","イギリス→フランス"],ans:2,exp:"フィリピン＝まずスペインが植民地化→1898年米西戦争でアメリカが獲得→独立。キリスト教（カトリック）が主体。多島国で火山・地震が多い。"},
{cat:"地理・アフリカ・アジア",q:"ベトナムの旧宗主国はどこか？",opts:["イギリス","フランス","オランダ","スペイン"],ans:1,exp:"ベトナム＝旧宗主国はフランス（フランス領インドシナ）。仏教が中心。主要輸出品はコーヒー・米。資源は石油。"},
{cat:"地理・アフリカ・アジア",q:"インドネシアの旧宗主国はどこか？",opts:["イギリス","フランス","スペイン","オランダ"],ans:3,exp:"インドネシア＝旧宗主国はオランダ（オランダ領東インド）。世界で最も島が多い国（約17,000島）。世界最多のイスラム教徒の国。"},
{cat:"地理・アフリカ・アジア",q:"文莱（ブルネイ）の主要エネルギー・産業はどれか？",opts:["農業（天然ゴム・パーム油）","石油・天然ガス（経済的に豊か）","観光業・金融業","漁業・林業"],ans:1,exp:"文莱（ブルネイ）＝石油・天然ガスが豊富で経済的に豊か（一人当たりGDPがアジア有数）。旧宗主国はイギリス。宗教はイスラム教。"},
{cat:"地理・アフリカ・アジア",q:"世界最大の米輸出国はどこか？",opts:["中国","インド","タイ","ベトナム"],ans:2,exp:"世界最大の米輸出国＝タイ。ベトナムも米の主要輸出国。米の生産量世界最大は中国→インドの順だが、輸出量ではタイが世界第一位。"},
{cat:"地理・アフリカ・アジア",q:"世界最大の天然ゴム生産国はどこか？",opts:["インドネシア","マレーシア","タイ","ベトナム"],ans:2,exp:"世界最大の天然ゴム生産国＝タイ。インドネシア・マレーシアも主要産地。東南アジアの熱帯気候がゴムノキの栽培に適している。"},
{cat:"地理・アフリカ・アジア",q:"インドの米・小麦の産量は世界で何位か？",opts:["世界第一位","世界第二位（中国に次ぐ）","世界第三位","世界第五位"],ans:1,exp:"インドの米・小麦の産量は「いずれも」中国に次ぐ世界第二位。インドの人口は世界第一位（2023年に中国を追い越した）。主要作物は棉花・米・小麦。"},
{cat:"地理・アフリカ・アジア",q:"マラッカ海峡が「日本の海上の生命線」と呼ばれる理由はどれか？",opts:["日本の漁船が最も多く通過する海峡だから","中東からの石油タンカーが通過する日本にとって重要な海上輸送路だから","日本の海軍基地が置かれている重要な軍事拠点だから","日本が建設した運河があるから"],ans:1,exp:"マラッカ海峡＝中東から日本への石油タンカーが必ず通過する海上輸送路→「日本の海上の生命線」と呼ばれる。マレー半島とスマトラ島の間に位置する。"},
{cat:"地理・アフリカ・アジア",q:"アフリカで独立を維持し続けた二か国はどれか？",opts:["エジプトとモロッコ","エチオピアとリベリア","ソマリアとスーダン","ナイジェリアとケニア"],ans:1,exp:"アフリカで植民地にならなかった独立国＝エチオピア（東北部・イタリアの侵攻を撃退）とリベリア（西北部・アメリカの解放奴隷が建国）の二か国。"},
{cat:"地理・アフリカ・アジア",q:"アフリカの植民地分割でイギリスが目指した政策はどれか？",opts:["横断政策（東西に横に植民地をつなぐ）","縦断政策（南北に縦に植民地をつなぐ）","沿岸部のみの植民地化","鉄道沿線のみの植民地化"],ans:1,exp:"イギリスのアフリカ政策＝縦断政策（南北に縦につなぐ・ケープタウンからカイロへ）。フランスは横断政策（東西に横につなぐ）。両者がスーダンで衝突（ファショダ事件）。"},
{cat:"宗教・文化",q:"ローマ教皇が統括するキリスト教の宗派はどれか？",opts:["プロテスタント","正教会（ロシア正教・ギリシャ正教）","カトリック（バチカンが本部）","聖公会（アングリカン）"],ans:2,exp:"ローマ教皇＝カトリックの最高指導者（バチカン市国に本部）。「ローマ教皇が出たら自動的にカトリック」と覚える。プロテスタントは教皇なし。"},
{cat:"宗教・文化",q:"16世紀のルターの宗教改革によって生まれたキリスト教の宗派はどれか？",opts:["カトリック","正教会","プロテスタント","イスラム教のスンニ派"],ans:2,exp:"プロテスタント＝1517年にルターがカトリック教会への抗議（宗教改革）を起こし誕生した宗派。ローマ教皇の権威を認めない。北欧・北米に多い。"},
{cat:"宗教・文化",q:"ギリシャ正教・ロシア正教が主に信仰されている地域はどれか？",opts:["西ヨーロッパ・北米","北ヨーロッパ・オーストラリア","東ヨーロッパ・ロシア圏","中東・北アフリカ"],ans:2,exp:"正教会（ギリシャ正教・ロシア正教）＝東ヨーロッパ・ロシア圏に多い。西欧はカトリック・プロテスタントが主体。「東欧ロシア圏＝正教会」と覚える。"},
{cat:"宗教・文化",q:"大西洋三角貿易でアフリカからアメリカへ運ばれたものはどれか？",opts:["武器・雑貨","砂糖・綿花","奴隷","銀・金"],ans:2,exp:"三角貿易の流れ：英→アフリカ（武器・雑貨）、アフリカ→アメリカ（奴隷）、アメリカ→英（砂糖・綿花・煙草等の農産物原料）。「アフリカからアメリカへは奴隷」。"},
{cat:"宗教・文化",q:"大西洋三角貿易でイギリスからアフリカへ運ばれたものはどれか？",opts:["奴隷","砂糖・綿花等の農産物原料","武器・雑貨","銀・金"],ans:2,exp:"三角貿易の流れ：英→アフリカ（武器・雑貨）、アフリカ→アメリカ（奴隷）、アメリカ→英（砂糖・綿花・煙草等の農産物原料）。「英からアフリカへは武器・雑貨」。"},
{cat:"日本政党政治",q:"日本最初の政党「愛国公党」を結成したのは誰か？",opts:["伊藤博文","大隈重信","板垣退助","原敬"],ans:2,exp:"日本最初の政党＝1874年の愛国公党。結成したのは板垣退助。伊藤博文は初代首相・内閣制度（1885年）、大隈重信は初の政党内閣（1898年）と混同しない。"},
{cat:"日本政党政治",q:"日本初代内閣総理大臣は誰か？",opts:["板垣退助","大隈重信","伊藤博文","原敬"],ans:2,exp:"初代内閣総理大臣＝伊藤博文（1885年）。板垣退助は愛国公党（1874年）、大隈重信は初の政党内閣（1898年）、原敬は初の本格的政党内閣（1918年）。"},
{cat:"日本政党政治",q:"55年体制が崩壊したとき成立した内閣の首相は誰か？",opts:["宮沢喜一","小泉純一郎","細川護熙","橋本龍太郎"],ans:2,exp:"55年体制崩壊（1993年）→細川護熙率いる非自民連立内閣が成立。宮沢喜一内閣に対する不信任決議が可決されたことが引き金。"},
{cat:"日本政党政治",q:"ロッキード事件（1976年）で逮捕された元首相は誰か？",opts:["佐藤栄作","田中角栄","中曽根康弘","竹下登"],ans:1,exp:"ロッキード事件（1976年）＝航空機選定をめぐる収賄で田中角栄元首相が逮捕。日本の戦後最大の政治腐敗事件の一つ。"},
{cat:"GDP・経済指標",q:"GDPの「三面等価の原則」の三つの面とは何か？",opts:["輸出面・輸入面・貿易面","生産面・分配面・支出面（三者は同一のものを異なる角度から見たもの）","消費面・投資面・政府支出面","名目面・実質面・潜在面"],ans:1,exp:"三面等価の原則：生産面（GDP）＝分配面（GNI）＝支出面（GNE）。三者は同一の経済活動を異なる側面から見たもので等しくなる。三者の合計ではない。"},
{cat:"GDP・経済指標",q:"デフレ時、名目成長率と実質成長率の関係はどうなるか？",opts:["名目成長率＞実質成長率","名目成長率＜実質成長率","名目成長率＝実質成長率","デフレ時は両方マイナスになる"],ans:1,exp:"デフレ時：物価が下落→GDPデフレーターがマイナス→名目成長率＜実質成長率。「デフレ＝名目が実質より低い」と覚える。インフレ時はその逆。"},
{cat:"地方自治・司法",q:"地方自治の「団体自治」の意味として正しいものはどれか？",opts:["住民の意思に基づいて行政が行われること","地方公共団体が中央政府から独立して自治を行うこと","地方議会が首長を監視すること","地方税を自主的に決定できること"],ans:1,exp:"団体自治＝地方公共団体が中央政府から独立して自治を行う（地方分権の側面）。住民自治＝住民の意思に基づいて行政が行われる（民主主義の側面）。"},
{cat:"地方自治・司法",q:"ブライスが「地方自治は民主主義の学校」と述べた意味として最も近いものはどれか？",opts:["地方の学校で民主主義を教えるべき","地方政治への参加を通じて市民が民主主義を学び実践する","地方自治体が大学を運営すべき","民主主義は地方から中央へと広がるべき"],ans:1,exp:"ブライスの「地方自治は民主主義の学校」＝地方政治への参加を通じて市民が民主主義を学び実践する→健全な民主主義の土台になるという考え方。"},
{cat:"地方自治・司法",q:"裁判員制度（2009年開始）の対象となる裁判はどれか？",opts:["すべての刑事事件","重大な民事事件","重大な刑事事件の第一審のみ","行政訴訟"],ans:2,exp:"裁判員制度＝重大刑事事件（殺人・傷害致死等）の第一審のみが対象。民事事件・行政訴訟は対象外。裁判員は量刑にも参加（アメリカの陪審員との違い）。"},

{cat:"地理・アメリカ大陸",q:"ニューヨークとワシントンD.C.の位置関係として正しいものはどれか？",opts:["ニューヨークがワシントンD.C.の南にある","ニューヨークがワシントンD.C.の北にある","ニューヨークとワシントンD.C.は西海岸にある","ニューヨークはアメリカ中部にある"],ans:1,exp:"東海岸に位置し、ニューヨークがワシントンD.C.の北にある。どちらもアメリカ東海岸。"},
{cat:"地理・アメリカ大陸",q:"サンフランシスコとロサンゼルスの位置関係として正しいものはどれか？",opts:["ロサンゼルスがサンフランシスコの北","サンフランシスコがロサンゼルスの北","両方とも東海岸","サンフランシスコは内陸部にある"],ans:1,exp:"どちらも西海岸のカリフォルニア州。サンフランシスコが北、ロサンゼルスが南。"},
{cat:"地理・アメリカ大陸",q:"シカゴが位置するアメリカの地域として正しいものはどれか？",opts:["西海岸","南部（テキサス周辺）","東部の中央寄り（五大湖周辺）","北東部のニューイングランド地方"],ans:2,exp:"シカゴは東部の中央寄り・五大湖周辺に位置する。近くにデトロイト（自動車産業）もある。"},
{cat:"地理・アメリカ大陸",q:"ラスベガスが位置するアメリカの地域として正しいものはどれか？",opts:["東海岸のフロリダ州","西海岸のカリフォルニア州内","カリフォルニア州の東側（ネバダ州・砂漠地帯）","五大湖周辺"],ans:2,exp:"ラスベガスはネバダ州（カリフォルニア州の東側・砂漠地帯）に位置する。"},
{cat:"地理・アメリカ大陸",q:"フロリダ州はアメリカのどこに位置するか？",opts:["西海岸の南端","東海岸の最南端にある突き出た半島","五大湖周辺","中部の内陸"],ans:1,exp:"フロリダ州はアメリカ東海岸の最南端に突き出た半島。亜熱帯気候で亜熱帯作物（オレンジ等）が主要農産物。"},
{cat:"地理・アメリカ大陸",q:"アメリカの東南部（温暖湿潤気候）の主要作物はどれか？",opts:["酪農・玉米・大豆","綿花","ブドウ・オリーブ","小麦"],ans:1,exp:"アメリカ東南部（温暖湿潤気候）の主要作物＝綿花。東北部（冷帯湿潤）は酪農・玉米・大豆。"},
{cat:"地理・アメリカ大陸",q:"アメリカの西北角（ワシントン州・オレゴン州）の気候と主要産業はどれか？",opts:["地中海性気候・ブドウ栽培","冷帯湿潤気候・綿花栽培","西岸海洋性気候・酪農業","熱帯気候・砂糖きび栽培"],ans:2,exp:"アメリカ西北角（ワシントン州・オレゴン州）＝西岸海洋性気候・酪農業が主要産業。ワシントン州は航空産業（ボーイング）も世界第一位。"},
{cat:"地理・アメリカ大陸",q:"アメリカの西南部カリフォルニアの気候として正しいものはどれか？",opts:["冷帯湿潤気候","熱帯雨林気候","地中海性気候","砂漠気候"],ans:2,exp:"カリフォルニア（サンフランシスコ・ロサンゼルス周辺）＝地中海性気候。地中海式農業（ブドウ・オリーブ・柑橘類等）が盛ん。"},
{cat:"地理・アメリカ大陸",q:"アメリカ西部の高山地帯の主要産業はどれか？",opts:["稲作","綿花栽培","畜牧業（周辺で小麦も栽培）","精密機械工業"],ans:2,exp:"アメリカ西部（ロッキー山脈周辺）の高山地帯＝畜牧業が主体。畜牧業の周囲で小麦も栽培される。"},
{cat:"地理・アメリカ大陸",q:"アメリカの現在のエネルギー事情として正しいものはどれか？",opts:["石油は全量輸入に依存","シェールオイル革命により現在世界最大の産油国","原子力発電が主力で石油はほとんど使わない","再生可能エネルギーだけで全エネルギーを賄っている"],ans:1,exp:"アメリカはシェールオイル革命により現在世界最大の産油国。石油・天然ガスが主力エネルギー。"},
{cat:"地理・アメリカ大陸",q:"南米と北米を分ける境界として一般的に使われるものはどれか？",opts:["赤道","ミシシッピ川","パナマ運河","アマゾン川"],ans:2,exp:"パナマ運河が南米と北米の境界として一般的に使われる。パナマ運河の北が北米、南が南米。"},
{cat:"地理・アメリカ大陸",q:"ブラジルは北半球と南半球のどちらにあるか？",opts:["北半球","南半球","赤道上で南北にまたがるがほとんどが南半球","完全に赤道上に位置する"],ans:2,exp:"ブラジルは赤道が北部を通過するが国土のほとんどは南半球に位置する。そのため6・7・8月が冬。"},
{cat:"地理・アメリカ大陸",q:"ブラジルの玉米（トウモロコシ）産量は世界第何位か？",opts:["世界第一位","世界第二位","世界第三位","世界第五位"],ans:2,exp:"ブラジルの玉米産量＝世界第三位。大豆は世界第一位、コーヒー豆・砂糖も世界トップクラス。"},
{cat:"地理・アメリカ大陸",q:"ブラジルの自動車産業は南米で何位か？",opts:["南米第三位","南米第二位","南米第一位","自動車産業はない"],ans:2,exp:"ブラジルの自動車産業は南米第一位。鉱石は豊富だが輸出せず国内消費が中心。牛肉の輸出も世界有数。"},
{cat:"地理・アメリカ大陸",q:"アルゼンチンの主要な輸出農産物として正しいものはどれか？",opts:["コーヒー・バナナ","小麦・玉米・牛肉","米・茶","オリーブ・ブドウ"],ans:1,exp:"アルゼンチン＝パンパ（温暖湿潤な大平原）で小麦・玉米を栽培、畜牧業が盛んで牛肉の輸出大国。"},
{cat:"地理・欧州",q:"イギリスの地形的特徴として正しいものはどれか？",opts:["全国が平坦な低地","東南部が低地・西北部が高地","北部が低地・南部が高地","全国が山岳地帯"],ans:1,exp:"イギリスの地形＝東南部が低地（ロンドン盆地等）、西北部が高地（スコットランド高地等）。「東南低地・西北高地」と覚える。"},
{cat:"地理・欧州",q:"ヨーロッパで最も人口が多い国はどこか？",opts:["フランス","イギリス","イタリア","ドイツ"],ans:3,exp:"ヨーロッパで最も人口が多い国＝ドイツ（約8400万人）。フランスは約6700万人、イギリスは約6700万人、イタリアは約6000万人。"},
{cat:"地理・欧州",q:"ドイツの首都ベルリンは国内のどの方角にあるか？",opts:["西部","南部","東部","北部"],ans:2,exp:"ベルリンはドイツの東部に位置する。冷戦時代は東西に分断されていた。南部にはミュンヘンがある。"},
{cat:"地理・欧州",q:"ドイツのミュンヘンは国内のどの方角にあるか？",opts:["北部","東部","西部","南部"],ans:3,exp:"ミュンヘンはドイツの南部に位置する（バイエルン州）。ベルリンは東部。ルール工業地帯は西部。"},
{cat:"地理・欧州",q:"ヨーロッパ最大の工業地帯はどこか？",opts:["マンチェスター工業地帯（イギリス）","ルール工業地帯（ドイツ）","パリ工業地帯（フランス）","ミラノ工業地帯（イタリア）"],ans:1,exp:"ヨーロッパ最大の工業地帯＝ルール工業地帯（ドイツ西部）。石炭・鉄鋼・機械・化学工業が発達。ライン川の水運を活用。"},
{cat:"地理・欧州",q:"フランスの面積はヨーロッパで何位か？",opts:["ヨーロッパ最大","ロシアに次いでヨーロッパ第二位","ヨーロッパ第三位","ヨーロッパ第五位"],ans:1,exp:"フランスの面積はロシアに次いでヨーロッパ第二位。西ヨーロッパに限れば最大。西ヨーロッパ最大の農業国でもある。"},
{cat:"地理・欧州",q:"イタリアの北部と南部のうち経済的に発展しているのはどちらか？",opts:["南部（ナポリ・シチリア等）","北部（ミラノ・トリノ等）","南北に経済格差はない","中部のみが発展"],ans:1,exp:"イタリアは北部（ミラノ・トリノ等）が経済的に発展。南部は農業中心で経済発展が遅れている→南北経済格差が大きい。"},
{cat:"地理・欧州",q:"イタリアのエネルギーで「ないもの」はどれか？",opts:["天然ガス","水力発電","石油輸入","原子力発電"],ans:3,exp:"イタリアには原子力発電がない（国民投票で否決）。エネルギー自給率は低く、石油・天然ガスを大量に輸入。天然ガスと水力発電の比率が相対的に高い。"},
{cat:"地理・欧州",q:"スペインの海岸線の特徴として知られるものはどれか？",opts:["フィヨルド","リアス海岸","三角州","サンゴ礁"],ans:1,exp:"スペインの海岸線の特徴＝リアス海岸（ria・入り江が連なる地形）。特に北西部のガリシア地方が有名。フィヨルドはノルウェー。"},
{cat:"地理・欧州",q:"ノルウェーの海岸線の特徴として知られるものはどれか？",opts:["リアス海岸","三角州","フィヨルド（氷河浸食による複雑な海岸線）","干潟"],ans:2,exp:"ノルウェーの海岸線の特徴＝フィヨルド（氷河浸食による複雑な深い入り江）。リアス海岸はスペイン。"},
{cat:"地理・欧州",q:"ロシアの東西を分けるウラル山脈の西側にあるのはどれか？",opts:["西シベリア低地","中央シベリア高原","東ヨーロッパ平原","カムチャッカ半島"],ans:2,exp:"ウラル山脈の西側＝東ヨーロッパ平原（モスクワ等がある）。東側＝西シベリア低地と中央シベリア高原。「ウラル山脈を境に西は平原・東はシベリア」。"},
{cat:"地理・欧州",q:"チェルノーゼムとは何か？",opts:["ロシア南部に広がる肥沃な黒色土壌（世界有数の小麦地帯）","シベリアの永久凍土","ウラル山脈の火山性土壌","カスピ海沿岸の砂漠性土壌"],ans:0,exp:"チェルノーゼム＝ロシア南部・ウクライナに広がる肥沃な黒色土壌。世界有数の小麦地帯を形成。「チェルノーゼム＝黒土＝小麦」と覚える。"},
{cat:"地理・大洋州",q:"オーストラリアの地形で東部に南北に走る山脈の名称はどれか？",opts:["ロッキー山脈","アンデス山脈","大分水嶺（グレートディヴァイディング山脈）","アルプス山脈"],ans:2,exp:"オーストラリア東部を南北に走る山脈＝大分水嶺（グレートディヴァイディング山脈）。これを境に東側が温暖湿潤、西側が乾燥帯。"},
{cat:"地理・大洋州",q:"オーストラリアでかつて実施されていた白人優先移民政策の名称はどれか？",opts:["アパルトヘイト","白豪主義（White Australia Policy）","ジム・クロウ法","植民地主義"],ans:1,exp:"白豪主義（White Australia Policy）＝オーストラリアでかつて実施されていた白人優先移民政策。1970年代に正式に廃止。アパルトヘイトは南アフリカ。"},
{cat:"地理・大洋州",q:"ニュージーランドの気候として正しいものはどれか？",opts:["熱帯雨林気候","地中海性気候","西岸海洋性気候","砂漠気候"],ans:2,exp:"ニュージーランドの気候＝西岸海洋性気候（年間を通じて温暖で降水が安定）。畜牧業（酪農・ラム肉等）が主要産業。"},
{cat:"地理・アフリカ・アジア",q:"アフリカの植民地分割でフランスが目指した政策はどれか？",opts:["縦断政策（南北）","横断政策（東西）","沿岸部のみの支配","島嶼部の支配"],ans:1,exp:"フランスのアフリカ政策＝横断政策（東西に横に植民地をつなぐ）。イギリスは縦断政策（南北・ケープタウンからカイロへ）。両者がスーダンで衝突（ファショダ事件1898年）。"},
{cat:"地理・アフリカ・アジア",q:"エチオピアはアフリカのどの方角に位置するか？",opts:["西北部","東北部","南部","中央部"],ans:1,exp:"エチオピアはアフリカの東北部（「アフリカの角」付近）に位置する。植民地にならなかった独立国（リベリアは西北部の小国）。"},
{cat:"地理・アフリカ・アジア",q:"リベリアはアフリカのどの方角に位置するか？",opts:["東北部","西北部","南部","中央部"],ans:1,exp:"リベリアはアフリカの西北部に位置する小国。アメリカの解放奴隷が建国。エチオピア（東北部）とともにアフリカで独立を維持した二か国。"},
{cat:"地理・アフリカ・アジア",q:"シンガポールの主力エネルギーはどれか？",opts:["石炭","石油（国内産出）","天然ガス（マレーシア・インドネシアからパイプライン輸入）","原子力発電"],ans:2,exp:"シンガポール＝天然資源がほとんどなくエネルギーはほぼ100%輸入。主力は天然ガスでマレーシア・インドネシアからパイプラインで輸入。"},
{cat:"地理・アフリカ・アジア",q:"フィリピンの主要輸出農産物はどれか？",opts:["コーヒー","天然ゴム","米","バナナ"],ans:3,exp:"フィリピンの主要輸出農産物＝バナナ。多島国で火山・地震が多い。旧宗主国はスペイン→アメリカ。宗教はキリスト教（カトリック）。"},
{cat:"地理・アフリカ・アジア",q:"フィリピンの主な宗教はどれか？",opts:["仏教","イスラム教","キリスト教（カトリック）","ヒンドゥー教"],ans:2,exp:"フィリピン＝キリスト教（カトリック）が主体。スペインの植民地だった歴史的影響。東南アジアで唯一のキリスト教多数国。"},
{cat:"地理・アフリカ・アジア",q:"インドネシアの人口は世界第何位か？",opts:["世界第二位","世界第三位","世界第四位","世界第五位"],ans:2,exp:"インドネシアの人口＝世界第四位（約2.7億人）。1位インド、2位中国、3位アメリカ、4位インドネシア。世界最大のイスラム教徒の国でもある。"},
{cat:"地理・アフリカ・アジア",q:"ベトナムの主要輸出品として正しいものはどれか？",opts:["天然ゴム・パーム油","コーヒー・米","バナナ・砂糖","小麦・大豆"],ans:1,exp:"ベトナムの主要輸出品＝コーヒー・米。資源は石油。旧宗主国はフランス。仏教が中心の社会主義国。"},
{cat:"地理・アフリカ・アジア",q:"文莱（ブルネイ）の宗教はどれか？",opts:["仏教","キリスト教","イスラム教","ヒンドゥー教"],ans:2,exp:"ブルネイ＝イスラム教。旧宗主国はイギリス。石油・天然ガスが豊富で経済的に豊か（一人当たりGDPがアジア有数）。"},
{cat:"地理・アフリカ・アジア",q:"マレーシアの主要農産物として正しいものはどれか？",opts:["米・小麦","コーヒー・砂糖","天然ゴム・パーム油","バナナ・ココナッツ"],ans:2,exp:"マレーシアの主要農産物＝天然ゴム・パーム油。パーム油はインドネシアと並び世界最大級の産地。"},
{cat:"地理・アフリカ・アジア",q:"インドの主要作物として正しいものはどれか？",opts:["コーヒー・バナナ・カカオ","棉花・米・小麦","大豆・トウモロコシ・サトウキビ","茶・ジャガイモ・大麦"],ans:1,exp:"インドの主要作物＝棉花・米・小麦。米・小麦はいずれも中国に次ぐ世界第二位の産量。"},
{cat:"地理・アフリカ・アジア",q:"アフリカで赤道が通る中央部の気候帯はどれか？",opts:["砂漠気候","温帯海洋性気候","熱帯雨林気候","地中海性気候"],ans:2,exp:"アフリカで赤道が通る中央部（コンゴ盆地等）＝熱帯雨林気候。その周囲が熱帯草原（サバナ）気候。北部はサハラ砂漠（砂漠気候）。"},
{cat:"地理・欧州",q:"ヨーロッパ最大の小麦生産国はどこか？",opts:["ドイツ","イギリス","イタリア","フランス"],ans:3,exp:"ヨーロッパ最大の小麦生産国＝フランス。フランスは西ヨーロッパ最大の農業国でもある。主要作物は小麦・大麦・甜菜・ブドウ。"},
{cat:"地理・欧州",q:"オランダの主要な農業産物はどれか？",opts:["小麦・大麦","ブドウ・オリーブ","チーズ等の酪農製品","コーヒー・カカオ"],ans:2,exp:"オランダ＝チーズ等の酪農大国。低地国で干拓地（ポルダー）を活用した農業。花卉（チューリップ等）の栽培も世界的に有名。"},
{cat:"地理・欧州",q:"スイスの農業で中心となっているのはどれか？",opts:["小麦・大麦の穀物栽培","酪農（チーズ等）","ブドウ・オリーブの地中海式農業","熱帯果物の栽培"],ans:1,exp:"スイスの農業＝酪農が中心（チーズ・バター等）。高原山地型気候のため穀物栽培には不向き。精密機械・時計・医薬品が主要産業。"},
{cat:"日本経済史",q:"シャウプ勧告（1949年）の内容として正しいものはどれか？",opts:["超均衡予算による財政引き締め","直接税中心・累進課税への税制改革","財閥解体と農地改革","固定為替レート1ドル＝360円の設定"],ans:1,exp:"シャウプ勧告＝直接税中心・累進課税への税制改革（1949年）。超均衡予算と固定為替レートはドッジ・ライン。「シャウプ＝税制改革、ドッジ＝財政引き締め」と区別。"},
{cat:"日本経済史",q:"GHQ三大改革のうち「農地改革」の内容として正しいものはどれか？",opts:["財閥を解体して競争的な市場を作った","労働組合法を制定して労働者の権利を保障した","地主制を廃止して自作農を創出した","教育制度を改革して義務教育を延長した"],ans:2,exp:"農地改革＝地主制を廃止して自作農を創出（小作人に農地を安く払い下げ）。財閥解体と労働民主化は三大改革の他の二つ。"},
{cat:"日本経済史",q:"特需景気（1950年）でドッジ・デフレから脱出できた理由はどれか？",opts:["政府が積極的な財政出動を行った","日本銀行が金利を大幅に引き下げた","朝鮮戦争での米軍の物資調達（特需）により日本企業に大量の発注が入った","アメリカからの経済援助が大幅に増加した"],ans:2,exp:"特需景気＝朝鮮戦争（1950年）で米軍が日本に大量の物資を発注→ドッジ・デフレから脱出。「特需＝米軍の発注で儲かった」と覚える。"},
{cat:"日本経済史",q:"いざなぎ景気（1965-70年）の象徴「3C」とは何か？",opts:["冷蔵庫・洗濯機・白黒テレビ","カラーテレビ・クーラー・カー（自動車）","コンピューター・携帯電話・カメラ","コーヒー・チョコレート・コーラ"],ans:1,exp:"いざなぎ景気の「3C」＝カラーテレビ（Color TV）・クーラー（Cooler）・カー（Car＝自動車）。神武景気の「三種の神器」（冷蔵庫・洗濯機・白黒テレビ）と区別。"},
{cat:"日本経済史",q:"いざなぎ景気（1965-70年）の間に日本のGNPは世界第何位になったか？",opts:["世界第一位","世界第二位","世界第三位","世界第五位"],ans:1,exp:"いざなぎ景気（1965-70年）の間に日本のGNP（国民総生産）は世界第二位になった（アメリカに次ぐ）。3Cの普及とGNP世界2位を結び付けて覚える。"},
{cat:"日本経済史",q:"岩戸景気（1958-61年）と関連する政策として正しいものはどれか？",opts:["三種の神器の普及","池田勇人の国民所得倍増計画","東京オリンピックの開催","アベノミクスの三本の矢"],ans:1,exp:"岩戸景気（1958-61年）＝池田勇人内閣の国民所得倍増計画。神武景気は三種の神器、オリンピック景気は東京五輪・新幹線。"},
{cat:"日本経済史",q:"オリンピック景気（1962-64年）で日本が加盟した国際機関はどれか？",opts:["国際連合","IMF","OECD（経済協力開発機構）","WTO"],ans:2,exp:"オリンピック景気（1962-64年）の間に東京五輪（1964年）・東海道新幹線開通・OECD加盟を達成。OECD加盟は先進国の仲間入りを意味した。"},

]

</script>
<script>

// ── localStorage keys ──
const STORAGE_KEY = 'eju_missed';
const STATS_KEY = 'eju_stats';

let allCats, selCat="全て", queue=[], cur=0, corr=0, wrng=0, missed=[], answered=false;
let totalStats = loadStats();
let savedMissed = loadMissed();

function loadMissed(){
  try{ const d=localStorage.getItem(STORAGE_KEY); return d?JSON.parse(d):[];}catch(e){return [];}
}
function saveMissed(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(missed)); }catch(e){}
}
function loadStats(){
  try{ const d=localStorage.getItem(STATS_KEY); return d?JSON.parse(d):{total:0,correct:0};}catch(e){return {total:0,correct:0};}
}
function saveStats(){
  try{ localStorage.setItem(STATS_KEY, JSON.stringify(totalStats)); }catch(e){}
}
function clearSaved(){
  try{ localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(STATS_KEY); }catch(e){}
  savedMissed=[]; totalStats={total:0,correct:0};
  updateBadge();
}

function updateBadge(){
  const n = savedMissed.length;
  const el = document.getElementById("missedBadge");
  if(el) el.textContent = n>0 ? `苦手 ${n}問` : "";
}

function buildCats(){
  allCats=["全て",...new Set(ALL.map(q=>q.cat))];
  document.getElementById("catNav").innerHTML=
    `<button class="cat-btn" onclick="startMissedOnly()" id="missedBtn" style="border-color:#c44;color:#c44">
      <span id="missedBadge"></span>苦手問題のみ
    </button>` +
    allCats.map(c=>`<button class="cat-btn${c===selCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
  document.getElementById("totalCount").textContent="全"+ALL.length+"問収録";
  updateBadge();
}

function startMissedOnly(){
  if(savedMissed.length===0){alert("まだ苦手問題がありません！");return;}
  missed=[...savedMissed];
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("missedBtn").style.borderColor="#c8a96e";
  document.getElementById("missedBtn").style.color="#c8a96e";
  _startQueue(savedMissed);
}

function setCat(c){
  selCat=c;
  document.querySelectorAll(".cat-btn").forEach((b,i)=>{
    if(i===0) b.style.borderColor="#9e5a5a", b.style.color="#c87e7e";
    else b.classList.toggle("active",allCats[i-1]===c);
  });
  restart(false);
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function restart(missedOnly){
  const pool = selCat==="全て" ? ALL : ALL.filter(q=>q.cat===selCat);
  _startQueue(pool);
}

function _startQueue(pool){
  queue=shuffle(pool);cur=0;corr=0;wrng=0;missed=[];answered=false;
  document.getElementById("summary").style.display="none";
  document.getElementById("quizCard").style.display="";
  document.getElementById("nextBtn").style.display="none";
  document.getElementById("statsBar").style.display="flex";
  updateStats();showQ();
}

function showQ(){
  if(cur>=queue.length){showSummary();return;}
  answered=false;
  const q=queue[cur];
  document.getElementById("progLine").style.width=(cur/queue.length*100)+"%";
  document.getElementById("qNum").textContent=(cur+1)+" / "+queue.length;
  document.getElementById("qTag").textContent=q.cat;
  document.getElementById("qText").textContent=q.q;
  document.getElementById("feedback").className="feedback";
  document.getElementById("nextBtn").style.display="none";
  const L=["A","B","C","D"];
  document.getElementById("opts").innerHTML=q.opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="pick(${i})"><span class="opt-label">${L[i]}</span><span>${o}</span></button>`).join("");
}

function pick(i){
  if(answered)return;
  answered=true;
  const q=queue[cur];
  document.querySelectorAll(".opt").forEach((b,idx)=>{b.disabled=true;if(idx===q.ans)b.classList.add("correct");else if(idx===i&&i!==q.ans)b.classList.add("wrong");else b.classList.add("dim");});
  const fb=document.getElementById("feedback");
  if(i===q.ans){
    corr++;
    fb.className="feedback ok";
    // 正解したら苦手リストから除去
    savedMissed = savedMissed.filter(m=>m.q!==q.q);
    saveMissed();
  } else {
    wrng++;
    missed.push(q);
    // 苦手リストに追加（重複なし）
    if(!savedMissed.some(m=>m.q===q.q)) savedMissed.push(q);
    saveMissed();
    fb.className="feedback ng";
  }
  totalStats.total++;
  if(i===q.ans) totalStats.correct++;
  saveStats();
  document.getElementById("fbHead").textContent=i===q.ans?"✓ 正解":"✗ 不正解";
  document.getElementById("fbBody").textContent=q.exp;
  document.getElementById("nextBtn").style.display="block";
  updateStats();
  updateBadge();
}

function next(){cur++;showQ();}

function updateStats(){
  document.getElementById("sC").textContent=corr;
  document.getElementById("sW").textContent=wrng;
  document.getElementById("sL").textContent=queue.length-cur;
}

function showSummary(){
  document.getElementById("quizCard").style.display="none";
  document.getElementById("nextBtn").style.display="none";
  document.getElementById("statsBar").style.display="none";
  const total=corr+wrng;const pct=total?Math.round(corr/total*100):0;
  document.getElementById("bigPct").textContent=pct+"%";
  // 累計スコア
  const allPct = totalStats.total ? Math.round(totalStats.correct/totalStats.total*100) : 0;
  const mb=document.getElementById("missedBox");
  mb.innerHTML=
    `<div style="font-size:11px;color:#888;letter-spacing:2px;margin-bottom:12px">累計正解率：${allPct}%（${totalStats.correct}/${totalStats.total}問）</div>` +
    (missed.length
      ? '<h3>間違えた問題（苦手リストに保存済み）</h3>'+missed.map(q=>`<div class="missed-item"><div class="missed-q">${q.q}</div><div class="missed-a">▸ ${q.opts[q.ans]}</div></div>`).join("")
      : '<div style="color:#2d8a4e;text-align:center;padding:16px">全問正解！🎉</div>') +
    `<div style="margin-top:16px;text-align:center">
      <button onclick="clearSaved()" style="padding:8px 16px;border:1px solid #444;background:transparent;color:#777;font-size:11px;cursor:pointer;font-family:inherit">苦手リストをリセット</button>
    </div>`;
  document.getElementById("summary").style.display="block";
}

buildCats();restart(false);

</script>
</body>
</html>
