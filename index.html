<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>総合科目 選択クイズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#0f0f14;color:#e8e4d9;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 48px}
header{text-align:center;margin-bottom:22px}
.eyebrow{font-size:10px;letter-spacing:4px;color:#c8a96e;margin-bottom:8px}
h1{font-size:22px;font-weight:400;letter-spacing:2px;color:#f0ead8}
.subtitle{font-size:11px;color:#555;margin-top:5px}
.cat-scroll{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:680px;margin-bottom:18px}
.cat-btn{padding:5px 12px;border:1px solid #252530;background:transparent;color:#555;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.cat-btn.active,.cat-btn:hover{border-color:#c8a96e;color:#c8a96e}
.card{width:100%;max-width:680px;background:#16161f;border:1px solid #252530;padding:26px 22px 20px;position:relative;margin-bottom:12px}
.prog-line{position:absolute;top:0;left:0;height:2px;background:#c8a96e;transition:width .3s}
.q-meta{display:flex;justify-content:space-between;margin-bottom:14px}
.q-tag{font-size:10px;letter-spacing:2px;color:#555}
.q-num{font-size:11px;color:#444}
.q-text{font-size:14px;line-height:1.75;color:#e8e4d9;margin-bottom:18px}
.options{display:flex;flex-direction:column;gap:8px}
.opt{padding:10px 14px;border:1px solid #252530;background:transparent;color:#aaa;font-size:13px;text-align:left;cursor:pointer;font-family:inherit;line-height:1.5;display:flex;gap:10px;transition:all .15s}
.opt:hover{border-color:#444;color:#ddd}
.opt-label{min-width:18px;color:#555;font-size:12px;flex-shrink:0;margin-top:1px}
.opt.correct{border-color:#5a9e7a!important;color:#7ec8a0!important;background:rgba(90,158,122,.1)!important}
.opt.wrong{border-color:#9e5a5a!important;color:#c87e7e!important;background:rgba(158,90,90,.1)!important}
.opt.dim{opacity:.3}
.feedback{margin-top:16px;padding:13px 15px;border:1px solid #252530;font-size:13px;line-height:1.75;display:none}
.feedback.ok{display:block;border-color:#5a9e7a;color:#e8d8c0;background:rgba(90,158,122,.07)}
.feedback.ng{display:block;border-color:#9e5a5a;color:#e8d8c0;background:rgba(158,90,90,.07)}
.fb-head{font-size:11px;letter-spacing:2px;margin-bottom:6px;font-weight:bold}
#nextBtn{width:100%;max-width:680px;padding:13px;border:1px solid #c8a96e;background:transparent;color:#c8a96e;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:10px;display:none;transition:background .15s}
#nextBtn:hover{background:rgba(200,169,110,.1)}
.stats{display:flex;gap:24px;margin-top:4px}
.stat{font-size:11px;color:#555;text-align:center}
.stat span{color:#c8a96e;font-size:17px;display:block}
#summary{width:100%;max-width:680px;text-align:center;display:none}
.big-pct{font-size:72px;font-weight:300;color:#c8a96e;line-height:1}
.pct-label{font-size:11px;letter-spacing:3px;color:#555;margin-top:4px;margin-bottom:24px}
.sum-btns{display:flex;gap:10px;margin-bottom:16px}
.sum-btn{flex:1;padding:12px;border:1px solid #333;background:transparent;color:#999;font-size:13px;cursor:pointer;font-family:inherit}
.sum-btn.p{border-color:#c8a96e;color:#c8a96e}
.missed-box{text-align:left;background:#16161f;border:1px solid #252530;padding:18px}
.missed-box h3{font-size:10px;letter-spacing:3px;color:#9e5a5a;margin-bottom:12px}
.missed-item{padding:9px 0;border-bottom:1px solid #1f1f28;font-size:12px;color:#999;line-height:1.6}
.missed-item:last-child{border-bottom:none}
.missed-q{color:#e0d8c8;margin-bottom:3px;font-size:13px}
.missed-a{color:#7ec8a0}
</style>
</head>
<body>
<header>
  <div class="eyebrow">EJU 総合科目</div>
  <h1>弱点克服クイズ</h1>
  <div class="subtitle" id="totalCount"></div>
</header>
<div class="cat-scroll" id="catNav"></div>
<div class="card" id="quizCard">
  <div class="prog-line" id="progLine"></div>
  <div class="q-meta">
    <span class="q-tag" id="qTag"></span>
    <span class="q-num" id="qNum"></span>
  </div>
  <div class="q-text" id="qText"></div>
  <div class="options" id="opts"></div>
  <div class="feedback" id="feedback">
    <div class="fb-head" id="fbHead"></div>
    <div id="fbBody"></div>
  </div>
</div>
<button id="nextBtn" onclick="next()">次の問題 →</button>
<div class="stats" id="statsBar">
  <div class="stat"><span id="sC">0</span>正解</div>
  <div class="stat"><span id="sW">0</span>不正解</div>
  <div class="stat"><span id="sL">0</span>残り</div>
</div>
<div id="summary">
  <div class="big-pct" id="bigPct">0%</div>
  <div class="pct-label">SCORE</div>
  <div class="sum-btns">
    <button class="sum-btn p" onclick="restart(false)">全問やり直す</button>
    <button class="sum-btn" onclick="restart(true)">間違えた問題のみ</button>
  </div>
  <div class="missed-box" id="missedBox"></div>
</div>
<script>
const ALL = [
{cat:"冷戦",q:"コミンフォルムとコメコン、正しい組み合わせはどれか？",opts:["コミンフォルム＝経済・コメコン＝政治","コミンフォルム＝政治（対トルーマン）・コメコン＝経済（対マーシャル）","コミンフォルム＝軍事・コメコン＝核共有","どちらも軍事機構"],ans:1,exp:"三対対照：政治→コミンフォルム（対トルーマン・ドクトリン）、経済→コメコン（対マーシャルプラン）、軍事→ワルシャワ条約機構（対NATO）。"},
{cat:"冷戦",q:"ベルリン関連の年号として正しいものはどれか？",opts:["封鎖1945／分裂1948／壁建設1955","封鎖1948／分裂1949／壁建設1961","封鎖1950／分裂1952／壁建設1965","封鎖1947／分裂1950／壁建設1963"],ans:1,exp:"48封鎖→49分裂→61壁。「封鎖の翌年に分裂、12年後に壁」と流れで覚える。"},
{cat:"冷戦",q:"ハンガリー事件とプラハの春の年号として正しいものはどれか？",opts:["ハンガリー1952／チェコ1960","ハンガリー1956／チェコ1968","ハンガリー1960／チェコ1972","ハンガリー1948／チェコ1956"],ans:1,exp:"ハンガリー1956、プラハの春1968。どちらもソ連が軍事介入して鎮圧した東欧民主化運動。"},
{cat:"冷戦",q:"朝鮮戦争の期間として正しいものはどれか？",opts:["1948年開戦・1955年停戦","1950年開戦・1953年停戦","1952年開戦・1957年停戦","1945年開戦・1950年停戦"],ans:1,exp:"50開打53停、打了三年。「50-53」で覚える。38度線での分断は維持されたまま現在も停戦中。"},
{cat:"冷戦",q:"ベトナム戦争の経緯として正しいものはどれか？",opts:["トンキン湾1960→北爆1963→パリ協定1970","トンキン湾1964→北爆1965→パリ平和協定1973","トンキン湾1965→北爆1966→パリ協定1975","トンキン湾1963→北爆1964→パリ協定1972"],ans:1,exp:"トンキン湾事件1964（米の参戦口実）→北爆開始1965→パリ平和協定1973（米軍撤退）。「64・65・73」で覚える。"},
{cat:"冷戦",q:"東欧革命～ソ連解体の順番として正しいものはどれか？",opts:["壁崩壊1989→ドイツ統一1991→ソ連解体1990","壁崩壊1989→ドイツ統一1990→ソ連解体1991","ドイツ統一1989→壁崩壊1990→ソ連解体1991","ソ連解体1989→壁崩壊1990→ドイツ統一1991"],ans:1,exp:"89推墙→90統一→91散伙。「壁が壊れて国が合わさり連邦が消えた」と流れで覚える。"},
{cat:"冷戦",q:"マルタ会談（1989年）の意義として正しいものはどれか？",opts:["ドイツ統一を正式に承認した会談","ベルリンの壁崩壊を決定した会談","米ソ首脳（ブッシュ＆ゴルバチョフ）が冷戦終結を宣言した会談","ワルシャワ条約機構の解散を決定した会談"],ans:2,exp:"マルタ会談1989年12月：ブッシュ（米）とゴルバチョフ（ソ）が冷戦終結を宣言。「マルタ島での会談＝冷戦終了」とセットで覚える。"},
{cat:"冷戦",q:"ゴルバチョフのペレストロイカとグラスノスチについて正しいものはどれか？",opts:["ペレストロイカ＝情報公開・グラスノスチ＝経済再建","ペレストロイカ＝経済再建（改革）・グラスノスチ＝情報公開・言論自由化","どちらも中国の改革開放政策の別名","ペレストロイカは成功しソ連の経済を立て直した"],ans:1,exp:"ゴルバチョフ1985年就任：ペレストロイカ（経済改革・再建）＋グラスノスチ（情報公開・開放性）。これが民主化運動を加速させ皮肉にもソ連解体（1991年）を招いた。"},
{cat:"一次大战・戦間期",q:"第一次世界大戦でイタリアはどう動いたか？",opts:["最初から協約国側として参戦","最初は同盟国側、開戦後に協約国へ寝返った","中立を保ち最後まで参戦しなかった","最初から連合国側だったが途中で離脱"],ans:1,exp:"イタリアは三国同盟（独墺伊）の一員だったが、1915年に協約国（英仏露）側に寝返って参戦。オーストリア支配下の「未回収のイタリア」獲得が目的。"},
{cat:"一次大战・戦間期",q:"ロカルノ条約（1925年）の主な内容と結果は？",opts:["ドイツの軍備を永久に制限","独仏国境の不可侵確認→翌年ドイツが国際連盟加盟","多国間で戦争放棄したパリ不戦条約と同内容","ソ連を国際社会に復帰させるための条約"],ans:1,exp:"ロカルノ条約1925年：独仏・独ベルギー国境の不可侵を確認→1926年ドイツが国際連盟加盟。「ロカルノ→連盟加盟」とセットで覚える。"},
{cat:"一次大战・戦間期",q:"パリ不戦条約（1928年）の内容として正しいものはどれか？",opts:["ヴェルサイユ体制の補完として独仏国境を確認","多国間で国際紛争解決手段としての戦争を放棄した","英仏米ソの四大国だけが署名した軍縮条約","ドイツの国際連盟加盟を認める条約"],ans:1,exp:"パリ不戦条約（ケロッグ＝ブリアン条約）1928年：多国間（日本含む）で戦争放棄を約束。制裁規定がなく実効性に欠けた。"},
{cat:"一次大战・戦間期",q:"三・一独立運動（1919年）の背景として正しいものはどれか？",opts:["日清戦争後の下関条約への抗議","パリ講和会議での民族自決原則の影響を受けた朝鮮独立運動","ロシア革命の影響で起きた共産主義運動","中国の五四運動への連動した反日運動"],ans:1,exp:"ウィルソンの民族自決原則（ヨーロッパのみ適用）の影響を受けた朝鮮の独立運動。五四運動と同年1919年だが別の運動。"},
{cat:"一次大战・戦間期",q:"五四運動（1919年）の直接の原因として正しいものはどれか？",opts:["辛亥革命の影響で中国共産党が結成されたこと","パリ講和会議でドイツの山東省権益が日本へ移転されたこと","日英同盟に基づく日本の中国への軍事介入","ロシア革命の影響を受けた共産主義運動"],ans:1,exp:"パリ講和会議でドイツの山東省権益が日本へ→中国は調印拒否→1919年5月4日に北京の学生が抗議→五四運動。「山東省→日本→中国が拒否」と覚える。"},
{cat:"一次大战・戦間期",q:"1933年に同時に起きた出来事として正しいものはどれか？",opts:["ヒトラー首相就任＋ニューディール政策開始＋日独の国際連盟脱退","ヒトラー大統領就任＋マーシャルプラン＋独ソ不可侵条約","ミュンヘン会談＋全権委任法＋スペイン内戦","ヒトラー首相就任＋スターリン五ヵ年計画＋朝鮮戦争"],ans:0,exp:"1933年三点セット：①ヒトラー首相就任＋全権委任法②日独の国際連盟脱退③ニューディール政策開始。ヒトラーが元首になったのは1934年。"},
{cat:"一次大战・戦間期",q:"全権委任法とは何か？",opts:["ナチス党を唯一の合法政党と定めた法律","議会を通さず内閣が立法できる無制限の立法権をヒトラーに与えた法律","ユダヤ人の公民権を剥奪したニュルンベルク法の別称","軍の最高指揮権を大統領から首相へ移した法律"],ans:1,exp:"全権委任法＝議会を通さず内閣が立法できる。法治主義＝法があればOK内容は問わない、の典型例。ナチスの独裁を「合法的に」確立した。之前连错四次の頻出考点。"},
{cat:"一次大战・戦間期",q:"スペイン内戦（1936年）の対立構図として正しいものはどれか？",opts:["王党派（英仏支援）vs 共和派（独伊支援）","人民戦線・共和派（ソ連・国際義勇軍支援）vs フランコ率いる反乱軍（独伊支援）","共産党（ソ連）vs ナチス（独）の直接代理戦争","スペイン植民地独立勢力 vs 本国政府"],ans:1,exp:"共和国側（人民戦線）：ソ連・国際義勇軍が支援。フランコ側（民族主義軍）：独伊が支援。ゲルニカ爆撃はドイツ空軍によるもの。"},
{cat:"一次大战・戦間期",q:"枢軸国の結成順序として正しいものはどれか？",opts:["1936.10独伊枢軸→1936.11日独防共協定→1937日独伊三国防共協定","1937日独防共→1936.10独伊枢軸→1940三国同盟","1936日独伊三国防共→1937独ソ不可侵→1940三国同盟","1935日独防共→1936独伊枢軸→1937三国防共"],ans:0,exp:"36.10独伊枢軸→36.11日独防共協定→37年日独伊三国防共協定の順。「36-36-37」で覚える。"},
{cat:"一次大战・戦間期",q:"ミュンヘン会談（1938年）に参加した四か国として正しいものはどれか？",opts:["英・仏・独・ソ（チェコは含まない）","英・仏・独・伊（チェコは含まない）","英・仏・独・米（チェコは含まない）","英・仏・独・チェコ（当事国として）"],ans:1,exp:"ミュンヘン会談四か国＝英・仏・独・伊。当事国のチェコスロバキアは招かれなかった（宥和政策の象徴）。英仏がヒトラーにズデーテン地方割譲を認めた。"},
{cat:"一次大战・戦間期",q:"ワシントン会議（1921-22年）の三大条約として正しいものはどれか？",opts:["四か国条約＝太平洋現状維持（日英同盟廃止）／五か国条約＝海軍軍縮／九か国条約＝中国門戸開放","四か国条約＝中国門戸開放／五か国条約＝太平洋現状維持／九か国条約＝海軍軍縮","四か国条約＝海軍軍縮／九か国条約＝日英同盟更新","九か国条約＝太平洋現状維持（日英同盟廃止）"],ans:0,exp:"四か国条約（日米英仏）＝太平洋現状維持→日英同盟廃止の直接原因。五か国条約＝海軍軍縮（主力艦比率）。九か国条約＝中国の主権尊重・門戸開放・機会均等。"},
{cat:"一次大战・戦間期",q:"ロシア革命の流れとして正しいものはどれか？",opts:["十月革命→二月革命→ロマノフ王朝打倒→NEP","二月革命（ロマノフ王朝打倒）→十月革命（レーニン政権）→NEP1921→スターリン五ヵ年計画1928","二月革命→NEP→十月革命→スターリン計画","レーニン死去→スターリン計画→二月革命→十月革命"],ans:1,exp:"二月革命1917年（ロマノフ打倒）→十月革命1917年（ボルシェビキ政権）→NEP1921年（レーニン・市場経済部分復活）→スターリン五ヵ年計画1928年（重工業化・農業集団化）。"},
{cat:"二次大战",q:"太平洋と欧州それぞれの戦争の転換点の組み合わせは？",opts:["太平洋：スターリングラード1943／欧州：ミッドウェー1942","太平洋：ミッドウェー1942／欧州：スターリングラード1943","太平洋：ノルマンディー1944／欧州：真珠湾1941","太平洋：ガダルカナル1942／欧州：ダンケルク1940"],ans:1,exp:"ミッドウェー海戦1942＝太平洋の転換点。スターリングラードの戦い1943＝欧州の転換点。「42→43」の順で覚える。"},
{cat:"二次大战",q:"ABCD包囲網のDは何を指すか？",opts:["Denmark（デンマーク）","Dutch（オランダ＝蘭領インドシナ）","Dominican（ドミニカ）","Danzig（ダンツィヒ）"],ans:1,exp:"A＝America、B＝British、C＝China、D＝Dutch（オランダ＝蘭領インドシナ）。日本への物資禁輸包囲網。Dはオランダ（Dutch）と覚える。"},
{cat:"二次大战",q:"マジノ線→ダンケルク→ヴィシー政権の流れとして正しいものはどれか？",opts:["ヴィシー政権成立→マジノ線突破→ダンケルク撤退","マジノ線を迂回突破→ダンケルク撤退→フランス降伏・ヴィシー政権成立","ダンケルク撤退→マジノ線突破→ヴィシー政権","ヴィシー政権→ダンケルク→マジノ線"],ans:1,exp:"マジノ線を「迂回」突破（アルデンヌ森林）→ダンケルク撤退（英仏軍33万人救出）→フランス降伏→ヴィシー政権成立。全て1940年の出来事。"},
{cat:"二次大战",q:"バルバロッサ作戦とは何か？",opts:["日本の真珠湾攻撃作戦の暗号名","1941年6月ドイツのソ連侵攻作戦","1944年6月ノルマンディー上陸作戦の別名","1940年フランス侵攻作戦の暗号名"],ans:1,exp:"バルバロッサ作戦＝1941年6月22日、ドイツのソ連侵攻。独ソ不可侵条約を破ってソ連へ。1943年スターリングラードでドイツが敗退し転換点に。"},
{cat:"二次大战",q:"カイロ・テヘラン・ヤルタの参加国の組み合わせは？",opts:["カイロ：米英中／テヘラン：米英ソ／ヤルタ：米英ソ","カイロ：米英ソ／テヘラン：米英中／ヤルタ：米英仏","カイロ：米英仏／テヘラン：米英中ソ／ヤルタ：米英","カイロ：米英／テヘラン：英仏ソ／ヤルタ：米英中"],ans:0,exp:"カイロ（対日）＝米英中、テヘラン（ノルマンディー決定）＝米英ソ、ヤルタ（戦後処理・ソ連対日参戦約束）＝米英ソ。中国はカイロのみ。"},
{cat:"二次大战",q:"ブレトン・ウッズ協定（1944年）の内容として正しいものはどれか？",opts:["GATT設立と自由貿易促進","IMF・IBRD設立・金ドル本位制・1オンス＝35ドル・1ドル＝360円・固定相場制","WTO設立とドーハラウンド開始","G5諸国のドル安誘導を合意した協定"],ans:1,exp:"ブレトン・ウッズ協定1944年：IMF設立（短期融資・為替安定）＋IBRD設立（長期融資・復興）＋金1オンス＝35ドル＋1ドル＝360円固定相場制。1971年ニクソンショックで崩壊。"},
{cat:"二次大战",q:"広島・長崎・日本投降の日付として正しいものはどれか？",opts:["広島8月6日／長崎8月9日／日本投降8月15日","広島8月9日／長崎8月6日／日本投降8月15日","広島8月6日／長崎8月8日／日本投降8月14日","広島8月7日／長崎8月9日／日本投降8月16日"],ans:0,exp:"広島原爆8月6日→長崎原爆8月9日→日本投降（玉音放送）8月15日。「6・9・15」で覚える。ポツダム宣言は7月26日。"},
{cat:"日本近代化・外交史",q:"セオドア・ルーズベルトとフランクリン・ルーズベルトの業績の組み合わせは？",opts:["セオドア＝ニューディール政策／フランクリン＝日露戦争調停","セオドア＝日露戦争調停・独占禁止（革新主義）／フランクリン＝ニューディール政策（3R）","どちらも大恐慌対策","セオドア＝第一次大戦参戦決定／フランクリン＝原爆投下決定"],ans:1,exp:"セオドア（T.R.）＝日露調停・革新主義・独占禁止。フランクリン（FDR）＝ニューディール・3R（Relief・Recovery・Reform）。「T＝調停、F＝ニューディール」で区別。5回以上誤答の頻出考点。"},
{cat:"日本近代化・外交史",q:"不平等条約改正の順序として正しいものはどれか？",opts:["関税自主権回復（1894対英）→領事裁判権撤廃（1911対米）","領事裁判権撤廃（1894対英）→関税自主権回復（1911対米）","領事裁判権撤廃（1858）→関税自主権回復（1894）","両方とも1911年に同時に回復"],ans:1,exp:"1894年：領事裁判権撤廃（対英）。1911年：関税自主権回復（対米）。「領事は94、関税は11」と覚える。"},
{cat:"日本近代化・外交史",q:"三国干渉（1895年）に参加した三か国として正しいものはどれか？",opts:["ロシア・フランス・ドイツ","ドイツ・アメリカ・ロシア","ロシア・フランス・イギリス","フランス・アメリカ・ドイツ"],ans:0,exp:"三国干渉＝ロシア（主導・南下政策）・ドイツ（ロシアの関心を極東へ）・フランス（露仏同盟の義務）が遼東半島を清に返還するよう要求。"},
{cat:"日本近代化・外交史",q:"ポーツマス条約（1905年）の内容として正しいものはどれか？",opts:["朝鮮優先権・旅順大連租借権・南樺太割譲・賠償金あり","朝鮮優先権・旅順大連租借権・南樺太割譲・賠償金なし","朝鮮割譲・台湾獲得・賠償金2億両","関税自主権喪失・領事裁判権承認"],ans:1,exp:"ポーツマス条約の重要ポイント：賠償金なし！（日比谷焼打ち事件の原因）。朝鮮優先権・旅順大連租借権・南樺太（北緯50度以南）割譲は得た。「賠償金なし」を絶対覚える。"},
{cat:"日本近代化・外交史",q:"日米和親条約と日米通商修好条約の違いとして正しいものはどれか？",opts:["日米和親条約1854＝不平等条約（関税喪失）、日米通商修好条約1858＝開港のみ","日米和親条約1854＝下田・函館開港（開国の始まり）、日米通商修好条約1858＝不平等条約（領事裁判権・関税自主権喪失）","どちらも内容は同じ","日米通商修好条約が先（1852年）、日米和親条約が後（1856年）"],ans:1,exp:"日米和親条約1854＝ペリー来航→下田・函館開港（通商権なし）。日米通商修好条約1858＝不平等条約の本体：①領事裁判権承認②関税自主権喪失。「通商条約が不平等」と覚える。"},
{cat:"政治基本原理",q:"社会契約論三人の組み合わせとして正しいものはどれか？",opts:["ホッブズ＝人民主権／ロック＝強力国家／ルソー＝抵抗権","ホッブズ＝強力国家（リヴァイアサン）／ロック＝抵抗権→米独立宣言に影響／ルソー＝人民主権→仏革命に影響","ロック＝社会契約論（書名）／ルソー＝市民政府二論／ホッブズ＝人民主権","ルソー＝自由放任主義／ロック＝重商主義"],ans:1,exp:"ホッブズ→リヴァイアサン（強力国家）。ロック→市民政府二論→抵抗権・立法権が最高→米独立宣言に影響。ルソー→社会契約論（書名）・人民主権・直接民主制→仏革命に影響。"},
{cat:"政治基本原理",q:"ホッブズの「万人の万人に対する戦争」とは何を指すか？",opts:["革命後の混乱状態","政府が存在しない自然状態（国家設立前）","民主主義の本質","封建制下の農民反乱"],ans:1,exp:"ホッブズの「万人の万人に対する戦争」＝政府が存在しない自然状態（国家設立前）を指す。革命後ではない。この状態を避けるため人々は社会契約で強力な国家（リヴァイアサン）に権力を委ねる。"},
{cat:"政治基本原理",q:"ロックの政治理論として正しいものはどれか？",opts:["立法・行政・司法の三権分立・司法権が最高","立法・執行・連合権の三権・立法権が最高・抵抗権を認める","国家は宗教的権威の下に置かれるべき","直接民主制を主張"],ans:1,exp:"ロックの三権＝立法権・執行権・連合権（外交権）。立法権が最高権力。抵抗権を認め、米独立宣言に影響。モンテスキューの三権分立（立法・行政・司法）と混同しない。"},
{cat:"政治基本原理",q:"ルソーの政治理論として正しいものはどれか？",opts:["間接民主制（代議制）を支持","一般意志に基づく人民主権と直接民主制を主張","強力な君主が人民を統治する君主主権論","法の支配と権力分立を最初に主張した"],ans:1,exp:"ルソー＝一般意志（共同体全体の利益を目指す意志）に基づく人民主権＋直接民主制を主張。間接民主制（代議制）には批判的。フランス革命に大きな影響。"},
{cat:"政治基本原理",q:"法の支配と法治主義の違いとして正しいものはどれか？",opts:["法の支配＝法があればOK内容は問わない／法治主義＝内容も正義に沿うべき","法の支配＝法の内容も正義に沿うべき（英コーク）／法治主義＝法さえあれば内容は問わない（独）","法の支配と法治主義は同じ概念","法治主義はイギリス・法の支配はドイツの概念"],ans:1,exp:"法の支配（英コーク）＝法の内容が正義に沿うべき・権力も法に従う。法治主義（独）＝法さえあれば内容は問わない→ナチスの全権委任法も「合法」になる。「法の支配の対立概念＝人の支配」も覚える。"},
{cat:"政治基本原理",q:"自然法と法の支配の区別として正しいものはどれか？",opts:["自然法＝統治原則「法律が権力より上」／法の支配＝哲学概念","自然法＝哲学概念「時代を超えた普遍的正義が存在する」／法の支配＝統治原則「法律が権力より上」","自然法と法の支配は同じ概念","自然法はイギリスの概念"],ans:1,exp:"自然法＝哲学的概念：時代・場所を超えた普遍的正義・道徳が存在するという考え方。法の支配＝統治原則：権力者も法に縛られるべきという原則。「自然法＝哲学、法の支配＝統治原則」で区別。"},
{cat:"政治基本原理",q:"福祉国家を提唱したのはどれか？",opts:["ケインズ報告","ベバリッジ報告（1942年、英国）","アダム・スミスの国富論","マルクスの資本論"],ans:1,exp:"ベバリッジ報告（1942年、英国）が「揺りかごから墓場まで」の福祉国家の青写真を描いた。ケインズは修正資本主義・大きな政府の理論的根拠（別人！）。混同しない。"},
{cat:"政治基本原理",q:"新しい人権として正しい組み合わせはどれか？",opts:["知る権利・アクセス権・環境権・プライバシー権","選挙権・請願権・表現の自由・集会の自由","生存権・教育権・労働権・社会保障権","思想の自由・信教の自由・学問の自由・良心の自由"],ans:0,exp:"新しい人権の四つ：知る権利・アクセス権（マスメディアへの反論権）・環境権・プライバシー権。アクセス権はSNSではなくテレビ・新聞への反論権。すべて憲法に明記されていない。"},
{cat:"政治基本原理",q:"アクセス権の正しい説明はどれか？",opts:["SNSでの情報発信の権利","テレビ・新聞などマスメディアに反論・意見掲載を求める権利","行政文書へのアクセスを求める情報公開の権利","インターネット通信の秘密を守る権利"],ans:1,exp:"アクセス権＝マスメディア（テレビ・新聞）に対して反論や意見を掲載・放送するよう求める権利。SNSの話ではない。「マスメディアへの反論権」と覚える。"},
{cat:"政治基本原理",q:"解職請求（リコール）に必要な署名数として正しいものはどれか？",opts:["有権者の1/50以上","有権者の1/3以上＋住民投票過半数","有権者の3/4以上","有権者の過半数"],ans:1,exp:"解散請求・解職請求（首長・議員のクビ）＝1/3以上の署名＋住民投票過半数。条例制定・事務監査＝1/50。「クビは厳しく（1/3）、条例は緩く（1/50）」。5回以上誤答の頻出考点。"},
{cat:"政治基本原理",q:"憲法改正の手続きとして正しいものはどれか？",opts:["両院の過半数の賛成のみ","各議院の総議員の2/3以上の賛成＋国民投票の過半数","内閣の発議＋国会の過半数の承認","天皇の裁可が必要"],ans:1,exp:"憲法96条：各議院の総議員の2/3以上の賛成で発議→国民投票で過半数の承認。「2/3＋過半数」の二段階。「過半数だけでは不十分、2/3が必要」を覚える。"},
{cat:"政治基本原理",q:"人権の三種類（世代別）として正しいものはどれか？",opts:["参政権18C→自由権19C→社会権20C","自由権18C→参政権19C→社会権20C","社会権18C→自由権19C→参政権20C","自由権・参政権・社会権はすべて20世紀に確立"],ans:1,exp:"自由権18世紀（市民革命・思想・表現・信教の自由）→参政権19世紀（選挙権拡大）→社会権20世紀（生存権・労働権・教育権）。社会権を最初に憲法に明記したのはワイマール憲法（1919年）。"},
{cat:"政治基本原理",q:"世界人権宣言と国際人権規約の違いとして正しいものはどれか？",opts:["世界人権宣言1948年＝法的拘束力あり／国際人権規約1966年＝法的拘束力なし","世界人権宣言1948年＝法的拘束力なし（宣言のみ）／国際人権規約1966年＝法的拘束力あり（A規約社会権＋B規約自由権）","どちらも同じ法的効力を持つ","国際人権規約は社会権のみ・政治的権利は含まない"],ans:1,exp:"世界人権宣言1948年＝法的拘束力なし（宣言に過ぎない）。国際人権規約1966年＝法的拘束力あり（A規約＝経済・社会・文化的権利、B規約＝市民的・政治的権利）。「義務づけた」という選択肢は世界人権宣言については誤り。"},
{cat:"政治基本原理",q:"集団安全保障と集団的自衛権の違いとして正しいものはどれか？",opts:["集団安全保障＝NATO（同盟国を守る）／集団的自衛権＝国連安保理（国際機関で平和維持）","集団安全保障＝国連安保理（国際機関でみんなで平和維持）／集団的自衛権＝NATO・日米安保（同盟国が攻撃されたら助ける）","どちらも国連安保理の決議が必要","集団安全保障と集団的自衛権は同じ概念"],ans:1,exp:"集団安全保障＝国際機関（国連安保理）が中心でみんなで平和維持。集団的自衛権＝同盟国（NATO・日米安保）が攻撃されたら助ける権利。「国連＝集団安全保障、同盟＝集団的自衛権」で区別。"},
{cat:"政治基本原理",q:"トックビルが唱えた政治思想として正しいものはどれか？",opts:["一般意志に基づく人民主権を唱えた","王権神授説を主張した","民主主義の問題点として多数者による専制に陥る危険性を指摘した","法律に基づけば個人の自由も制限可能という法治主義を唱えた"],ans:2,exp:"トックビル（仏）の代表作「アメリカのデモクラシー」（1835年）：民主主義の利点と「多数の専制（tyranny of the majority）」の危険性を指摘。「トックビル＝多数の専制の危険性」で覚える。"},
{cat:"英米・日本政治制度",q:"アメリカとイギリスの兼職禁止について正しいものはどれか？",opts:["米国＝内閣と議員の兼職可、英国＝兼職禁止","米国＝兼職禁止（行政府は議員になれない）、英国＝内閣は基本的に下院議員を兼務","両国とも兼職禁止","両国とも兼職可"],ans:1,exp:"米国＝三権分立を厳格に適用→大統領・閣僚は議員になれない。英国＝議院内閣制→首相・閣僚は基本的に下院（庶民院）議員を兼務。「米＝兼職禁止、英＝兼職必須」。"},
{cat:"英米・日本政治制度",q:"アメリカ連邦議会の構成として正しいものはどれか？",opts:["元老院100人6年任期／代議院435人2年任期","元老院535人4年任期／代議院100人6年任期","元老院200人6年任期／代議院300人4年任期","元老院100人4年任期／代議院450人2年任期"],ans:0,exp:"元老院（上院・Senate）＝100人（各州2名）・6年任期（2年ごとに1/3改選）。代議院（下院・House）＝435人・2年任期。「上院100、下院435」。"},
{cat:"英米・日本政治制度",q:"半大統領制の代表国として正しいものはどれか？",opts:["ドイツ・イタリア","フランス・ロシア","日本・韓国","カナダ・オーストラリア"],ans:1,exp:"半大統領制（大統領＋首相が並存）の代表＝フランス・ロシア。ドイツは議院内閣制（大統領は象徴的存在）。「フランスは強い大統領を持つ半大統領制」。"},
{cat:"英米・日本政治制度",q:"イギリスの影子内閣とは何か？",opts:["貴族院が形成する内閣","第二大党（野党）が組織する候補内閣（政権交代に備えた仮の内閣）","連立与党の少数派が形成する閣外協力内閣","次期選挙の候補者名簿"],ans:1,exp:"影子内閣（Shadow Cabinet）＝イギリス特有の制度。野党第一党が政権交代に備えて組織する候補内閣。各影の閣僚は与党担当大臣を監視・批判する役割。「イギリス特有の野党の仮内閣」。"},
{cat:"英米・日本政治制度",q:"アメリカ大統領に「ない」権限として正しいものはどれか？",opts:["法案への拒否権","軍の最高指揮権","議会への法案提出権と議会解散権","条約締結権"],ans:2,exp:"アメリカ大統領に「ない」権限：①法案提出権なし（議員が代わりに提出）②議会解散権なし。ある権限：拒否権（法案否決）・軍の最高指揮権・条約締結権（上院3分の2の同意が必要）。"},
{cat:"英米・日本政治制度",q:"衆議院と参議院の定数と任期として正しいものはどれか？",opts:["衆465人4年／参242人6年","衆500人4年／参250人6年","衆465人3年／参300人6年","衆400人4年／参242人4年"],ans:0,exp:"衆議院＝465人・4年（解散あり）。参議院＝242人・6年（解散なし、3年ごとに半数改選）。被選挙権：衆議院25歳以上、参議院30歳以上。"},
{cat:"英米・日本政治制度",q:"衆議院のみに認められた権限として正しいものはどれか？",opts:["弾劾裁判所の設置","内閣不信任決議権","国政調査権","条約の承認権"],ans:1,exp:"衆議院のみの権限＝内閣不信任決議権。弾劾裁判所は両院議員で構成。国政調査権・条約承認権は両院にある。「内閣を倒せるのは衆議院だけ」と覚える。"},
{cat:"英米・日本政治制度",q:"内閣不信任案可決後の選択肢として正しいものはどれか？",opts:["内閣は直ちに総辞職","10日以内に衆議院を解散するか総辞職するかを選択","参議院の承認を得て続投できる","30日以内に国民投票を実施する"],ans:1,exp:"憲法69条：不信任決議可決後10日以内に衆議院解散か総辞職。「10日以内に選択」が重要。"},
{cat:"英米・日本政治制度",q:"内閣総辞職の三種類として正しいものはどれか？",opts:["①不信任可決②国会開会時③参議院選挙後","①不信任可決②衆議院選挙後の特別国会③内閣総理大臣の欠缺（死亡・辞任等）","①不信任可決②予算否決③首相の海外出張","①不信任可決のみ"],ans:1,exp:"内閣総辞職の三種：①衆議院で不信任案可決（69条）②衆議院選挙後の特別国会で首班指名（70条）③内閣総理大臣の欠缺（死亡・辞任・資格喪失）（70条）。「不信任・選挙後・首相欠缺」。"},
{cat:"英米・日本政治制度",q:"最高裁判所裁判官の任命について正しいものはどれか？",opts:["長官も一般裁判官も全員内閣が任命","長官＝内閣が指名し天皇が任命／一般裁判官＝内閣が任命","長官も一般裁判官も国会が任命","長官＝天皇が任命／一般裁判官＝最高裁が任命"],ans:1,exp:"長官＝内閣が指名→天皇が任命（形式的）。一般裁判官＝内閣が任命。下級裁判所裁判官＝最高裁が指名→内閣が任命。三種類を区別して覚える。"},
{cat:"英米・日本政治制度",q:"国会の国政調査権（憲法62条）の内容として正しいものはどれか？",opts:["国会が行政機関を外部から監視するオンブズマンを設置する権限","両議院が証人の出頭・証言・記録の提出を求めることができる権限","衆議院が閣議決定に対して拒否権を行使する権限","参議院が国務大臣の任命を否決する権限"],ans:1,exp:"国政調査権＝両議院が証人呼び出し・証言要求・記録提出要求ができる権限（憲法62条）。閣議決定への拒否権なし。国務大臣任命への参議院拒否権なし。オンブズマン制度は国レベルで日本に存在しない。"},
{cat:"英米・日本政治制度",q:"閣議の意思決定方式として正しいものはどれか？",opts:["多数決制","全会一致制","出席閣僚の3分の2以上の賛成","内閣総理大臣の単独決定"],ans:1,exp:"閣議＝全会一致制。一人でも反対すれば決定できない。これが総理大臣の「国務大臣の任免権」の実質的な根拠になっている。"},
{cat:"英米・日本政治制度",q:"連邦制を採用している国として正しいものはどれか？",opts:["ポーランド・フランス・チェコ","ロシア・ドイツ・アメリカ・ブラジル・インド","日本・韓国・中国","フランス・イタリア・スペイン"],ans:1,exp:"連邦制の代表国：ロシア・ドイツ・アメリカ・ブラジル・インド・オーストラリア・カナダ・スイス・マレーシア。「大国は基本的に連邦制」と覚える。フランス・ポーランド・チェコは単一国家。"},
{cat:"英米・日本政治制度",q:"明治政府が参考にした憲法体制として正しいものはどれか？",opts:["イギリスの議院内閣制","アメリカの大統領制","プロシア（プロイセン）の憲法（強い行政権・天皇主権）","フランスの半大統領制"],ans:2,exp:"大日本帝国憲法はプロシア（プロイセン＝ドイツの前身）の憲法を参考に制定。特徴：強い行政権・天皇主権。伊藤博文がドイツに留学して学んだ。「プロシア＝プロイセン＝ドイツの前身」と覚える。"},
{cat:"選挙制度",q:"小選挙区制の主な利点として正しいものはどれか？",opts:["死票が少なく民意が反映されやすい","二大政党制につながり政治が安定しやすい","少数意見も議席を得やすい","比例代表制より腐敗が起きにくい"],ans:1,exp:"小選挙区制の利点＝二大政党制→政治の安定（明確な過半数政権）。欠点＝死票が多く民意が反映されにくい。「民意反映」は大選挙区・比例代表制の利点。"},
{cat:"選挙制度",q:"大選挙区制の定義として正しいものはどれか？",opts:["1選挙区から1人を選出する制度","1選挙区から2人以上を選出する制度","国全体を1つの選挙区とする比例代表制","政党名で投票する制度"],ans:1,exp:"大選挙区制＝1選挙区から2人以上を選出。死票が少なく少数意見も議席を得やすい。欠点は政治の不安定化（小党乱立）。"},
{cat:"選挙制度",q:"拘束名簿式と非拘束名簿式の違いとして正しいものはどれか？",opts:["拘束＝参議院比例代表・個人票の順に当選／非拘束＝衆議院・党が順位決定","拘束＝衆議院比例代表・党が順位を決定／非拘束＝参議院比例代表・個人票が多い順に当選","どちらも衆議院で使われる","拘束名簿はEUのみで使用"],ans:1,exp:"拘束名簿式＝衆議院（党があらかじめ名簿の順位を決める）。非拘束名簿式＝参議院（個人票が多い順に当選）。「衆は党が決める、参は個人票」。"},
{cat:"選挙制度",q:"世界初の女性普通選挙権を認めた国はどこか？",opts:["イギリス（1918年部分的認可）","フランス（1848年）","ニュージーランド（1893年）","アメリカ（1920年）"],ans:2,exp:"世界初の女性普通選挙権＝ニュージーランド1893年。世界初の男性普通選挙＝フランス1848年。日本の女性参政権＝1945年。「女性最初はNZ1893」は定番出題。"},
{cat:"経済体制・経済学者",q:"資本主義の四大支柱として正しいものはどれか？",opts:["計画経済・国有財産・一党独裁・平等分配","私有財産制・利潤動機・市場経済・自由競争","混合経済・社会保障・規制市場・政府介入","金本位制・自由貿易・植民地・重商主義"],ans:1,exp:"資本主義四大支柱：①私有財産制②利潤動機（利益追求）③市場経済（需給による価格決定）④自由競争。社会主義の特徴（計画経済・国有・平等分配）と対比して覚える。"},
{cat:"経済体制・経済学者",q:"資本主義の三つの問題点として正しいものはどれか？",opts:["インフレ・デフレ・スタグフレーション","資本家vs労働者の対立・独占市場・景気変動（恐慌）","少子高齢化・財政赤字・貿易摩擦","技術革新の遅れ・所得税の過重・消費の停滞"],ans:1,exp:"資本主義三つの問題点：①資本家と労働者の対立②独占・寡占による競争消滅③景気変動（好況・不況・恐慌のサイクル）。これがケインズ・マルクスの批判の根拠。"},
{cat:"経済体制・経済学者",q:"リカードとリストの主張の組み合わせとして正しいものはどれか？",opts:["リカード＝保護貿易／リスト＝比較優位・自由貿易","リカード＝比較優位（比較生産費説）・自由貿易／リスト＝保護貿易（後進国の産業保護）","どちらも自由貿易を主張した古典派経済学者","リカードはマルクスの弟子で社会主義を主張"],ans:1,exp:"リカード＝比較生産費説（比較優位）→自由貿易推進。リスト＝リカードへの反論→後進国の産業保護のために保護貿易が必要。「リカード→自由、リスト→保護」。逆に覚えない。"},
{cat:"経済体制・経済学者",q:"新自由主義を実践した三つの政権として正しいものはどれか？",opts:["ケネディ（米）・ド・ゴール（仏）・田中（日）","サッチャー（英）・レーガン（米）・中曽根（日）","ブレア（英）・クリントン（米）・小泉（日）","ウィルソン（英）・カーター（米）・佐藤（日）"],ans:1,exp:"新自由主義三政権＝サ（サッチャー）・レ（レーガン）・中（中曽根）。フリードマンのマネタリズム理論に基づく。規制緩和・国有企業民営化・「小さな政府」が共通点。"},
{cat:"経済体制・経済学者",q:"アダム・スミスの経済思想として正しいものはどれか？",opts:["政府が積極的に市場に介入すべき「大きな政府」","自由放任主義・「見えざる手」・「小さな政府」・著書「国富論」","保護貿易により国内産業を育成すべき","労働価値説を完成させ社会主義の理論的基礎を築いた"],ans:1,exp:"アダム・スミス：国富論（1776年）・自由放任主義・「見えざる手」（市場の自動調整機能）・「小さな政府」。ケインズの「大きな政府」と対比して覚える。著書名「国富論」を必ず覚える。"},
{cat:"経済体制・経済学者",q:"カルテル・トラスト・コンツェルンの区別として正しいものはどれか？",opts:["カルテル＝同業合併一社に／トラスト＝価格協定／コンツェルン＝持株支配","カルテル＝同業他社が価格・生産量を協定（独立保ちながら）／トラスト＝同業他社が合併して一社に／コンツェルン＝持株会社が異業種企業をピラミッド型支配","カルテルとトラストは同じ","コンツェルン＝同業他社が価格協定"],ans:1,exp:"カルテル（協定）＝同業他社が独立保ちながら価格・生産量を協定→「一緒に値上げ」。トラスト（合併）＝同業他社が直接合併して一社に→「合体」。コンツェルン（財閥）＝持株会社が異業種企業をピラミッド型支配→「財閥のボスが全部支配」。"},
{cat:"経済体制・経済学者",q:"市場の失敗の4類型として正しいものはどれか？",opts:["インフレ・デフレ・スタグフレーション・貿易摩擦","外部性・公共財・独占寡占・情報の非対称性","財政赤字・国際収支赤字・雇用問題・環境問題","消費税・法人税・所得税・相続税"],ans:1,exp:"市場の失敗四類型：①外部性（工場の排煙など市場価格に反映されないコスト）②公共財（国防・灯台など非排除性・非競合性）③独占・寡占（競争消滅）④情報の非対称性（売り手と買い手の情報格差）。"},
{cat:"財政政策",q:"日本の歳出第一位と第二位の費目として正しいものはどれか？",opts:["国債費（第一位）／社会保障関係費（第二位）","社会保障関係費（第一位、約33%）／国債費（第二位、約27%）","防衛費（第一位）／公共事業費（第二位）","地方交付税（第一位）／社会保障関係費（第二位）"],ans:1,exp:"歳出第一位＝社会保障関係費（約33%）、第二位＝国債費（約27%）。「社会が一番、国債が二番」。逆に覚えやすいので注意。"},
{cat:"財政政策",q:"クロヨン（964）とは何か？",opts:["国債の種類の略称","サラリーマン9割・自営業6割・農家4割という所得捕捉率の格差","日本の直間比率の略称","財政三原則の略称"],ans:1,exp:"クロヨン（964）＝所得捕捉率の格差：サラリーマン9割・自営業6割・農家4割。サラリーマンは源泉徴収で正確に捕捉、自営業・農家は申告制で低く捕捉されやすい→不公平感の原因。"},
{cat:"財政政策",q:"国債発行の四つの問題点として正しいものはどれか？",opts:["インフレ可能性・財政硬直化・クラウディング・アウト効果・世代間不公平","デフレ加速・輸出競争力低下・円高・税収不足","財政赤字・貿易赤字・物価下落・失業増加","外貨準備高の低下・円安・金利低下・輸出減少"],ans:0,exp:"国債発行四問題：①インフレ（日銀直接引受禁止の理由）②財政硬直化（国債費増大で自由な歳出が困難）③クラウディング・アウト（国債が民間資金を吸い上げ金利上昇→民間投資減少）④世代間不公平（現世代の借金を将来世代が返済）。"},
{cat:"財政政策",q:"建設国債と赤字国債の違いとして正しいものはどれか？",opts:["建設国債＝違法（特例法が必要）・1975年から発行／赤字国債＝合法・1966年から発行","建設国債＝合法（財政法で認可）・1966年から発行／赤字国債＝本来違法（特例法で毎年発行）・1975年から","どちらも財政法で認められた合法的な国債","建設国債も赤字国債も1955年から発行"],ans:1,exp:"建設国債（4条公債）＝財政法で認められた合法的国債・道路・ダムなど公共事業向け・1966年から発行。赤字国債（特例公債）＝財政法では原則禁止→特例法を毎年制定して発行・1975年から（オイルショック後の財政悪化）。"},
{cat:"財政政策",q:"ビルト・イン・スタビライザーの内容として正しいものはどれか？",opts:["中央銀行が景気に応じて金利を調整する仕組み","累進課税と社会保障給付によって景気を自動的に安定させる仕組み","政府が意図的に予算を組んで景気対策を行うフィスカルポリシー","IMFが各国為替を安定させる仕組み"],ans:1,exp:"ビルト・イン・スタビライザー（自動安定化装置）＝累進課税（好況時→税収増→消費抑制）＋社会保障給付（不況時→給付増→消費支持）で自動的に景気を安定させる。フィスカル・ポリシーは意図的な財政政策（別物）。"},
{cat:"財政政策",q:"日本の直間比率の歴史として正しいものはどれか？",opts:["戦前から直接税中心→戦後シャウプ勧告で間接税中心に変わった","戦前は間接税中心→戦後シャウプ勧告（1949年）で直接税中心・累進課税に変わった","戦前から直間比率はほぼ変わっていない","戦後から現在まで間接税（消費税）が7割以上を占める"],ans:1,exp:"戦前＝間接税中心。戦後＝シャウプ勧告（1949年）で直接税中心・累進課税に転換。現在の直間比率は直接税約7割・間接税約3割。「シャウプ勧告→直接税中心に転換」と覚える。"},
{cat:"財政政策",q:"消費税の特徴として正しいものはどれか？",opts:["累進税率で高所得者ほど税率が高い","比例税率で逆進性がある（低所得者ほど負担割合が重い）","老若男女で税率が異なる","所得税より再分配機能が強い"],ans:1,exp:"消費税＝比例税（一律の税率）→逆進性：収入に関係なく同じ税率→低所得者ほど収入に占める税負担の割合が重い。累進課税（所得税・相続税）と対比して覚える。「消費税は逆進性がある」が頻出。"},
{cat:"金融・日銀政策",q:"ディマンド・プルとコスト・プッシュインフレの説明として正しいものはどれか？",opts:["ディマンド・プル＝コスト上昇で物価上昇／コスト・プッシュ＝需要過多で物価上昇","ディマンド・プル＝需要過多で物価上昇／コスト・プッシュ＝コスト上昇で物価上昇（石油危機→狂乱物価）","どちらも需要側の要因","ディマンド・プルは日本のみで起きる"],ans:1,exp:"ディマンド（需要）・プル＝需要超過で引っ張られる物価上昇。コスト・プッシュ＝生産コスト上昇（原材料費・人件費）で押し上げられる物価上昇。石油危機による「狂乱物価」はコスト・プッシュ型。"},
{cat:"金融・日銀政策",q:"インフレ時の債権者・債務者への影響として正しいものはどれか？",opts:["インフレ→預金（債権者）が得をする・借入（債務者）が損をする","インフレ→預金（債権者）の実質価値が下がり損をする・借入（債務者）の実質負担が軽くなり得をする","インフレ→債権者・債務者どちらにも影響はない","デフレ→預金（債権者）が損をする・借入（債務者）が得をする"],ans:1,exp:"インフレ→お金の価値が下がる→預金（債権）の実質価値が減少（損）→借金（債務）の実質負担が軽減（得）。デフレはその逆。「インフレは借りている人に有利、貸している人に不利」。"},
{cat:"金融・日銀政策",q:"ゼロ金利とマイナス金利の説明として正しいものはどれか？",opts:["ゼロ金利＝個人への貸出金利をゼロにする／マイナス金利＝個人が銀行に預けるとマイナス利息","ゼロ金利＝銀行間の短期政策金利をゼロ近くに誘導（マネーストック増加）／マイナス金利＝銀行が日銀に超過準備預金すると利息を逆に取られる（貸出促進）","どちらも同じ政策","ゼロ金利は廃止され現在はマイナス金利のみ"],ans:1,exp:"ゼロ金利＝銀行間の政策金利をゼロ近くに誘導→マネーストック増加。マイナス金利＝銀行が日銀に預ける超過準備に-0.1%→銀行に貸出を促す。個人の預金がマイナスになるわけではない。"},
{cat:"金融・日銀政策",q:"護送船団方式で守られていたのは何か？",opts:["中小企業の市場参入","経営体力の弱い中小金融機関（弱い銀行に合わせて業界全体を規制で守る）","輸出産業（自動車・電機）","農業協同組合"],ans:1,exp:"護送船団方式＝最も体力の弱い金融機関（中小銀行）に合わせて業界全体を規制で守る方式（企業ではなく金融機関）。バブル崩壊後の金融ビッグバン1996年提案・1998年実施（Free・Fair・Global）で廃止。"},
{cat:"金融・日銀政策",q:"日本銀行の三大職責として正しいものはどれか？",opts:["予算管理銀行・国際決済銀行・民間銀行監督","発券銀行・銀行の銀行・政府の銀行","税金徴収・国債発行・為替介入","貸出金利設定・株式市場監督・外貨準備管理"],ans:1,exp:"日銀三大職責：①発券銀行（紙幣＝日本銀行券の発行独占）②銀行の銀行（民間銀行に貸出・預金受け入れ）③政府の銀行（政府預金の管理・国庫金取扱）。「発・銀・政」で覚える。"},
{cat:"金融・日銀政策",q:"信用創造を行うのはどこか？",opts:["日本銀行（中央銀行）","市中銀行（民間銀行）","財務省","証券取引所"],ans:1,exp:"信用創造＝市中銀行（民間銀行）が行う。銀行は預金の一部を準備金として残し、残りを貸し出す→借り手が別の銀行に預金→その銀行がまた貸し出す→連鎖的に通貨が増える。日銀ではない。"},
{cat:"金融・日銀政策",q:"金本位制の歴史について正しいものはどれか？",opts:["金本位制を最初に確立したのはアメリカ（1900年）","金本位制を最初に確立したのはイギリス（1816年）・日本（1897年）、1929年大恐慌後に各国が管理通貨制度へ移行","金本位制は現在も主要国で維持されている","金本位制は第一次世界大戦後に初めて導入された"],ans:1,exp:"金本位制最初はイギリス1816年。日本は日露戦争後の1897年に採用。1929年大恐慌後→各国が順次金本位制を離脱→管理通貨制度へ（中央銀行が貨幣量を管理）。「英が最初」を覚える。"},
{cat:"金融・日銀政策",q:"金利上昇が為替・景気に与える影響として正しいものはどれか？",opts:["金利上昇→外国資本流出→円安→景気過熱","金利上昇→外国資本流入→円高→貯蓄増・借入減→景気抑制","金利上昇→インフレ加速→景気拡大","金利と為替・景気に直接の関係はない"],ans:1,exp:"金利上昇→海外から資金が流入（高金利の通貨を買いたい）→自国通貨高（円高）。また金利上昇→貯蓄増・借入減→市場の金が減少→景気抑制。「金利上昇→円高・景気抑制」。"},
{cat:"国際経済・貿易",q:"G5（プラザ合意1985）の構成国として正しいものはどれか？",opts:["米・英・仏・イタリア・日本","米・英・仏・西ドイツ・日本","米・英・独（統一）・ロシア・日本","米・仏・中・日本・サウジアラビア"],ans:1,exp:"G5＝米・英・仏・西ドイツ・日本（イタリアは含まない）。プラザ合意1985年でドル安円高誘導→円高不況→産業空洞化加速。「G5＝西ドイツ・イタリアなし」と覚える。"},
{cat:"国際経済・貿易",q:"プラザ合意とルーブル合意の内容として正しいものはどれか？",opts:["プラザ合意1987年＝ドル高誘導／ルーブル合意1985年＝ドル安阻止","プラザ合意1985年＝ドル安円高誘導→円高不況・産業空洞化／ルーブル合意1987年＝過度なドル安阻止","プラザ合意＝円安誘導／ルーブル合意＝円高誘導","どちらもIMFが主導した国際協定"],ans:1,exp:"プラザ合意1985年（G5）：ドル安円高誘導→円高不況→産業空洞化加速。ルーブル合意1987年（G7）：プラザ合意後の過度なドル安を阻止。「プラザ85→ルーブル87」の順で覚える。"},
{cat:"国際経済・貿易",q:"円高が物価に与える影響として正しいものはどれか？",opts:["円高→輸入品が高くなる→インフレ圧力","円高→輸入品が安くなる→デフレ圧力","円高→輸出が増える→景気過熱→インフレ","円高と物価に直接の関係はない"],ans:1,exp:"円高→1ドルで以前より多くのモノを買える→輸入品が安くなる→物価下落（デフレ）圧力。円安→輸入品が高くなる→インフレ圧力。「円高＝安く買える＝デフレ」。"},
{cat:"国際経済・貿易",q:"ブレトン・ウッズ体制崩壊後の通貨制度として正しいものはどれか？",opts:["固定相場制＝ブレトン・ウッズ（1944年）→変動相場制への移行はキングストン合意（1976年）","固定相場制＝プラザ合意（1985年）→変動相場制はスミソニアン協定（1971年）","固定相場制は現在も維持されている","変動相場制はブレトン・ウッズ体制下から続いている"],ans:0,exp:"ブレトン・ウッズ体制（固定相場制）→1971年ニクソンショック（金ドル交換停止）→スミソニアン協定（1ドル308円に切り上げ）→1973年変動相場制へ移行→1976年キングストン合意（変動相場制を公式に認める）。「キングストン1976年」を覚える。"},
{cat:"国際経済・貿易",q:"国際収支の構成として正しいものはどれか？",opts:["経常収支＝貿易収支＋サービス収支のみ","経常収支＝貿易収支＋サービス収支＋第一次所得収支（海外投資収益）＋第二次所得収支（無償援助等）","経常収支＝直接投資＋証券投資＋その他投資","経常収支と金融収支は同じもの"],ans:1,exp:"経常収支の四要素：①貿易収支（財の輸出入）②サービス収支（旅行・運輸・特許料等）③第一次所得収支（海外投資の利子・配当）④第二次所得収支（無償援助・国際機関分担金）。直接投資・証券投資は金融収支。"},
{cat:"国際経済・貿易",q:"日本の経常収支が黒字を維持している最大の要因は？",opts:["貿易収支の大幅黒字","第一次所得収支（海外投資からの利子・配当）の大幅黒字","サービス収支の黒字","政府の財政政策による調整"],ans:1,exp:"日本の経常黒字の主因＝第一次所得収支（海外に積み上げた投資からの利子・配当）。近年は貿易収支が赤字になることもある。「貿易ではなく海外投資収益」が頻出の重要ポイント。"},
{cat:"国際経済・貿易",q:"FTAとEPAの違いとして正しいものはどれか？",opts:["FTA＝関税撤廃＋人的交流・知財等も含む包括的協定／EPA＝関税撤廃のみ","FTA＝関税撤廃が中心／EPA＝FTA＋人的交流・知財・投資・紛争解決等を含む包括的協定","FTAとEPAは同じ内容","EPAはEU内のみで使われる用語"],ans:1,exp:"FTA＝Free Trade Agreement＝関税撤廃が中心。EPA＝Economic Partnership Agreement＝FTA＋人の移動・知財・投資・紛争解決等も含む。日本初のFTA/EPA＝2002年シンガポール。"},
{cat:"国際経済・貿易",q:"GATTとWTOの違いとして正しいものはどれか？",opts:["GATT＝常設国際機関（強制力あり）／WTO＝国際協定（弱い）","GATT＝国際協定（弱い）／WTO＝常設国際機関（ジュネーヴ、紛争解決手続きあり、ネガティブ・コンセンサス方式）","どちらも同じ機能を持つ国際機関","WTOはGATTを廃止して設立した全く別組織"],ans:1,exp:"GATT1947年＝国際協定（組織ではない・農業除外）。WTO1995年＝常設国際機関（ジュネーヴ）・全加盟国が対象・農業・サービス・知財も含む・ネガティブ・コンセンサス方式（全員反対でなければ決定）。"},
{cat:"国際経済・貿易",q:"EU成立の歴史的経緯として正しいものはどれか？",opts:["EEC1952→ECSC1957→EC1967→EU1993","ECSC1952→EEC1957→EC1967→EU1993（マーストリヒト条約）","EU1957→EC1967→EEC1993→ECSC2002","EC1945→EEC1952→ECSC1957→EU1967"],ans:1,exp:"ECSC（欧州石炭鉄鋼共同体）1952→EEC（欧州経済共同体）1957（ローマ条約）→EC（欧州共同体）1967→EU（欧州連合）1993（マーストリヒト条約発効）。「ECSC→EEC→EC→EU」の順で覚える。"},
{cat:"国際経済・貿易",q:"ユーロ導入に参加しなかった三か国として正しいものはどれか？",opts:["フランス・ドイツ・イタリア","イギリス・スウェーデン・デンマーク","ポーランド・チェコ・ハンガリー","ノルウェー・スイス・アイスランド"],ans:1,exp:"ユーロ1999年導入。EU加盟だがユーロ不参加三か国＝イギリス（2020年EU離脱）・スウェーデン・デンマーク。「ユーロ不参加の三か国＝英・スウェーデン・デンマーク」は頻出。"},
{cat:"国際経済・貿易",q:"水平的分業と垂直的分業の違いとして正しいものはどれか？",opts:["水平的分業＝先進国と途上国の間（異なる技術レベル）／垂直的分業＝同レベルの先進国間","水平的分業＝同レベルの先進国間（自動車vs航空機）／垂直的分業＝先進国（工業品）vs途上国（原材料・農産物）","どちらも同じ意味","垂直的分業は途上国間のみに存在"],ans:1,exp:"水平的分業＝同じ経済発展レベルの国同士（先進国間）で異なる製品を交換（例：日本の車とドイツの機械）。垂直的分業＝発展レベルが異なる先進国vs途上国（工業品vs農産物・原材料）の分業。"},
{cat:"日本経済史",q:"1920年代の日本の三大恐慌の順番として正しいものはどれか？",opts:["金融恐慌1920→戦後恐慌1923→震災恐慌1927","戦後恐慌1920→震災恐慌1923→金融恐慌1927","震災恐慌1920→金融恐慌1923→戦後恐慌1927","戦後恐慌1923→震災恐慌1925→金融恐慌1930"],ans:1,exp:"「20・23・27」で覚える。戦後恐慌1920（欧州市場復帰で日本の輸出減）→震災恐慌1923（関東大震災）→金融恐慌1927（中小銀行倒産・五大銀行支配強化）。"},
{cat:"日本経済史",q:"ドッジ・ラインの内容として正しいものはどれか？",opts:["農地改革＋財閥解体による民主化政策","超均衡予算によるインフレ収束＋1ドル＝360円の固定相場設定","日本銀行への独立性付与＋直接税中心の税制改革","朝鮮戦争特需を活用した積極財政政策"],ans:1,exp:"ドッジ・ライン1949年二本柱：①超均衡予算（徹底した歳出削減でインフレ収束→ドッジ・デフレ）②1ドル＝360円の単一為替レート設定（輸出促進）。シャウプ勧告（直接税中心・累進課税）は別のこと。"},
{cat:"日本経済史",q:"GHQによる戦後三大改革として正しいものはどれか？",opts:["憲法改正・選挙権拡大・教育改革","財閥解体・農地改革・労働民主化（労働組合法等）","軍備解体・皇室財産没収・地方自治法制定","新円発行・産業国有化・土地税制改革"],ans:1,exp:"GHQ三大改革：①財閥解体（三井・三菱等の解体）②農地改革（地主制廃止・自作農創出）③労働民主化（労働組合法1945・労働関係調整法1946・労働基準法1947）。「財・農・労」で覚える。"},
{cat:"日本経済史",q:"傾斜生産方式の内容として正しいものはどれか？",opts:["農業と漁業に資源を集中して食糧不足を解消","石炭と鉄鋼に資源を重点的に配分して基幹産業を復興","輸出産業（繊維・自動車）に補助金を集中","アメリカからの援助資金を教育分野に集中"],ans:1,exp:"傾斜生産方式1946-47年：石炭と鉄鋼（基幹産業）に資源・資金を集中投下→生産回復の連鎖効果を狙う。「石炭と鉄鋼の二本柱」を覚える（鉄鋼だけでは不十分）。"},
{cat:"日本経済史",q:"四大景気の正しい組み合わせはどれか？",opts:["神武景気（三種の神器）→岩戸景気（所得倍増）→オリンピック景気（東京五輪）→いざなぎ景気（3C・GNP2位）","いざなぎ→オリンピック→岩戸→神武（新しい順）","神武景気（安保闘争）→岩戸景気（三種の神器）→いざなぎ（所得倍増）→オリンピック景気","神武景気（1950）→特需景気（1954）→オリンピック（1958）→いざなぎ（1962）"],ans:0,exp:"神武(1954-57：三種の神器・冷蔵庫洗濯機白黒TV)→岩戸(1958-61：池田勇人・国民所得倍増計画)→オリンピック(1962-64：東京五輪・新幹線開通・OECD加盟)→いざなぎ(1965-70：3C・カラーTV・クーラー・カー、GNP世界2位)。"},
{cat:"日本経済史",q:"第一次石油危機（1973年）の原因として正しいものはどれか？",opts:["イラクがクウェートに侵攻したことで起きた湾岸危機","第4次中東戦争に際してアラブ諸国が石油輸出禁止・削減を実施","ソ連のアフガニスタン侵攻に対する西側の経済制裁","イラン革命によるイランの石油生産停止"],ans:1,exp:"第一次石油危機1973年＝第4次中東戦争（イスラエルvsアラブ）に際してOAPECが石油輸出禁止→原油価格4倍→スタグフレーション→戦後初のマイナス成長→高度成長終焉。第二次石油危機1979年はイラン革命。"},
{cat:"日本経済史",q:"アベノミクス「3本の矢」として正しいものはどれか？",opts:["消費税増税・社会保障削減・規制強化","大胆な金融政策・機動的な財政政策・成長戦略（規制緩和）","国有企業民営化・外資規制緩和・移民受け入れ","為替介入・輸出補助金・産業保護政策"],ans:1,exp:"アベノミクス3本の矢：①大胆な金融政策（量的緩和・ゼロ/マイナス金利で物価上昇2%目標）②機動的な財政政策（公共事業・財政出動）③成長戦略（規制緩和）。「金・財・成（きん・ざい・せい）」で覚える。"},
{cat:"日本経済史",q:"バブル景気（1986-91年）の三大要因として正しいものはどれか？",opts:["円安・高金利・輸出増大","前川レポート（内需主導転換）・超低金利2.5%（金余り→投機）・円高（産業空洞化）","消費税増税・財政引き締め・輸入拡大","政府主導の公共投資・銀行の貸付規制強化・株価下落"],ans:1,exp:"バブル三大要因：①前川レポート（貿易摩擦対策で内需主導転換を求める）②超低金利2.5%（金余り→不動産・株式投機）③円高（プラザ合意後の円高不況対策として低金利維持）。「前川・低金利・円高」。"},
{cat:"日本経済史",q:"日本の貿易摩擦の品目推移として正しいものはどれか？",opts:["自動車→半導体→繊維の順","繊維→自動車→半導体の順（産業高度化の順）","半導体→自動車→繊維の順","全て同時に問題化した"],ans:1,exp:"日米貿易摩擦の品目推移：繊維（1960-70年代）→自動車（1980年代・最も深刻）→半導体（1980年代後半）の順。「産業の高度化とともに摩擦品目も高度化した」。"},
{cat:"労働・社会保障",q:"日本式経営の三大支柱として正しいものはどれか？",opts:["株主重視経営・成果主義賃金・産業別組合","終身雇用制・年功序列型賃金制・企業別組合","短期雇用制・能力給・産業別大組合","非正規雇用中心・成果主義・経営者組合"],ans:1,exp:"日本式経営三本柱：①終身雇用（定年まで雇用保障）②年功序列賃金（勤続年数に応じた昇給・昇格）③企業別組合（会社単位の組合・産業別ではない）。近年はこの慣行が崩れつつある。"},
{cat:"労働・社会保障",q:"労働三法の内容として正しいものはどれか？",opts:["労働組合法1945・労働関係調整法1946・労働基準法1947","労働基準法1945・労働組合法1946・男女雇用機会均等法1947","労働組合法1947・労働基準法1948・派遣法1949","労働基準法1945のみが労働三法の根幹"],ans:0,exp:"労働三法：①労働組合法1945年（労働三権の保障・団結権・団交権・争議権）②労働関係調整法1946年（労使紛争の調整）③労働基準法1947年（最低労働条件の設定）。「組合→関係→基準」の順で覚える。"},
{cat:"労働・社会保障",q:"法定労働時間として正しいものはどれか？",opts:["1日10時間・週48時間","1日8時間・週40時間","1日8時間・週44時間","1日7時間・週35時間"],ans:1,exp:"労働基準法：1日8時間・週40時間が法定労働時間。超える場合は時間外労働割増賃金が必要（25%以上）。サービス残業（無給残業）は違法。「8時間・40時間」を正確に覚える。"},
{cat:"労働・社会保障",q:"男女雇用機会均等法の制定・改正の年号として正しいものはどれか？",opts:["1975年制定・1985年改正（努力義務→禁止規定）","1985年制定（努力義務）・1997年改正（禁止規定＋セクハラ防止義務）","1995年制定・2000年改正","1990年制定・2005年改正"],ans:1,exp:"男女雇用機会均等法：1985年制定（採用・昇進での差別を努力義務規定）→1997年改正（努力義務→禁止規定に強化＋セクハラ防止義務追加）。「1985年制定・1997年改正」で覚える。1995ではない。"},
{cat:"労働・社会保障",q:"消費者の四つの権利（ケネディ提唱）として正しいものはどれか？",opts:["安全・無償・平等・情報公開の四権利","安全である権利・知らされる権利・選ぶ権利・意見を反映させる権利","購入拒否権・返品権・補償請求権・情報権","消費者保護権・競争権・プライバシー権・環境権"],ans:1,exp:"ケネディ提唱の消費者四権：①安全②知らされる（情報の権利）③選ぶ（選択の権利）④意見を反映させる。PL法（製造物責任法）1994年は「安全」の権利の具体化。「安・知・選・意」で覚える。"},
{cat:"労働・社会保障",q:"公的年金制度について正しいものはどれか？",opts:["積立方式で運営（現役時の保険料を将来の自分のために積立）","事実上の賦課方式で運営（現役世代が退職世代を支える）・強制加入・保険料＋国庫負担","市町村が運営する任意加入制度","保険料収入のみで運営・国庫負担なし"],ans:1,exp:"公的年金：事実上の賦課方式（現役世代の保険料で退職世代に支払う）・強制加入（20-60歳）・財源は保険料＋国庫負担（基礎年金の国負担は1/2）・国・日本年金機構が運営（市町村ではない）。"},
{cat:"地理・環境",q:"メルカトル図法とモルワイデ図法の使い方として正しいものはどれか？",opts:["メルカトル＝面積正確（分布図用）／モルワイデ＝角度正確（航海図用）","メルカトル＝角度・方位正確（航海図用）／モルワイデ＝面積正確（分布図用）","どちらも面積と角度の両方が正確","メルカトルは大陸の形が正確でモルワイデは距離が正確"],ans:1,exp:"メルカトル（メ）→目（め）→角度→航海図。モルワイデ（モ）→面（も）→面積→分布図。「メ＝目＝角度、モ＝面＝面積」の口訣で覚える。"},
{cat:"地理・環境",q:"CO2排出量の国別ランキング（多い順）として正しいものはどれか？",opts:["アメリカ＞中国＞インド＞ロシア＞日本","中国＞アメリカ＞インド＞ロシア＞日本","中国＞インド＞アメリカ＞日本＞ロシア","アメリカ＞中国＞日本＞インド＞ロシア"],ans:1,exp:"CO2排出：中国＞米国＞インド＞ロシア＞日本。インドは14億人＋石炭大量消費で日本より上（総量は人口×工業規模で判断）。"},
{cat:"地理・環境",q:"三大穀物に関する「最」の組み合わせとして正しいものはどれか？",opts:["生産量最大＝小麦／栽培範囲最広＝米／養える人数最多＝トウモロコシ","生産量最大＝トウモロコシ／栽培範囲最広＝小麦（耐寒・耐旱）／単位重量当たり養える人数最多＝米","生産量最大＝米／栽培範囲最広＝トウモロコシ／養える人数最多＝小麦","全て米が最大"],ans:1,exp:"三大穀物の最：生産量最大＝トウモロコシ（飼料・燃料にも使用）。栽培範囲最広＝小麦（耐寒・耐旱性で高緯度・乾燥地でも栽培可）。単位重量当たり養える人数最多＝米（水稲・単位面積当たりの収量が多い）。"},
{cat:"地理・環境",q:"日本の季節風（モンスーン）について正しいものはどれか？",opts:["夏＝北西の季節風（大陸から）・冬＝南東の季節風（太平洋から）","夏＝南東の季節風（太平洋側に雨）・冬＝北西の季節風（日本海側に雪）","年間を通じて同じ方向の季節風が吹く","季節風は日本にはほとんど影響しない"],ans:1,exp:"夏＝南東季節風（太平洋高気圧）→太平洋側・関東以南に梅雨・台風。冬＝北西季節風（シベリア高気圧）→日本海で水蒸気を拾い→日本海側に雪（山陰・北陸・東北日本海側）→太平洋側は乾燥した晴天。"},
{cat:"地理・環境",q:"京都議定書とパリ協定の違いとして正しいものはどれか？",opts:["京都議定書＝全加盟国に削減義務、パリ協定＝先進国のみ削減義務","京都議定書＝先進国のみ削減義務・国際排出量取引導入・米不参加、パリ協定＝発展途上国含む全加盟国・各国自主目標設定","京都議定書とパリ協定は内容が同じ","パリ協定はモントリオール議定書の後継協定"],ans:1,exp:"京都議定書1997年：先進国のみ削減義務・国際排出量取引導入・アメリカは離脱。パリ協定2015年：全加盟国参加・各国が自主的にNDC（国家決定貢献）を設定（義務的削減目標なし）。「京都＝先進国のみ、パリ＝全員参加・自主目標」。"},
{cat:"地理・環境",q:"モントリオール議定書が規制する対象として正しいものはどれか？",opts:["温室効果ガス（CO2・メタン等）の排出削減","オゾン層破壊物質（フロンガス等）の規制","海洋プラスチック汚染の規制","酸性雨の原因物質（亜硫酸ガス等）の規制"],ans:1,exp:"モントリオール議定書＝オゾン層破壊物質（フロンガス等）の規制。温暖化（CO2）とオゾン層破壊（フロン）は別問題。「モントリオール＝オゾン層＝フロン」と覚える。"},
{cat:"地理・環境",q:"フロー（flow）とストック（stock）の区別として正しいものはどれか？",opts:["フロー＝ある時点での蓄積量（国富・土地）／ストック＝一定期間の流れ（GDP・所得）","フロー＝一定期間の流れ・変動量（GDP・所得・投資）／ストック＝ある時点での蓄積量（土地・預貯金・国債残高）","フローとストックは同じ意味","フロー＝実物経済・ストック＝金融経済"],ans:1,exp:"フロー＝flow＝流れ＝一定期間で測る（GDPは1年間の生産量・所得は1年間の収入）。ストック＝stock＝蓄積＝ある時点で測る（土地・預貯金・国債残高・国富）。「フロー＝年間の流量、ストック＝時点の残高」。"},
{cat:"日本政党政治",q:"板垣退助・伊藤博文・大隈重信・原敬の業績として正しいものはどれか？",opts:["板垣退助＝初代首相・内閣制度（1885年）／伊藤博文＝最初の政党（愛国公党・1874年）","板垣退助＝最初の政党（愛国公党・1874年）／伊藤博文＝初代首相・内閣制度（1885年）／大隈重信＝初の政党内閣（1898年）／原敬＝初の本格的政党内閣（1918年）","大隈重信＝最初の政党（愛国公党）／原敬＝初の政党内閣","原敬＝初代首相（1885年）／板垣退助＝初の本格的政党内閣"],ans:1,exp:"板垣退助＝1874年愛国公党（日本最初の政党）。伊藤博文＝1885年内閣制度創設・初代首相。大隈重信＝1898年初の政党内閣（隈板内閣）。原敬＝1918年初の本格的政党内閣（平民宰相）。「板垣→伊藤→大隈→原」の順で覚える。"},
{cat:"日本政党政治",q:"55年体制とその崩壊について正しいものはどれか？",opts:["55年体制＝1955年に社会党と共産党が合同。1993年小泉内閣不信任で崩壊","55年体制＝1955年に保守合同（自由党＋民主党→自民党）・自民党2/3vs社会党1/3の「1と2分の1政党制」。1993年宮沢内閣不信任→細川連立内閣で崩壊","55年体制＝1955年に自民党が結成されただけ。崩壊は2009年","55年体制は日米安保条約締結によって始まり冷戦終結で終わった"],ans:1,exp:"55年体制：1955年保守合同（自由党＋日本民主党→自由民主党）と同時に社会党も統一→「1と2分の1政党制」（自民2/3：社会1/3）。1993年宮沢内閣不信任可決→衆議院解散→選挙で自民過半数割れ→細川護熙・非自民連立内閣→55年体制崩壊。"},
{cat:"日本政党政治",q:"自民党と社会党の主張の対立として正しいものはどれか？",opts:["自民党＝非武装中立・安保反対・護憲／社会党＝再軍備・安保維持・改憲","自民党＝再軍備・安保維持・改憲（憲法9条改正）／社会党＝非武装中立・安保反対・護憲","どちらも外交政策では一致していた","自民党＝護憲・非武装／社会党＝再軍備・安保維持"],ans:1,exp:"55年体制の対立軸：自民党＝再軍備推進・日米安保維持・憲法改正（9条）。社会党＝非武装中立・安保条約廃棄・護憲（9条維持）。冷戦構造を反映した対立。"},
{cat:"日本政党政治",q:"ロッキード事件と55年体制崩壊のそれぞれの年号と人物として正しいものはどれか？",opts:["ロッキード事件1976年・田中角栄逮捕／55年体制崩壊1993年・細川護熙内閣成立","ロッキード事件1985年・中曽根首相逮捕／55年体制崩壊1990年・連立政権","ロッキード事件1980年・大平首相逮捕／55年体制崩壊1996年・橋本内閣","ロッキード事件1972年・田中角栄辞任のみ"],ans:0,exp:"ロッキード事件1976年：航空機選定をめぐる収賄で田中角栄元首相逮捕。55年体制崩壊1993年：宮沢内閣不信任可決→衆議院解散→選挙で自民過半数割れ→細川護熙率いる非自民連立内閣成立。"},
{cat:"国際政治・国連",q:"国連安全保障理事会の構成と表決方式として正しいものはどれか？",opts:["常任理事国5（米英仏中露）＋非常任理事国10（任期2年）＝15。実質事項は9票以上必要且つ常任5国全員賛成","常任理事国10（大国全て）＋非常任理事国5＝15。全会一致制","常任理事国5＋非常任理事国15＝20。過半数で決定","常任理事国7（G7）＋非常任理事国8＝15"],ans:0,exp:"安保理：常任5（米英仏中露）＋非常任10（任期2年、毎年5か国改選）＝15。実質事項：9票以上必要＋常任5か国全員賛成（拒否権）。手続事項：9票以上（拒否権なし）。"},
{cat:"国際政治・国連",q:"国連総会の表決方式として正しいものはどれか？",opts:["一国一票・全会一致制","一国一票・重要事項は2/3以上・一般事項は過半数・法的拘束力なし","人口比例投票・過半数で決定","GDP比例投票・3/4以上で決定"],ans:1,exp:"国連総会：一国一票（大国も小国も同等）。重要事項＝3分の2以上の賛成。一般事項＝過半数。決議は法的拘束力なし（勧告のみ）。安保理と対比して覚える。"},
{cat:"国際政治・国連",q:"国際司法裁判所について正しいものはどれか？",opts:["所在地はニューヨーク・15人の裁判官が任期10年","所在地はハーグ（オランダ）・15人・9年任期・紛争当事国双方の同意が必要","所在地はジュネーヴ・裁判官20人・一方の提訴だけで管轄権が成立","所在地はロンドン・国内裁判所と同じ強制管轄権がある"],ans:1,exp:"国際司法裁判所（ICJ）：所在地はハーグ（オランダ）・裁判官15人（9年任期）・紛争当事国双方の同意が必要（強制管轄権なし）。WTOのジュネーヴ、IMFのワシントンDCと混同しない。"},
{cat:"国際政治・国連",q:"南北問題と南南問題の違いとして正しいものはどれか？",opts:["南北問題＝先進国（南）vs途上国（北）の格差／南南問題＝南米諸国間の対立","南北問題＝先進国（北）vs途上国（南）の経済格差／南南問題＝途上国間（「南」の国々）の経済格差","南北問題も南南問題も同じ概念","南北問題は冷戦終結で解決した"],ans:1,exp:"南北問題＝北（先進工業国）と南（発展途上国）の間の経済格差。UNCTAD1964年（プレビッシュ報告）で問題提起。南南問題＝途上国の中でも産油国・NIESなど比較的豊かな国と最貧国（LDC）の格差。"},
{cat:"国際政治・国連",q:"サミット（G7/G8）の起源として正しいものはどれか？",opts:["貿易・援助・経済開発分野で南北交渉をおこなうための首脳会議として始まった","非同盟主義を外交方針とする国々の首脳会議として始まった","石油危機以降の経済危機に対処する先進資本主義国間の首脳会議として始まった（1975年）","ナセルの提案によりアラブ諸国間の首脳会議として始まった"],ans:2,exp:"G7/G8サミット：1973年第一次石油危機後の経済危機に対処するため1975年にフランス・ランブイエで始まった先進資本主義国首脳会議（仏・米・英・独・日・伊・加の7か国）。「石油危機後の先進国の経済会議」として覚える。"},
{cat:"世界・日本史",q:"20世紀初頭の国際関係について正しいものはどれか？",opts:["イギリスは第一次世界大戦まで「光栄ある孤立」を保ちいずれの国とも同盟を結ばなかった","イタリアとオーストリアは三国同盟内でありながら「未回収のイタリア」をめぐる領土対立があった","ドイツとフランスは国境地域の資源共同管理を通じて友好関係を深めた","アメリカとロシアの対立がヨーロッパを二分した"],ans:1,exp:"イギリスは1902年日英同盟・1904年英仏協商・1907年英露協商を結んでいた（孤立政策はすでに終了）。イタリアは三国同盟（独墺伊）の一員だが「未回収のイタリア（イレデンタ）」でオーストリアと対立→一戦後に協約国側へ寝返り。独仏の資源共同管理は戦後ECSCの話。"},
{cat:"世界・日本史",q:"アメリカ南北戦争について正しいものはどれか？",opts:["北部がイギリスの支援を受け、南部がフランスの支援を受けた","脱退したのは北部で、アメリカ連合国を結成した","戦争中に奴隷解放宣言が出され、戦後連邦憲法修正で奴隷制が廃止された","主な原因は保護関税を求める南部と自由貿易を求める北部の対立"],ans:2,exp:"①英仏はどちらも正式参戦せず中立。②脱退したのは南部（南部11州がアメリカ連合国を結成）。③正：リンカーン1863年奴隷解放宣言→戦後修正第13条で奴隷制廃止。④逆：北部（工業）＝保護関税希望、南部（農業・綿花輸出）＝自由貿易希望。"},
{cat:"世界・日本史",q:"1871年に成立したドイツ帝国について正しいものはどれか？",opts:["帝国宰相は議会に対して政治責任を負う議院内閣制","帝国宰相は皇帝によって任命され皇帝に対してのみ政治上の責任を負った","バイエルン国王がドイツ皇帝を兼任した","スラブ系諸民族に広範な自治権を認めた"],ans:1,exp:"ビスマルク憲法の最大特徴：宰相は皇帝が任命し議会ではなく皇帝にのみ責任を負う（英国の議院内閣制とは大きく異なる）。ドイツ皇帝はプロイセン国王が兼任（バイエルンではない）。明治憲法がこのモデルを参考にした。"},
{cat:"世界・日本史",q:"アルジェリア独立の特徴として正しいものはどれか？",opts:["住民投票により平和的にフランスから独立した","1951年、国連決議による独立（戦争なし）","1954〜1962年、フランスとの武力闘争の末に独立（アフリカ最激烈な独立戦争）","アメリカの解放奴隷が建国した独立国"],ans:2,exp:"アルジェリア：1954〜1962年、フランスからの独立戦争（アルジェリア戦争）。8年間の激烈な武力闘争の末に独立。リビア（国連決議）・ギニア（住民投票）・チェコスロバキア（平和的分裂・ビロード離婚）と対比して覚える。"},
{cat:"世界・日本史",q:"イギリス民主主義の歴史を古い順に並べると？",opts:["マグナ・カルタ(1215)→権利章典(1689)→初代首相ウォルポール(1742)→第一次選挙法改正(1832)","第一次選挙法改正(1832)→マグナ・カルタ(1215)→権利章典(1689)→ウォルポール(1742)","権利章典(1689)→マグナ・カルタ(1215)→ウォルポール(1742)→選挙法改正(1832)","ウォルポール(1742)→権利章典(1689)→選挙法改正(1832)→マグナ・カルタ(1215)"],ans:0,exp:"マグナ・カルタ1215年（王権制限）→権利章典1689年（議会主権確立）→ウォルポール首相1742年辞任（責任内閣制の慣行）→第一次選挙法改正1832年（選挙権拡大）。「1215→1689→1742→1832」と年号順で覚える。"},
{cat:"世界・日本史",q:"ビスマルクの外交の核心として正しいものはどれか？",opts:["ドイツの海外植民地拡大を積極推進","フランスを孤立させるためオーストリア・ロシア・イタリアと同盟を結んだ","ロシアとの同盟を最優先してフランスに接近","イギリスとの同盟を軸に三国協商を形成"],ans:1,exp:"ビスマルク外交の核心：フランスを孤立させる！具体的手段：三国同盟（独・墺・伊）＋露とは再保障条約（秘密条約）。植民地拡張には消極的。ウィルヘルム2世がビスマルクを解任後、フランスが孤立を脱して英仏露三国協商が成立。"},
{cat:"世界・日本史",q:"日本国憲法の制定について正しいものはどれか？",opts:["天皇が起草を命じ草案の審議にも直接関与した","憲法問題調査委員会（松本委員会）が作成した草案に基づいて制定された","占領下にあったが形式的には大日本帝国憲法の改正手続きにしたがって制定された","日本国憲法は講和条約発効後（1952年）に施行された"],ans:2,exp:"①GHQのマッカーサーが主導で起草（天皇ではない）。②松本委員会草案はGHQに保守的と拒否された。③正：大日本帝国憲法73条の改正手続きを形式上踏んだ。④誤：日本国憲法施行1947年5月3日＜講和条約発効1952年4月28日（憲法が先）。"},
{cat:"世界・日本史",q:"ユーゴスラビアとチェコスロバキアの解体の違いとして正しいものはどれか？",opts:["どちらも武力衝突を経て解体","ユーゴスラビア＝1990年代前半に民族間の武力衝突で解体（多民族）・チェコスロバキア＝1993年に平和的分裂（ビロード離婚）","チェコスロバキアが武力衝突で、ユーゴスラビアが平和的分裂","どちらも外国の軍事介入で解体"],ans:1,exp:"ユーゴスラビア：1945年建国・多民族国家・社会主義・1990年代前半から民族間の武力衝突（ボスニア紛争等）で解体。チェコスロバキア：1993年にチェコとスロバキアに平和的に分裂「ビロード離婚」（武力なし）。"},
{cat:"GDP・経済指標",q:"GDPの三面等価の原則として正しいものはどれか？",opts:["分配国民所得＝生産国民所得＋支出国民所得の合計","生産面（GDP）＝分配面（GNI）＝支出面（GNE）（三者は同一のものを異なる角度から見たもの）","GDPは消費と投資の合計のみ","GNPとGDPは同じ概念"],ans:1,exp:"三面等価の原則：生産面（国内総生産GDP）＝分配面（国民総所得GNI）＝支出面（国民総支出GNE）。三者は同一の経済活動を異なる側面から見たもので等しくなる（三者は相加関係ではない）。"},
{cat:"GDP・経済指標",q:"名目GDPと実質GDPの関係として正しいものはどれか？",opts:["実質GDP＝名目GDP＋GDPデフレーター","実質GDP＝名目GDP÷GDPデフレーター×100（物価変動を除いた実態）","名目GDP成長率＝実質GDP成長率のみで決まる","デフレ時は名目成長率＞実質成長率になる"],ans:1,exp:"実質GDP＝名目GDP÷GDPデフレーター×100。名目GDP成長率≒実質成長率＋GDPデフレーター変化率。デフレ時：デフレーター変化率がマイナス→名目成長率＜実質成長率。「デフレ＝名目が実質より低い」。"},
{cat:"GDP・経済指標",q:"景気動向指数の先行・一致・遅行指数の区別として正しいものはどれか？",opts:["法人税収入＝先行指数・消費者態度指数＝一致指数・有効求人倍率＝遅行指数","先行指数＝消費者態度指数・新規求人数等／一致指数＝営業利益・耐久消費財出荷等／遅行指数＝法人税収入・完全失業率等","全て景気と同時に動くので区別はない","先行指数が最も信頼性が高く政策決定に使われる"],ans:1,exp:"先行指数（景気に先行して変化）：消費者態度指数・新規求人数・在庫変動。一致指数（景気と同期）：営業利益・耐久消費財出荷・有効求人倍率。遅行指数（景気に遅れて変化）：法人税収入・完全失業率・家計消費支出。"},
{cat:"GDP・経済指標",q:"国富に国内金融資産が含まれない理由として正しいものはどれか？",opts:["金融資産は金融機関内の遊休資産で実体経済に影響しないため","金融資産は最終的に価値のない紙幣として償還されるため","金融資産には同額の金融負債が存在し国全体では相殺されるため","金融資産は評価額の変動幅が大きく安定しないため"],ans:2,exp:"国富＝実物資産＋対外純資産。国内金融資産を含まない理由：銀行に100万円預ける→あなたの金融資産100万円・銀行の金融負債100万円→国全体で見ると相殺されてゼロになる。国内で誰かの資産は必ず誰かの負債。"},
{cat:"地方自治・司法",q:"地方自治の二原則として正しいものはどれか？",opts:["中央集権の原則＋効率行政の原則","団体自治（中央政府から独立）＋住民自治（住民の意思による自治）","首長優位の原則＋議会監視の原則","地方分権の原則＋条例優先の原則"],ans:1,exp:"地方自治の二原則：①団体自治＝地方公共団体が中央政府から独立して自治を行う（地方分権の側面）。②住民自治＝住民の意思に基づいて行政が行われる（民主主義の側面）。ブライス「地方自治は民主主義の学校」も覚える。"},
{cat:"地方自治・司法",q:"日本の裁判所制度について正しいものはどれか？",opts:["日本には行政専門の独立行政裁判所がある","日本には独立行政裁判所はなく行政事件も通常裁判所で審理する","下級裁判所は高等・地方・家庭・簡易の三種類","最高裁判所は憲法解釈には関与しない"],ans:1,exp:"日本の裁判所制度：独立した行政裁判所は存在しない（フランス等とは異なる）→行政訴訟も通常裁判所で審理。下級裁判所は四種類：高等・地方・家庭・簡易裁判所（家庭を忘れやすい）。最高裁＝「憲法の番人」。"},
{cat:"地方自治・司法",q:"裁判員制度について正しいものはどれか？",opts:["すべての刑事事件が対象で民事事件も含む","重大刑事事件の第一審のみが対象・評決は多数決・選出は抽選・量刑にも参加","全員一致でのみ有罪判決が下せる","裁判員は有罪か無罪のみを判断し量刑には関与しない"],ans:1,exp:"裁判員制度（2009年開始）：対象＝重大刑事事件の第一審のみ（殺人等）。評決＝多数決（ただし有罪には裁判官1人以上の賛成必要）。選出＝選挙人名簿から抽選（立候補制ではない）。量刑も裁判員が参加（米国陪審員と異なる点）。"},
{cat:"地方自治・司法",q:"住民投票条例に基づく住民投票の法的効力として正しいものはどれか？",opts:["国会の法律と同等の法的拘束力がある","法的拘束力はなく参考・諮問にとどまる","地方議会を拘束するが国を拘束しない","首長のみを拘束する"],ans:1,exp:"住民投票条例に基づく住民投票の結果：法的拘束力なし（諮問的住民投票）。議会・首長は参考にするが法的に従う義務はない。憲法95条の「地方特別法」に関する住民投票（法的効力あり）と混同しない。"},
{cat:"国際収支・計算",q:"経常収支の計算として正しいものはどれか？（財の輸出500・輸入350・サービス収支-50・経常移転収支-10・直接投資収支-30・証券投資収支-150）",opts:["90の黒字","790の黒字","100の赤字","210の赤字"],ans:0,exp:"経常収支＝貿易収支＋サービス収支＋第一次所得収支（この問題ではゼロ）＋経常移転収支。貿易収支＝500-350＝150。経常収支＝150＋(-50)＋(-10)＝90（黒字）。直接投資・証券投資は金融収支に含まれるため経常収支に算入しない。"},
{cat:"国際収支・計算",q:"EU加盟だがユーロ圏に参加していない代表的な国として正しいものはどれか？",opts:["フランス・ドイツ・イタリア","スウェーデン・デンマーク（イギリスは2020年EU離脱）","ポーランド・チェコ・ハンガリー（EU加盟・ユーロ未導入）","ノルウェー・スイス（EU非加盟）"],ans:1,exp:"EU加盟だがユーロ不参加の有名な三か国：イギリス（2020年EU離脱）・スウェーデン・デンマーク。ノルウェー・スイスはEU非加盟（別問題）。「EU加盟だがユーロなし＝英・スウェーデン・デンマーク」。"},
{cat:"宗教・文化",q:"カトリック・プロテスタント・正教会の特徴として正しいものはどれか？",opts:["カトリック＝ルター宗教改革で分裂・教皇なし・北欧中心","カトリック＝ローマ教皇（バチカン）・西欧中心／プロテスタント＝16世紀ルター改革で分裂・教皇なし／正教会＝ギリシャ正教・ロシア正教・東欧ロシア圏","正教会＝ローマ教皇が統括・南欧中心","プロテスタント＝バチカンが本部・カトリックから独立"],ans:1,exp:"カトリック＝ローマ教皇（バチカン）を頂点・西欧・南欧・中南米に多い。プロテスタント＝16世紀にルターが宗教改革で分裂・教皇なし・北欧・北米に多い。正教会＝ギリシャ正教・ロシア正教・東欧・ロシアに多い。「ローマ教皇が出たら自動的にカトリック」。"},
{cat:"宗教・文化",q:"大西洋三角貿易の流れとして正しいものはどれか？",opts:["英国→アフリカ：銀／アフリカ→アメリカ：奴隷／アメリカ→英国：工業製品","英国→アフリカ：武器・雑貨／アフリカ→アメリカ：奴隷／アメリカ→英国：砂糖・綿花等の農産物原料","英国→アフリカ：綿織物／アフリカ→アメリカ：金・銀／アメリカ→英国：奴隷","英国→アメリカ：奴隷／アメリカ→アフリカ：砂糖／アフリカ→英国：武器"],ans:1,exp:"英→アフリカ：武器・雑貨（銀ではない）。アフリカ→アメリカ：奴隷（奴隷貿易）。アメリカ→英：砂糖・綿花・煙草等の農産物原料（工業製品ではなく原材料）。「武器で奴隷を買い、農産物原料を持ち帰る」。"},
];

</script>
<script>
let allCats,selCat="全て",queue=[],cur=0,corr=0,wrng=0,missed=[],answered=false;
function buildCats(){
  allCats=["全て",...new Set(ALL.map(q=>q.cat))];
  document.getElementById("catNav").innerHTML=allCats.map(c=>`<button class="cat-btn${c===selCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
  document.getElementById("totalCount").textContent="全"+ALL.length+"問収録";
}
function setCat(c){selCat=c;document.querySelectorAll(".cat-btn").forEach((b,i)=>b.classList.toggle("active",allCats[i]===c));restart(false);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function restart(missedOnly){
  const pool=missedOnly&&missed.length?missed:(selCat==="全て"?ALL:ALL.filter(q=>q.cat===selCat));
  queue=shuffle(pool);cur=0;corr=0;wrng=0;missed=[];answered=false;
  document.getElementById("summary").style.display="none";
  document.getElementById("quizCard").style.display="";
  document.getElementById("nextBtn").style.display="none";
  document.getElementById("statsBar").style.display="flex";
  updateStats();showQ();
}
function showQ(){
  if(cur>=queue.length){showSummary();return;}
  answered=false;
  const q=queue[cur];
  document.getElementById("progLine").style.width=(cur/queue.length*100)+"%";
  document.getElementById("qNum").textContent=(cur+1)+" / "+queue.length;
  document.getElementById("qTag").textContent=q.cat;
  document.getElementById("qText").textContent=q.q;
  document.getElementById("feedback").className="feedback";
  document.getElementById("nextBtn").style.display="none";
  const L=["A","B","C","D"];
  document.getElementById("opts").innerHTML=q.opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="pick(${i})"><span class="opt-label">${L[i]}</span><span>${o}</span></button>`).join("");
}
function pick(i){
  if(answered)return;
  answered=true;
  const q=queue[cur];
  document.querySelectorAll(".opt").forEach((b,idx)=>{b.disabled=true;if(idx===q.ans)b.classList.add("correct");else if(idx===i&&i!==q.ans)b.classList.add("wrong");else b.classList.add("dim");});
  const fb=document.getElementById("feedback");
  if(i===q.ans){corr++;fb.className="feedback ok";}else{wrng++;missed.push(q);fb.className="feedback ng";}
  document.getElementById("fbHead").textContent=i===q.ans?"✓ 正解":"✗ 不正解";
  document.getElementById("fbBody").textContent=q.exp;
  document.getElementById("nextBtn").style.display="block";
  updateStats();
}
function next(){cur++;showQ();}
function updateStats(){document.getElementById("sC").textContent=corr;document.getElementById("sW").textContent=wrng;document.getElementById("sL").textContent=queue.length-cur;}
function showSummary(){
  document.getElementById("quizCard").style.display="none";
  document.getElementById("nextBtn").style.display="none";
  document.getElementById("statsBar").style.display="none";
  const total=corr+wrng;const pct=total?Math.round(corr/total*100):0;
  document.getElementById("bigPct").textContent=pct+"%";
  const mb=document.getElementById("missedBox");
  mb.innerHTML=missed.length?'<h3>間違えた問題</h3>'+missed.map(q=>`<div class="missed-item"><div class="missed-q">${q.q}</div><div class="missed-a">▸ ${q.opts[q.ans]}</div></div>`).join(""):'<div style="color:#7ec8a0;text-align:center;padding:16px">全問正解！🎉</div>';
  document.getElementById("summary").style.display="block";
}
buildCats();restart(false);
</script>
